<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainEnglish — Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
    }

    #mainContent {
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .step { display: none; }
    .step.active { display: block; }

    .exercise-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }

    .dot.done  { background: var(--success); border-color: var(--success); }
    .dot.current { background: var(--accent);  border-color: var(--accent); }
    .dot.wrong { background: var(--error);   border-color: var(--error); }

    .fill-input {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }

    .empty-review {
      text-align: center;
      padding: 48px 16px;
    }

    .empty-review .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-review p {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<!-- Dynamic background -->
<div class="page-bg" aria-hidden="true"></div>
<div class="page-glow page-glow-1" aria-hidden="true"></div>
<div class="page-glow page-glow-2" aria-hidden="true"></div>

  <!-- Session topbar -->
  <header class="session-topbar">
    <a href="stats.html" class="topbar-back">&#8592;</a>
    <span class="session-title">Review</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <span class="session-timer" id="timerEl">0:00</span>
      <button class="topbar-icon" id="themeBtn" aria-label="Cambia tema"></button>
      <a href="settings.html" class="topbar-icon" aria-label="Impostazioni"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
    </div>
  </header>

  <main id="mainContent">

    <!-- No errors state -->
    <div class="step active" id="stepEmpty">
      <div class="card">
        <div class="empty-review">
          <div class="icon">&#x2705;</div>
          <p>All caught up! Complete some sessions to accumulate errors to review.</p>
          <a href="session.html" class="btn btn-primary">Go to session</a>
        </div>
      </div>
    </div>

    <!-- Exercise step -->
    <div class="step" id="stepExercise">
      <div style="font-size:12px;color:var(--subtext);text-align:center;margin-bottom:12px" id="reviewSubtitle"></div>
      <div class="exercise-dots" id="exerciseDots"></div>

      <div class="card" id="exerciseCard">
        <div class="exercise-part" id="exPart"></div>
        <div class="exercise-question" id="exQuestion"></div>
        <div id="optionsArea"></div>
        <div id="fillArea" style="display:none">
          <div id="keywordBadge" style="display:none;margin-bottom:12px">
            <span style="font-size:11px;font-weight:600;color:var(--subtext)">Keyword: </span>
            <span class="badge" id="keywordText"></span>
          </div>
          <input type="text" class="fill-input" id="fillInput" placeholder="Write your answer...">
        </div>
        <div class="feedback" id="feedbackArea">
          <strong id="feedbackTitle"></strong>
          <span id="feedbackExplanation"></span>
        </div>
      </div>

      <div class="mt-12">
        <button class="btn btn-primary" id="confirmBtn" disabled>Confirm</button>
      </div>
      <div class="mt-8" id="nextBtnWrap" style="display:none">
        <button class="btn btn-secondary" id="nextBtn">Next &rarr;</button>
      </div>
    </div>

    <!-- Recap step -->
    <div class="step" id="stepRecap">
      <div class="card" style="text-align:center">
        <div class="card-label">Review complete</div>
        <div style="font-size:52px;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-2px;margin:12px 0" id="recapScore">-</div>
        <p id="recapMessage" style="font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6"></p>
        <div class="divider"></div>
        <div style="display:flex;gap:12px;justify-content:center">
          <div>
            <div class="stat-num" id="recapCorrect" style="font-size:28px">0</div>
            <div class="stat-label">Correct</div>
          </div>
          <div>
            <div class="stat-num" id="recapWrong" style="font-size:28px;color:var(--error)">0</div>
            <div class="stat-label">Wrong</div>
          </div>
        </div>
      </div>
      <div class="mt-16">
        <a href="dashboard.html" class="btn btn-primary">Back to dashboard</a>
      </div>
      <div class="mt-8">
        <a href="stats.html" class="btn btn-secondary">View errors and stats</a>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      if (!Auth.requireAuth()) return;

      var state  = State.load();
      var errors = (state.sessionErrors || []).slice();

      if (!errors.length) {
        return; // stepEmpty is already shown
      }

      Timer.start(document.getElementById('timerEl'));

      // Build exercise-like objects from error log
      var exercises = errors.slice(0, 20).map(function (e) {
        return {
          type:        'fill',
          part:        e.part || 'Part ?',
          question:    e.question,
          answer:      e.correct,
          explanation: e.explanation,
          _original:   e
        };
      });

      document.getElementById('stepEmpty').classList.remove('active');
      document.getElementById('stepExercise').classList.add('active');
      document.getElementById('reviewSubtitle').textContent = 'Reviewing ' + exercises.length + ' recent errors';

      // Dots
      function buildDots() {
        var dotsEl = document.getElementById('exerciseDots');
        dotsEl.innerHTML = '';
        exercises.forEach(function (_, i) {
          var d = document.createElement('div');
          d.className = 'dot' + (i === 0 ? ' current' : '');
          d.id = 'dot-' + i;
          dotsEl.appendChild(d);
        });
      }

      function updateDot(i, cls) {
        var d = document.getElementById('dot-' + i);
        if (d) d.className = 'dot ' + cls;
      }

      buildDots();

      var exIndex      = 0;
      var correctCount = 0;
      var wrongCount   = 0;
      var answered     = false;

      function renderExercise() {
        if (exIndex >= exercises.length) {
          showRecap();
          return;
        }

        answered = false;
        var ex   = exercises[exIndex];

        document.getElementById('exPart').textContent     = ex.part;
        document.getElementById('exQuestion').textContent = ex.question;

        var feedback = document.getElementById('feedbackArea');
        feedback.className    = 'feedback';
        feedback.style.display = 'none';

        document.getElementById('optionsArea').style.display = 'none';
        document.getElementById('fillArea').style.display    = '';
        document.getElementById('keywordBadge').style.display = 'none';
        document.getElementById('nextBtnWrap').style.display  = 'none';

        var fillInput = document.getElementById('fillInput');
        fillInput.value    = '';
        fillInput.disabled = false;
        fillInput.style.borderColor = '';
        fillInput.style.background  = '';

        var confirmBtn = document.getElementById('confirmBtn');
        confirmBtn.disabled    = true;
        confirmBtn.textContent = 'Confirm';

        fillInput.addEventListener('input', function () {
          confirmBtn.disabled = fillInput.value.trim().length === 0;
        });
      }

      document.getElementById('confirmBtn').addEventListener('click', function () {
        if (answered) return;
        answered = true;

        var ex         = exercises[exIndex];
        var userAnswer = document.getElementById('fillInput').value.trim().toLowerCase();
        var accepted   = Array.isArray(ex.answer) ? ex.answer : [ex.answer];
        var correct    = accepted.some(function (a) {
          return a.toLowerCase() === userAnswer;
        });

        var fillInput  = document.getElementById('fillInput');
        fillInput.disabled = true;
        fillInput.style.borderColor = correct ? '#6ee7b7' : '#fca5a5';
        fillInput.style.background  = correct ? '#ecfdf5' : '#fef2f2';

        if (correct) {
          correctCount++;
          updateDot(exIndex, 'done');
        } else {
          wrongCount++;
          updateDot(exIndex, 'wrong');
        }

        var feedback  = document.getElementById('feedbackArea');
        feedback.className    = 'feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + ' show';
        feedback.style.display = 'block';
        document.getElementById('feedbackTitle').textContent      = correct ? 'Correct! ' : 'Wrong. Answer: ' + (Array.isArray(ex.answer) ? ex.answer[0] : ex.answer) + '. ';
        document.getElementById('feedbackExplanation').textContent = ex.explanation || '';

        document.getElementById('confirmBtn').disabled    = true;
        document.getElementById('nextBtnWrap').style.display = '';
      });

      document.getElementById('nextBtn').addEventListener('click', function () {
        exIndex++;
        renderExercise();
      });

      function showRecap() {
        document.getElementById('stepExercise').classList.remove('active');
        document.getElementById('stepRecap').classList.add('active');

        Timer.stop();

        var total = correctCount + wrongCount;
        var pct   = total > 0 ? Math.round(correctCount / total * 100) : 0;

        document.getElementById('recapScore').textContent   = pct + '%';
        document.getElementById('recapCorrect').textContent = correctCount;
        document.getElementById('recapWrong').textContent   = wrongCount;

        var msg = pct >= 80
          ? 'Great review! You are improving.'
          : pct >= 60
            ? 'Good result. Keep reviewing.'
            : 'These topics need more practice.';
        document.getElementById('recapMessage').textContent = msg;
      }

      renderExercise();

    })();

// Theme toggle
(function () {
  var SUN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  var MOON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function isDark() {
    var t = localStorage.getItem('te_theme') || 'auto';
    if (t === 'dark') return true;
    if (t === 'light') return false;
    return window.matchMedia('(prefers-color-scheme:dark)').matches;
  }
  var btn = document.getElementById('themeBtn');
  if (!btn) return;
  btn.innerHTML = isDark() ? SUN : MOON;
  btn.addEventListener('click', function () {
    var next = isDark() ? 'light' : 'dark';
    localStorage.setItem('te_theme', next);
    document.documentElement.setAttribute('data-theme', next);
    btn.innerHTML = isDark() ? SUN : MOON;
  });
})();
  </script>
<script>
(function () {
  var pts = [
    {l:'10%',t:'22%',s:2,d:0,o:0.5},
    {l:'35%',t:'48%',s:1.5,d:0.7,o:0.3},
    {l:'60%',t:'15%',s:3,d:1.4,o:0.4},
    {l:'80%',t:'58%',s:2,d:0.3,o:0.35},
    {l:'22%',t:'72%',s:1.5,d:1.9,o:0.25},
    {l:'90%',t:'33%',s:2.5,d:1,o:0.3}
  ];
  var f = document.createDocumentFragment();
  pts.forEach(function (p) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.setAttribute('aria-hidden', 'true');
    el.style.cssText = 'left:'+p.l+';top:'+p.t+';width:'+p.s+'px;height:'+p.s+'px;--op:'+p.o+';animation:float-up '+(3+p.d)+'s ease-in-out '+p.d+'s infinite;';
    f.appendChild(el);
  });
  document.body.appendChild(f);
})();
</script>
<script src="js/toast.js"></script>
<script src="js/transitions.js"></script>
<script src="js/shortcuts.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
