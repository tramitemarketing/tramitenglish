<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainEnglish — Log Errori</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .log-meta {
      font-size: 11px;
      color: var(--subtext);
      margin-bottom: 6px;
    }

    .answer-row {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .answer-label {
      font-weight: 700;
      min-width: 120px;
      flex-shrink: 0;
    }

    .answer-wrong {
      color: var(--error);
    }

    .answer-correct {
      color: var(--success);
      font-weight: 600;
    }

    .empty-log {
      text-align: center;
      padding: 48px 24px;
    }

    .empty-log .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-log p {
      font-size: 14px;
      color: var(--subtext);
      line-height: 1.6;
    }

    .log-count {
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<!-- Dynamic background -->
<div class="page-bg" aria-hidden="true"></div>
<div class="page-glow page-glow-1" aria-hidden="true"></div>
<div class="page-glow page-glow-2" aria-hidden="true"></div>

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-title">Log Errori</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <span id="errorCount" class="badge" style="font-size:11px">0</span>
      <button class="topbar-icon" id="themeBtn" aria-label="Cambia tema"></button>
      <a href="settings.html" class="topbar-icon" aria-label="Impostazioni"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
    </div>
  </header>

  <!-- Main content -->
  <main class="page-content">

    <!-- Filter chips -->
    <div class="chips-row" id="filterChips">
      <span class="chip active" data-filter="all">Tutti</span>
      <span class="chip" data-filter="Part 1">Part 1</span>
      <span class="chip" data-filter="Part 2">Part 2</span>
      <span class="chip" data-filter="Part 3">Part 3</span>
      <span class="chip" data-filter="Part 4">Part 4</span>
      <span class="chip" data-filter="Part 5">Part 5</span>
    </div>

    <div id="logList"></div>

  </main>

  <!-- FAB -->
  <a href="review.html" class="fab" id="reviewFab" style="display:none">
    &#x21BA; Ripassa errori
  </a>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Home</span>
    </a>
    <a href="session.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M10 8.5l5 3.5-5 3.5V8.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Sessione</span>
    </a>
    <a href="test.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h8M8 12h5M8 16h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Test</span>
    </a>
    <a href="library.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>Libreria</span>
    </a>
    <a href="stats.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Stats</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      if (!Auth.requireAuth()) return;

      var state       = State.load();
      var errors      = state.sessionErrors || [];
      var activeFilter = 'all';

      document.getElementById('errorCount').textContent = errors.length;

      if (errors.length > 0) {
        document.getElementById('reviewFab').style.display = '';
      }

      function formatDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: '2-digit' });
      }

      function renderLog(filter) {
        var listEl  = document.getElementById('logList');
        var filtered = filter === 'all'
          ? errors
          : errors.filter(function (e) { return e.part === filter; });

        if (filtered.length === 0) {
          listEl.innerHTML = '<div class="empty-log">'
            + '<div class="empty-icon">&#x2705;</div>'
            + '<p>' + (filter === 'all'
                ? 'Nessun errore registrato ancora.<br>Completa alcune sessioni per vedere i tuoi errori qui.'
                : 'Nessun errore per ' + filter + '.') + '</p>'
            + '</div>';
          return;
        }

        listEl.innerHTML = '<div class="log-count">' + filtered.length + ' error' + (filtered.length === 1 ? 'e' : 'i') + '</div>';

        filtered.forEach(function (e) {
          var card = document.createElement('div');
          card.className = 'card error-card';

          card.innerHTML = '<div class="log-meta">'
            + '<span class="badge">' + (e.part || 'N/D') + '</span>'
            + ' &nbsp; Giorno ' + (e.day || '?')
            + (e.date ? ' &middot; ' + formatDate(e.date) : '')
            + '</div>'
            + '<div class="error-question">' + (e.question || '') + '</div>'
            + '<div class="error-answers">'
            + '<div class="answer-row"><span class="answer-label">La tua risposta:</span> <span class="answer-wrong">' + (e.userAnswer || '—') + '</span></div>'
            + '<div class="answer-row"><span class="answer-label">Risposta corretta:</span> <span class="answer-correct">' + (e.correct || '—') + '</span></div>'
            + '</div>'
            + '<div class="error-explanation">' + (e.explanation || '') + '</div>';

          listEl.appendChild(card);
        });
      }

      renderLog('all');

      // Filter chips
      document.getElementById('filterChips').addEventListener('click', function (ev) {
        var chip = ev.target.closest('.chip');
        if (!chip) return;

        document.querySelectorAll('#filterChips .chip').forEach(function (c) {
          c.classList.remove('active');
        });
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderLog(activeFilter);
      });

    })();

// Theme toggle
(function () {
  var SUN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  var MOON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function isDark() {
    var t = localStorage.getItem('te_theme') || 'auto';
    if (t === 'dark') return true;
    if (t === 'light') return false;
    return window.matchMedia('(prefers-color-scheme:dark)').matches;
  }
  var btn = document.getElementById('themeBtn');
  if (!btn) return;
  btn.innerHTML = isDark() ? SUN : MOON;
  btn.addEventListener('click', function () {
    var next = isDark() ? 'light' : 'dark';
    localStorage.setItem('te_theme', next);
    document.documentElement.setAttribute('data-theme', next);
    btn.innerHTML = isDark() ? SUN : MOON;
  });
})();
  </script>
<script>
(function () {
  var pts = [
    {l:'10%',t:'22%',s:2,d:0,o:0.5},
    {l:'35%',t:'48%',s:1.5,d:0.7,o:0.3},
    {l:'60%',t:'15%',s:3,d:1.4,o:0.4},
    {l:'80%',t:'58%',s:2,d:0.3,o:0.35},
    {l:'22%',t:'72%',s:1.5,d:1.9,o:0.25},
    {l:'90%',t:'33%',s:2.5,d:1,o:0.3}
  ];
  var f = document.createDocumentFragment();
  pts.forEach(function (p) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.setAttribute('aria-hidden', 'true');
    el.style.cssText = 'left:'+p.l+';top:'+p.t+';width:'+p.s+'px;height:'+p.s+'px;--op:'+p.o+';animation:float-up '+(3+p.d)+'s ease-in-out '+p.d+'s infinite;';
    f.appendChild(el);
  });
  document.body.appendChild(f);
})();
</script>
</body>
</html>
