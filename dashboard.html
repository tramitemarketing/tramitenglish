<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TramitEnglish — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <style>
    /* ── Dashboard layout ── */
    .dash-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    @media (min-width: 1024px) {
      .page-content { max-width: 1100px; }
      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        align-items: start;
      }
    }

    /* ── Greeting ── */
    .greeting-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .greeting-name {
      font-family: var(--font-display);
      font-size: 26px;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .motivation-line {
      font-size: 13px;
      color: var(--subtext);
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: var(--radius);
      border-left: 2px solid var(--accent);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ── Streak grid ── */
    .streak-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    .streak-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      min-width: 200px;
    }

    @media (max-width: 767px) {
      .streak-grid {
        grid-template-columns: repeat(30, 26px);
        width: max-content;
      }
    }

    /* Staggered fill animation */
    @keyframes fillIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .cal-day.done {
      animation: fillIn 250ms ease-out both;
    }
    .cal-day.today {
      animation: fillIn 300ms ease-out both;
    }

    /* ── Session pills ── */
    .session-pills {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .session-pill {
      flex: 1;
      padding: 9px 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--subtext);
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .session-pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    [data-theme="dark"] .session-pill.active { color: #0c0c0c; }

    .session-pill:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }

    /* CTA scale */
    .btn-cta {
      transition: transform 0.15s ease, opacity 0.15s !important;
    }
    .btn-cta:hover { transform: scale(1.02); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .stat-cell {
      text-align: center;
      padding: 16px 8px;
      opacity: 0;
      animation: fadeUp 400ms ease-out forwards;
    }
    .stat-cell:nth-child(2) {
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      animation-delay: 100ms;
    }
    .stat-cell:nth-child(3) { animation-delay: 200ms; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-val {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-lbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 6px;
    }

    /* ── Focus badges ── */
    .focus-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── Today topic inline ── */
    .today-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .today-topic {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .cta-hint {
      font-size: 12px;
      color: var(--subtext);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- Dynamic background -->
<div class="page-bg" aria-hidden="true"></div>
<div class="page-glow page-glow-1" aria-hidden="true"></div>
<div class="page-glow page-glow-2" aria-hidden="true"></div>

  <!-- Topbar -->
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">Tram<span>it</span>English</a>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="topbar-icon" id="themeBtn" aria-label="Cambia tema"></button>
      <a href="settings.html" class="topbar-icon" aria-label="Impostazioni">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="page-content">
    <div class="day-progress" aria-label="60-day plan progress" role="progressbar">
      <div class="day-progress-fill" id="dayProgressFill"></div>
    </div>
    <div class="dash-grid">

      <!-- LEFT: Greeting + Streak -->
      <div>
        <div class="greeting-label" id="dayLabel">Day 1 of 60</div>
        <h1 class="greeting-name" id="greetingName">Welcome back</h1>
        <p class="motivation-line" id="motivLine">First session of the week. Let's go.</p>

        <!-- 60-day streak grid -->
        <div class="card card-animate" style="animation-delay:0.05s">
          <div class="card-label">60-day plan</div>
          <div class="streak-scroll" role="img" aria-label="60-day progress grid">
            <div class="streak-grid" id="streakGrid"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT: CTA + Stats + Weak areas -->
      <div style="display:flex; flex-direction:column; gap:12px;">

        <!-- CTA card -->
        <div class="card card-animate interactive" style="animation-delay:0.1s">
          <div class="card-label">Today's session</div>
          <div class="today-meta">
            <span class="badge" id="ctaPart">Part 1</span>
            <span class="today-topic" id="ctaTopic">Verb Tenses</span>
          </div>

          <div class="session-pills" id="sessionPills" role="group" aria-label="Session duration">
            <button class="session-pill" data-min="5" aria-pressed="false">5 min</button>
            <button class="session-pill" data-min="10" aria-pressed="false">10 min</button>
            <button class="session-pill" data-min="20" aria-pressed="false">20 min</button>
          </div>

          <a href="session.html" class="btn btn-primary btn-cta" id="sessionBtn" role="button">
            Start session
          </a>
          <p class="cta-hint" id="ctaHint">Tailored to your recent errors</p>
        </div>

        <!-- Quick stats -->
        <div class="card card-animate" style="animation-delay:0.15s" aria-label="Statistiche">
          <div class="card-label">Stats</div>
          <div class="stats-row">
            <div class="stat-cell">
              <div class="stat-val" id="statStreak">0</div>
              <div class="stat-lbl">Streak</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val" id="statAcc">—</div>
              <div class="stat-lbl">Accuracy</div>
            </div>
            <div class="stat-cell">
              <div class="stat-val" id="statLeft">60</div>
              <div class="stat-lbl">Days left</div>
            </div>
          </div>
        </div>

        <!-- Weak areas (hidden until data exists) -->
        <div id="weakSection" style="display:none;">
          <div class="section-title">Focus areas</div>
          <div class="focus-badges" id="weakBadges" aria-label="Topics to review"></div>
        </div>

      </div>
    </div>
  </main>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Home</span>
    </a>
    <a href="session.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M10 8.5l5 3.5-5 3.5V8.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Session</span>
    </a>
    <a href="test.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h8M8 12h5M8 16h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Test</span>
    </a>
    <a href="library.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>Library</span>
    </a>
    <a href="stats.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Stats</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/content.js"></script>
  <script>
  (function () {
    if (!Auth.requireAuth()) return;

    var state = State.load();
    var today = Plan.today();
    var day   = state.currentDay || 1;
    var week  = Math.ceil(day / 7);
    var completed = state.completedDays || [];

    // ─ Greeting
    document.getElementById('dayLabel').textContent = 'Day ' + day + ' of 60';
    var hour  = new Date().getHours();
    var greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    var user  = Auth.getUser();
    var name  = (user && user.email) ? user.email.split('@')[0] : '';
    document.getElementById('greetingName').textContent = name ? greet + ', ' + name : greet;

    // ─ Motivation line (data-driven)
    var doneThisWeek = completed.filter(function(d) {
      return d >= (week - 1) * 7 + 1 && d <= week * 7;
    }).length;
    var masteredCount = Adaptive.weakTopics(99).filter(function(t) { return t.pct >= 75; }).length;
    var motivText;
    if (masteredCount > 0) {
      motivText = 'You mastered ' + masteredCount + ' grammar topic' + (masteredCount > 1 ? 's' : '') + ' this week.';
    } else if (doneThisWeek > 0) {
      motivText = doneThisWeek + ' session' + (doneThisWeek > 1 ? 's' : '') + ' completed this week. Keep going.';
    } else {
      motivText = 'Week ' + week + ' — the first session is the one that counts most.';
    }
    document.getElementById('motivLine').textContent = motivText;

    // ─ Today topic
    if (today) {
      document.getElementById('ctaPart').textContent  = today.part  || 'Part 1';
      document.getElementById('ctaTopic').textContent = today.topic || 'Verb Tenses';
    }

    // ─ CTA state
    if (completed.includes(day)) {
      var btn = document.getElementById('sessionBtn');
      btn.textContent = '✓ Review session';
      btn.style.background = 'var(--success)';
      document.getElementById('ctaHint').textContent = "Today's session already completed";
    }

    // ─ Session duration pills
    var savedMin = localStorage.getItem('te_session_duration') || '10';
    document.querySelectorAll('.session-pill').forEach(function(p) {
      var isActive = p.dataset.min === savedMin;
      p.classList.toggle('active', isActive);
      p.setAttribute('aria-pressed', isActive ? 'true' : 'false');
    });
    document.getElementById('sessionPills').addEventListener('click', function(e) {
      var pill = e.target.closest('.session-pill');
      if (!pill) return;
      document.querySelectorAll('.session-pill').forEach(function(p) {
        p.classList.remove('active');
        p.setAttribute('aria-pressed', 'false');
      });
      pill.classList.add('active');
      pill.setAttribute('aria-pressed', 'true');
      localStorage.setItem('te_session_duration', pill.dataset.min);
    });

    // ─ Stats
    document.getElementById('statStreak').textContent = state.streak || 0;
    document.getElementById('statLeft').textContent   = Math.max(0, 60 - day + 1);
    var scores = state.topicScores || {};
    var keys   = Object.keys(scores).filter(function(k) { return scores[k].total > 0; });
    if (keys.length) {
      var totCorrect = keys.reduce(function(s, k) { return s + (scores[k].correct || 0); }, 0);
      var totTotal   = keys.reduce(function(s, k) { return s + (scores[k].total   || 0); }, 0);
      var avg = totTotal > 0 ? Math.round(totCorrect / totTotal * 100) : 0;
      document.getElementById('statAcc').textContent = avg + '%';
    }

    // ─ Weak areas
    var weak = Adaptive.weakTopics(3);
    if (weak.length) {
      document.getElementById('weakSection').style.display = '';
      document.getElementById('weakBadges').innerHTML = weak.map(function(t) {
        return '<span class="badge badge-error">' + t.label + '</span>';
      }).join('');
    }

    // ─ Streak grid
    var grid     = document.getElementById('streakGrid');
    var isMobile = window.innerWidth < 768;
    var startDay, endDay;
    if (isMobile) {
      startDay = Math.max(1, day - 10);
      endDay   = Math.min(60, startDay + 29);
    } else {
      startDay = 1;
      endDay   = 60;
    }

    var doneIdx = 0;
    for (var d = startDay; d <= endDay; d++) {
      var cell = document.createElement('div');
      var cls  = 'cal-day';
      if (d === day)           cls += ' today';
      else if (completed.includes(d)) { cls += ' done'; }
      else if (d > day)        cls += ' future';

      cell.className = cls;
      cell.textContent = d;
      cell.setAttribute('aria-label', 'Day ' + d +
        (d === day ? ' — today' : completed.includes(d) ? ' — completed' : ''));

      if (completed.includes(d)) {
        cell.style.animationDelay = Math.min(doneIdx * 30, 900) + 'ms';
        doneIdx++;
      }

      grid.appendChild(cell);
    }

    // Scroll today into view on mobile
    if (isMobile) {
      setTimeout(function() {
        var todayCell = grid.querySelector('.today');
        if (todayCell) todayCell.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, 400);
    }

    // Day progress bar
    var dayFill = document.getElementById('dayProgressFill');
    if (dayFill) {
      requestAnimationFrame(function () {
        dayFill.style.width = ((state.currentDay || 1) / 60 * 100).toFixed(1) + '%';
      });
    }
    // Count-up on streak stat
    function countUp(el, target) {
      if (!el || isNaN(target) || target === 0) return;
      var step = Math.max(1, target / 20);
      var cur = 0;
      (function tick() {
        cur = Math.min(cur + step, target);
        el.textContent = Math.round(cur);
        if (cur < target) requestAnimationFrame(tick);
      })();
    }
    setTimeout(function () {
      var streakEl = document.getElementById('statStreak');
      if (streakEl) {
        var val = parseInt(streakEl.textContent) || 0;
        if (val > 0) countUp(streakEl, val);
      }
    }, 100);

    // Theme toggle
    (function () {
      var SUN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      var MOON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      function isDark() {
        var t = localStorage.getItem('te_theme') || 'auto';
        if (t === 'dark') return true;
        if (t === 'light') return false;
        return window.matchMedia('(prefers-color-scheme:dark)').matches;
      }
      var btn = document.getElementById('themeBtn');
      if (!btn) return;
      btn.innerHTML = isDark() ? SUN : MOON;
      btn.addEventListener('click', function () {
        var next = isDark() ? 'light' : 'dark';
        localStorage.setItem('te_theme', next);
        document.documentElement.setAttribute('data-theme', next);
        btn.innerHTML = isDark() ? SUN : MOON;
      });
    })();

  })();
  </script>
  <script>
(function () {
  var pts = [
    {l:'10%',t:'22%',s:2,d:0,o:0.5},
    {l:'35%',t:'48%',s:1.5,d:0.7,o:0.3},
    {l:'60%',t:'15%',s:3,d:1.4,o:0.4},
    {l:'80%',t:'58%',s:2,d:0.3,o:0.35},
    {l:'22%',t:'72%',s:1.5,d:1.9,o:0.25},
    {l:'90%',t:'33%',s:2.5,d:1,o:0.3}
  ];
  var f = document.createDocumentFragment();
  pts.forEach(function (p) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.setAttribute('aria-hidden', 'true');
    el.style.cssText = 'left:'+p.l+';top:'+p.t+';width:'+p.s+'px;height:'+p.s+'px;--op:'+p.o+';animation:float-up '+(3+p.d)+'s ease-in-out '+p.d+'s infinite;';
    f.appendChild(el);
  });
  document.body.appendChild(f);
})();
</script>
<script>
(function() {
  var nav = document.querySelector('.bottom-nav');
  if (!nav) return;
  var pill = document.createElement('div');
  pill.className = 'nav-pill';
  nav.style.position = 'relative';
  nav.insertBefore(pill, nav.firstChild);
  var page = window.location.pathname.split('/').pop() || 'dashboard.html';
  if (!page) page = 'dashboard.html';
  var active = null;
  nav.querySelectorAll('.nav-item').forEach(function(item) {
    var href = (item.getAttribute('href') || '').split('/').pop();
    if (href === page || (page === 'dashboard.html' && href.includes('dashboard'))) {
      item.classList.add('active');
      active = item;
    }
  });
  if (active) {
    requestAnimationFrame(function() {
      var r = active.getBoundingClientRect();
      var nr = nav.getBoundingClientRect();
      pill.style.left = (r.left - nr.left) + 'px';
      pill.style.width = r.width + 'px';
    });
  }
})();
</script>
<script src="js/toast.js"></script>
<script src="js/transitions.js"></script>
<script src="js/shortcuts.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
