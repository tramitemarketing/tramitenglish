<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainEnglish — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-text {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .login-logo-text span {
      color: var(--accent);
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--subtext);
      margin-top: 4px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 40px rgba(180, 83, 9, 0.10), 0 1px 4px rgba(0,0,0,0.08);
    }

    .login-card h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }

    #loginError {
      display: none;
      margin-bottom: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--subtext);
    }
  </style>
</head>
<body>

<!-- Dynamic background -->
<div class="page-bg" aria-hidden="true"></div>
<div class="page-glow page-glow-1" aria-hidden="true"></div>
<div class="page-glow page-glow-2" aria-hidden="true"></div>

  <div class="login-wrap">
    <button class="topbar-icon" id="themeBtn" aria-label="Toggle theme" style="position:fixed;top:16px;right:16px;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:8px;"></button>
    <div class="login-logo">
      <div class="login-logo-text">Tram<span>it</span>English</div>
      <div class="login-subtitle">60 days to FCE B2</div>
    </div>

    <div class="login-card">
      <h2>Sign in to your account</h2>

      <div id="loginError" class="alert alert-error"></div>

      <form id="loginForm" novalidate>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="email" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
      </form>
    </div>

    <div class="login-footer">
      TrainEnglish &mdash; Your personal plan for FCE B2
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/shortcuts.js"></script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
  <script>
(function () {
  var pts = [
    {l:'10%',t:'22%',s:2,d:0,o:0.5},
    {l:'35%',t:'48%',s:1.5,d:0.7,o:0.3},
    {l:'60%',t:'15%',s:3,d:1.4,o:0.4},
    {l:'80%',t:'58%',s:2,d:0.3,o:0.35},
    {l:'22%',t:'72%',s:1.5,d:1.9,o:0.25},
    {l:'90%',t:'33%',s:2.5,d:1,o:0.3}
  ];
  var f = document.createDocumentFragment();
  pts.forEach(function (p) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.setAttribute('aria-hidden', 'true');
    el.style.cssText = 'left:'+p.l+';top:'+p.t+';width:'+p.s+'px;height:'+p.s+'px;--op:'+p.o+';animation:float-up '+(3+p.d)+'s ease-in-out '+p.d+'s infinite;';
    f.appendChild(el);
  });
  document.body.appendChild(f);
})();
</script>
  <script>
    (function () {
      // Already logged in → go to dashboard
      if (Auth.getUser()) {
        window.location.replace('dashboard.html');
        return;
      }

      const form      = document.getElementById('loginForm');
      const errorDiv  = document.getElementById('loginError');
      const loginBtn  = document.getElementById('loginBtn');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorDiv.style.display = 'none';
        loginBtn.disabled      = true;
        loginBtn.textContent   = 'Signing in...';

        try {
          await Auth.login(email, password);
          window.location.replace('dashboard.html');
        } catch (err) {
          errorDiv.textContent   = err.message || 'Invalid email or password.';
          errorDiv.style.display = 'block';
          loginBtn.disabled      = false;
          loginBtn.textContent   = 'Sign in';
        }
      });

      // Theme toggle
      (function () {
        var SUN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
        var MOON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        function isDark() {
          var t = localStorage.getItem('te_theme') || 'auto';
          if (t === 'dark') return true;
          if (t === 'light') return false;
          return window.matchMedia('(prefers-color-scheme:dark)').matches;
        }
        var btn = document.getElementById('themeBtn');
        if (!btn) return;
        btn.innerHTML = isDark() ? SUN : MOON;
        btn.addEventListener('click', function () {
          var next = isDark() ? 'light' : 'dark';
          localStorage.setItem('te_theme', next);
          document.documentElement.setAttribute('data-theme', next);
          btn.innerHTML = isDark() ? SUN : MOON;
        });
      })();
    })();
  </script>
</body>
</html>
