<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainEnglish — Accedi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-text {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .login-logo-text span {
      color: var(--accent);
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--subtext);
      margin-top: 4px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(180, 83, 9, 0.08);
    }

    .login-card h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }

    #loginError {
      display: none;
      margin-bottom: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--subtext);
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-text">Tram<span>it</span>English</div>
      <div class="login-subtitle">60 giorni al B2 FCE</div>
    </div>

    <div class="login-card">
      <h2>Accedi al tuo account</h2>

      <div id="loginError" class="alert alert-error"></div>

      <form id="loginForm" novalidate>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nome@esempio.it" autocomplete="email" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Ricordami</label>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Accedi</button>
      </form>
    </div>

    <div class="login-footer">
      TrainEnglish &mdash; Il tuo piano personale per il FCE
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      // Already logged in → go to dashboard
      if (Auth.getUser()) {
        window.location.replace('dashboard.html');
        return;
      }

      const form      = document.getElementById('loginForm');
      const errorDiv  = document.getElementById('loginError');
      const loginBtn  = document.getElementById('loginBtn');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorDiv.style.display = 'none';
        loginBtn.disabled      = true;
        loginBtn.textContent   = 'Accesso in corso...';

        try {
          await Auth.login(email, password);
          window.location.replace('dashboard.html');
        } catch (err) {
          errorDiv.textContent   = err.message || 'Credenziali non valide. Riprova.';
          errorDiv.style.display = 'block';
          loginBtn.disabled      = false;
          loginBtn.textContent   = 'Accedi';
        }
      });
    })();
  </script>
</body>
</html>
