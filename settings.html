<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainEnglish — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <style>
    .settings-content {
      padding-top: calc(var(--topbar-h) + 16px);
      padding-bottom: 32px;
      padding-left: 16px;
      padding-right: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .user-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: var(--accent);
      margin: 0 auto 12px;
    }

    .user-email {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .user-role {
      text-align: center;
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 24px;
    }

    .settings-section {
      margin-bottom: 24px;
    }

    .readonly-field {
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--subtext);
    }

    .version-tag {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 32px;
    }

    .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .theme-toggle-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .theme-btn {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text2);
      border: none;
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: background .15s, color .15s;
    }
    .theme-btn:last-child { border-right: none; }
    .theme-btn.active {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>

<!-- Dynamic background -->
<div class="page-bg" aria-hidden="true"></div>
<div class="page-glow page-glow-1" aria-hidden="true"></div>
<div class="page-glow page-glow-2" aria-hidden="true"></div>

  <!-- Topbar -->
  <header class="topbar">
    <a href="dashboard.html" class="topbar-back">&#8592;</a>
    <span class="topbar-title">Settings</span>
    <span style="width:36px"></span>
  </header>

  <!-- Main content (no bottom nav on this page) -->
  <main class="settings-content">

    <!-- User profile -->
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-email" id="userEmail">caricamento...</div>
    <div class="user-role">60-day plan — FCE B2</div>

    <!-- Account section -->
    <div class="settings-section">
      <div class="form-section-title">Account</div>
      <div class="card">
        <div class="input-group">
          <label>Email</label>
          <div class="readonly-field" id="emailField">—</div>
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Account status</label>
          <div class="readonly-field">Active &#10003;</div>
        </div>
      </div>
    </div>

    <!-- Change password section -->
    <div class="settings-section">
      <div class="form-section-title">Change Password</div>
      <div class="card">
        <div id="pwAlert" style="display:none;margin-bottom:12px"></div>
        <div class="input-group">
          <label for="currentPw">Current password</label>
          <input type="password" id="currentPw" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="input-group">
          <label for="newPw">New password</label>
          <input type="password" id="newPw" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label for="confirmPw">Confirm new password</label>
          <input type="password" id="confirmPw" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="mt-16">
          <button class="btn btn-secondary" id="changePwBtn">Update password</button>
        </div>
      </div>
    </div>

    <!-- Progress section -->
    <div class="settings-section">
      <div class="form-section-title">Progress</div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:13px;font-weight:600;color:var(--text2)">Current day</span>
          <span class="badge" id="currentDayBadge">1 / 60</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:600;color:var(--text2)">Days completed</span>
          <span class="badge" id="completedBadge">0</span>
        </div>
      </div>
    </div>

    <!-- Appearance -->
    <div class="settings-section">
      <div class="form-section-title">Appearance</div>
      <div class="card">
        <div class="theme-row">
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text2)">Theme</div>
            <div style="font-size:12px;color:var(--subtext);margin-top:2px" id="themeLabel">System default</div>
          </div>
          <div class="theme-toggle-group">
            <button class="theme-btn" data-theme="light" id="themeBtnLight">Light</button>
            <button class="theme-btn" data-theme="auto"  id="themeBtnAuto">Auto</button>
            <button class="theme-btn" data-theme="dark"  id="themeBtnDark">Dark</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Notifications (future) -->
    <div class="settings-section">
      <div class="form-section-title">Notifications</div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text2)">Daily reminder</div>
            <div style="font-size:12px;color:var(--subtext);margin-top:2px">Coming soon</div>
          </div>
          <div class="tag">Soon</div>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <div class="settings-section">
      <div class="form-section-title">Session</div>
      <button class="btn btn-danger" id="logoutBtn">Sign out</button>
    </div>

    <div class="version-tag">TrainEnglish v0.1.0 &mdash; 60 days to FCE B2</div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      if (!Auth.requireAuth()) return;

      var user  = Auth.getUser();
      var state = State.load();

      // Fill user info
      var email   = user ? user.email : '—';
      var initials = email ? email.charAt(0).toUpperCase() : '?';
      document.getElementById('userAvatar').textContent  = initials;
      document.getElementById('userEmail').textContent   = email;
      document.getElementById('emailField').textContent  = email;
      document.getElementById('currentDayBadge').textContent = (state.currentDay || 1) + ' / 60';
      document.getElementById('completedBadge').textContent  = (state.completedDays || []).length;

      // Change password (stub — wire up Supabase)
      document.getElementById('changePwBtn').addEventListener('click', function () {
        var curr    = document.getElementById('currentPw').value;
        var newPw   = document.getElementById('newPw').value;
        var confirm = document.getElementById('confirmPw').value;
        var alertEl = document.getElementById('pwAlert');

        alertEl.style.display = 'none';

        if (!curr || !newPw || !confirm) {
          alertEl.className = 'alert alert-error';
          alertEl.textContent = 'Please fill in all fields.';
          alertEl.style.display = '';
          return;
        }

        if (newPw !== confirm) {
          alertEl.className = 'alert alert-error';
          alertEl.textContent = 'Passwords do not match.';
          alertEl.style.display = '';
          return;
        }

        if (newPw.length < 8) {
          alertEl.className = 'alert alert-error';
          alertEl.textContent = 'Password must be at least 8 characters.';
          alertEl.style.display = '';
          return;
        }

        // TODO: await _supabase.auth.updateUser({ password: newPw })
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Password updated successfully. (stub)';
        alertEl.style.display = '';

        document.getElementById('currentPw').value = '';
        document.getElementById('newPw').value     = '';
        document.getElementById('confirmPw').value = '';
      });

      // ── Theme toggle ───────────────────────────────────────────
      var THEME_LABELS = { light: 'Always light', auto: 'System default', dark: 'Always dark' };

      function applyTheme(t) {
        if (t === 'dark')       document.documentElement.setAttribute('data-theme', 'dark');
        else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        else                    document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('te_theme', t);
        document.getElementById('themeLabel').textContent = THEME_LABELS[t] || '';
        document.querySelectorAll('.theme-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.theme === t);
        });
      }

      var savedTheme = localStorage.getItem('te_theme') || 'auto';
      applyTheme(savedTheme);

      document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { applyTheme(btn.dataset.theme); });
      });

      // Logout
      document.getElementById('logoutBtn').addEventListener('click', function () {
        if (!confirm('Sign out of your account?')) return;
        Auth.logout();
      });

    })();
  </script>
<script>
(function () {
  var pts = [
    {l:'10%',t:'22%',s:2,d:0,o:0.5},
    {l:'35%',t:'48%',s:1.5,d:0.7,o:0.3},
    {l:'60%',t:'15%',s:3,d:1.4,o:0.4},
    {l:'80%',t:'58%',s:2,d:0.3,o:0.35},
    {l:'22%',t:'72%',s:1.5,d:1.9,o:0.25},
    {l:'90%',t:'33%',s:2.5,d:1,o:0.3}
  ];
  var f = document.createDocumentFragment();
  pts.forEach(function (p) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.setAttribute('aria-hidden', 'true');
    el.style.cssText = 'left:'+p.l+';top:'+p.t+';width:'+p.s+'px;height:'+p.s+'px;--op:'+p.o+';animation:float-up '+(3+p.d)+'s ease-in-out '+p.d+'s infinite;';
    f.appendChild(el);
  });
  document.body.appendChild(f);
})();
</script>
<script src="js/toast.js"></script>
<script src="js/transitions.js"></script>
<script src="js/shortcuts.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
