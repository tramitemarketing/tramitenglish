# BLOCCO 10 — REPORTED SPEECH (giorni 37–39)
# ─────────────────────────────────────────

- slug: reported_speech_tense_backshift
  tags: [reported_speech, reported_speech_block, reported_tense_backshift, part4_transformation]
  title_en: "Reported Speech — Tense Backshift"
  title_it: "Discorso Indiretto — Retrocessione dei Tempi"
  display_order: 100
  rule_en: |
    When reporting what someone said (not their exact words), shift verb tenses back:

    | Direct | Reported |
    |---|---|
    | «I **am** tired» | He said he **was** tired. |
    | «I **work** here» | She said she **worked** there. |
    | «I **have finished**» | He said he **had finished**. |
    | «I **was** reading» | She said she **had been** reading. |
    | «I **will** come» | He said he **would** come. |
    | «I **can** help» | She said she **could** help. |

    Also change: time expressions (now→then, today→that day, yesterday→the day before)
    and place/person references (here→there, this→that, I→he/she).

    ⚠️ No backshift needed if the situation is still true now:
    → *He said the Earth orbits the Sun.* (still true)
  rule_it: |
    Quando riporti ciò che qualcuno ha detto (non le parole esatte), fai retrocedere i tempi verbali:

    | Discorso Diretto | Indiretto |
    |---|---|
    | «I **am** tired» | He said he **was** tired. |
    | «I **work** here» | She said she **worked** there. |
    | «I **have finished**» | He said he **had finished**. |
    | «I **was** reading» | She said she **had been** reading. |
    | «I **will** come» | He said he **would** come. |
    | «I **can** help» | She said she **could** help. |

    Cambia anche: espressioni di tempo (now→then, today→that day, yesterday→the day before)
    e riferimenti di luogo/persona (here→there, this→that, I→he/she).

    ⚠️ Nessuna retrocessione se la situazione è ancora vera ora:
    → *He said the Earth orbits the Sun.* (ancora vero)
  example_basic:
    en: "«I will finish by tomorrow,» she said. → She said she would finish by the following day."
    it: "«Finirò entro domani», disse. → Disse che avrebbe finito entro il giorno seguente."
  example_complex:
    en: "The spokesperson claimed that the company had been unaware of the irregularities and insisted that immediate measures would be taken to address the concerns raised by the committee."
    it: "Il portavoce ha affermato che l'azienda non era a conoscenza delle irregolarità e ha insistito sul fatto che sarebbero state adottate misure immediate per affrontare le preoccupazioni sollevate dal comitato."
  vocabulary:
    - word: spokesperson
      pos: noun
      ipa: /ˈspəʊkspɜːsən/
      meaning_it: portavoce
    - word: unaware (of)
      pos: adjective
      ipa: /ˌʌnəˈwɛə/
      meaning_it: inconsapevole di, non a conoscenza di
    - word: irregularity
      pos: noun
      ipa: /ɪˌrɛɡjʊˈlærɪti/
      meaning_it: irregolarità
    - word: immediate
      pos: adjective
      ipa: /ɪˈmiːdiət/
      meaning_it: immediato
    - word: concern
      pos: noun
      ipa: /kənˈsɜːn/
      meaning_it: preoccupazione, problema
  story_it: |
    Il laboratorio del professor Verne ha un registratore che cattura i discorsi
    e poi li manda indietro nel tempo di un gradino.
    Il Gigante dice: «I am hungry NOW.»
    Il registratore fa CLICK e sposta il pulsante: una tacca indietro.
    L'ADESSO diventa ALLORA: «He said he WAS hungry» — la fame era allora, non ora.
    Marco sente il cambio come un piccolo colpo d'aria fredda sul viso
    (il tempo si sposta leggermente indietro, temperatura cala di un grado).
    Se il Gigante dice «The Earth is round» (verità permanente), il registratore
    si blocca — nessun click, nessun cambio (verità eterna non retrocede).
    Prima il discorso diretto (il Gigante parla),
    poi il registratore retrocede di un gradino, poi il discorso indiretto esce.
    Non si può sentire il risultato prima che il Gigante abbia parlato.

- slug: reported_speech_reporting_verbs
  tags: [reported_speech, reported_speech_block, reporting_verb_advise, reporting_verb_suggest, part4_transformation]
  title_en: "Reported Speech — Reporting Verbs (advise, suggest, warn, deny…)"
  title_it: "Discorso Indiretto — Verbi di Reporting (advise, suggest, warn, deny…)"
  display_order: 101
  rule_en: |
    Instead of just «said», use specific reporting verbs — each has its own grammar structure:

    **+ to-infinitive**: advise / warn / tell / encourage / remind / urge / invite / ask
    → *She advised him **to see** a doctor.* / *He warned us **not to trust** them.*

    **+ -ing**: admit / deny / suggest / recommend / regret / accuse sb of
    → *He denied **stealing** the money.* / *She suggested **going** by train.*

    **+ that + clause**: claim / insist / agree / argue / explain / confirm / believe
    → *He claimed **that he had not been** informed.*

    ⚠️ «suggest» NEVER + to-infinitive: NOT «*She suggested to go.*» → «She suggested going.»
  rule_it: |
    Invece di usare solo «said», usa verbi di reporting specifici — ognuno ha la propria struttura grammaticale:

    **+ to-infinitive**: advise / warn / tell / encourage / remind / urge / invite / ask
    → *She advised him **to see** a doctor.* / *He warned us **not to trust** them.*

    **+ -ing**: admit / deny / suggest / recommend / regret / accuse sb of
    → *He denied **stealing** the money.* / *She suggested **going** by train.*

    **+ that + clause**: claim / insist / agree / argue / explain / confirm / believe
    → *He claimed **that he had not been** informed.*

    ⚠️ «suggest» NON vuole mai il to-infinitive: NON «*She suggested to go.*» → «She suggested going.»
  example_basic:
    en: "He denied taking the money but admitted making a serious error of judgement."
    it: "Ha negato di aver preso i soldi ma ha ammesso di aver commesso un grave errore di valutazione."
  example_complex:
    en: "The consultant strongly advised the board to reconsider their position, warned them against proceeding hastily, and suggested bringing in an independent expert before reaching any final agreement."
    it: "Il consulente ha consigliato vivamente al consiglio di riconsiderare la propria posizione, li ha avvertiti di non procedere frettolosamente e ha suggerito di coinvolgere un esperto indipendente prima di raggiungere un accordo definitivo."
  vocabulary:
    - word: reconsider
      pos: verb
      ipa: /ˌriːkənˈsɪdə/
      meaning_it: riconsiderare, ripensarci
    - word: hastily
      pos: adverb
      ipa: /ˈheɪstɪli/
      meaning_it: frettolosamente, in fretta
    - word: independent
      pos: adjective
      ipa: /ˌɪndɪˈpɛndənt/
      meaning_it: indipendente
    - word: consultant
      pos: noun
      ipa: /kənˈsʌltənt/
      meaning_it: consulente
    - word: proceed
      pos: verb
      ipa: /prəˈsiːd/
      meaning_it: procedere, andare avanti
  story_it: |
    Il professor Verne ha una scatola di cacciaviti — uno per ogni verbo di reporting.
    Il cacciavite ADVISE ha una punta a FRECCIA (punta verso il to-infinitive).
    Il cacciavite DENY ha una punta ROTONDA (si avvita su -ING).
    Il cacciavite CLAIM ha una punta PIATTA (si inserisce nel that-clause).
    Marco prende SUGGEST e cerca il cacciavite freccia (to-infinitive):
    il professor Verne gli blocca la mano — «No! Suggest ha la punta rotonda.
    Non *suggest to go*. Suggest going.» Il cacciavite sbagliato non entra nella vite —
    fa un rumore stridulo (suono di metallo sul metallo), odore di metallo.
    Prima identifichi il verbo di reporting, poi scegli il cacciavite giusto,
    poi avviti la struttura. Non puoi avvitare prima di scegliere la punta.

- slug: reported_questions
  tags: [reported_speech, reported_speech_block, reported_questions, part4_transformation]
  title_en: "Reported Speech — Reported Questions"
  title_it: "Discorso Indiretto — Domande Indirette"
  display_order: 102
  rule_en: |
    Reported questions use **statement word order** (NOT question word order) and NO question mark.

    **Wh- questions**: wh-word + subject + verb
    → «Where do you live?» → She asked me **where I lived**. (NOT *where did I live?*)

    **Yes/No questions**: use **whether** or **if** + subject + verb
    → «Are you coming?» → He asked **whether/if I was coming**.

    Changes: tense backshift applies; do/does/did disappear; question mark disappears.

    ⚠️ «He asked me where **did** I live» is a very common error — remove the auxiliary!
  rule_it: |
    Le domande indirette usano l'**ordine affermativo** (NON quello interrogativo) e NESSUN punto interrogativo.

    **Domande con wh-**: wh-word + soggetto + verbo
    → «Where do you live?» → She asked me **where I lived**. (NON *where did I live?*)

    **Domande sì/no**: usa **whether** o **if** + soggetto + verbo
    → «Are you coming?» → He asked **whether/if I was coming**.

    Cambiamenti: retrocessione dei tempi; do/does/did scompaiono; il punto interrogativo scompare.

    ⚠️ «He asked me where **did** I live» è un errore molto comune — rimuovi l'ausiliare!
  example_basic:
    en: "She asked whether I had ever visited the city and where I was planning to stay."
    it: "Ha chiesto se avessi mai visitato la città e dove stavo pianificando di soggiornare."
  example_complex:
    en: "The interviewer enquired whether the candidate had previous experience in the field and asked what strategies she would implement to address the most pressing operational challenges."
    it: "L'intervistatore ha chiesto se la candidata avesse esperienza precedente nel settore e ha domandato quali strategie avrebbe attuato per affrontare le sfide operative più urgenti."
  vocabulary:
    - word: enquire
      pos: verb
      ipa: /ɪnˈkwaɪə/
      meaning_it: chiedere (formale), informarsi
    - word: previous
      pos: adjective
      ipa: /ˈpriːviəs/
      meaning_it: precedente
    - word: implement
      pos: verb
      ipa: /ˈɪmplɪmɛnt/
      meaning_it: attuare, implementare
    - word: pressing
      pos: adjective
      ipa: /ˈprɛsɪŋ/
      meaning_it: urgente, pressante
    - word: operational
      pos: adjective
      ipa: /ˌɒpəˈreɪʃənəl/
      meaning_it: operativo, operazionale
  story_it: |
    Le domande dirette entrano nel Grammar Lab con le antenne alzate (punto interrogativo in cima).
    Appena passano la porta del «reported speech», il buttafuori (il professor Verne)
    le ferma e le fa sdraiare — ordine affermativo, antenne giù.
    L'antenna DO/DID viene confiscata all'ingresso (sparisce in una scatola sigillata —
    rumore di cassetto che si chiude). Il punto interrogativo rimane fuori dalla porta.
    La domanda WH- entra con il wh-word davanti e poi soggetto + verbo: normale, tranquilla.
    La domanda sì/no si trasforma: riceve un badge WHETHER o IF all'ingresso
    (si sente il ticchettio della macchinetta del badge).
    Il Gigante prova a tenere le antenne alzate dentro: il soffitto basso le piega.
    Paradossale ma fisicamente inevitabile: dentro la reported speech, le antenne non stanno dritte.


# ─────────────────────────────────────────
# BLOCCO 11 — WISH / IF ONLY (giorni 40–42)
# ─────────────────────────────────────────

- slug: wish_present_situation
  tags: [wish_if_only, wish_block, wish_present, part4_transformation]
  title_en: "Wish / If only — Present Situation (Wish + Past Simple)"
  title_it: "Wish / If only — Situazione Presente (Wish + Past Simple)"
  display_order: 110
  rule_en: |
    To express **dissatisfaction with the present** — you wish something were different NOW.

    Form: **wish / if only + past simple** (even though we mean NOW, not the past!)
    → *I wish I **had** more time.* (I don't have enough time — present reality)
    → *If only she **lived** closer.* (she doesn't live close — present reality)
    → *I wish I **could** speak French.* (I can't — present ability)

    ⚠️ «wish + would» is for PEOPLE'S BEHAVIOUR (see next entry), not for your own wishes
    ⚠️ «wish + was/were»: both are acceptable, but **were** is more formal in all persons:
    → *I wish it **were** warmer.* / *I wish I **were** taller.*
  rule_it: |
    Per esprimere **insoddisfazione per il presente** — desideri che qualcosa fosse diverso ORA.

    Forma: **wish / if only + past simple** (anche se parliamo di ORA, non del passato!)
    → *I wish I **had** more time.* (non ho abbastanza tempo — realtà presente)
    → *If only she **lived** closer.* (non vive vicino — realtà presente)
    → *I wish I **could** speak French.* (non posso — abilità presente)

    ⚠️ «wish + would» è per il COMPORTAMENTO ALTRUI (vedi voce successiva), non per i propri desideri
    ⚠️ «wish + was/were»: entrambi accettabili, ma **were** è più formale per tutte le persone:
    → *I wish it **were** warmer.* / *I wish I **were** taller.*
  example_basic:
    en: "I wish I had more experience — if only I had applied for that position last year."
    it: "Vorrei avere più esperienza — se solo avessi fatto domanda per quella posizione l'anno scorso."
  example_complex:
    en: "If only the committee were more transparent in its decision-making process; many stakeholders wish they had greater access to the relevant documentation."
    it: "Se solo il comitato fosse più trasparente nel suo processo decisionale; molti stakeholder vorrebbero avere maggiore accesso alla documentazione pertinente."
  vocabulary:
    - word: transparent
      pos: adjective
      ipa: /trænsˈpærənt/
      meaning_it: trasparente (anche figurato)
    - word: decision-making
      pos: noun phrase
      ipa: /dɪˈsɪʒən ˌmeɪkɪŋ/
      meaning_it: processo decisionale
    - word: stakeholder
      pos: noun
      ipa: /ˈsteɪkˌhəʊldə/
      meaning_it: portatore di interesse, stakeholder
    - word: documentation
      pos: noun
      ipa: /ˌdɒkjʊmɛnˈteɪʃən/
      meaning_it: documentazione
    - word: relevant
      pos: adjective
      ipa: /ˈrɛlɪvənt/
      meaning_it: pertinente, rilevante
  story_it: |
    Nel Grammar Lab c'è uno specchio magico che mostra la realtà al contrario —
    il mondo che VORRESTI fosse vero. Marco ci si avvicina (vetro fresco al tatto):
    nello specchio si vede con i capelli perfetti, parla francese fluentemente.
    Nella realtà: capelli disordinati, francese nullo.
    «I wish I **had**…» — il verbo nello specchio è al PASSATO
    ma descrive il PRESENTE desiderato. Paradossale: il passato per il presente.
    Il professor Verne spiega: «Lo specchio usa il passato come linguaggio del desiderio —
    non del tempo.» Il Gigante prova «I wish I have»:
    lo specchio si incrina con un CRACK sottile (suono di vetro fragile),
    odore di aria fredda che esce dalla crepa — grammatica rotta.
    Prima la realtà attuale (insoddisfazione), poi lo specchio (wish + past),
    poi il desiderio riflesso. Non si può vedere il riflesso senza lo specchio.

- slug: wish_past_regret
  tags: [wish_if_only, wish_block, wish_past_regret, part4_transformation]
  title_en: "Wish / If only — Past Regret (Wish + Past Perfect)"
  title_it: "Wish / If only — Rimpianto Passato (Wish + Past Perfect)"
  display_order: 111
  rule_en: |
    To express **regret about a past action or situation** — something happened (or didn't)
    and you wish it had been different.

    Form: **wish / if only + past perfect (had + pp)**
    → *I wish I **had studied** harder.* (I didn't study hard — I regret it now)
    → *If only she **hadn't said** that.* (she said it — bad result)
    → *I wish I **had taken** that job.* (I didn't take it — I regret it)

    ⚠️ The action is FINISHED — you cannot change it. This is pure regret.
    ⚠️ Italian trap: In Italian «Vorrei aver studiato» maps exactly to «I wish I had studied».
  rule_it: |
    Per esprimere **rimpianto per un'azione passata** — qualcosa è successo (o non è successo)
    e vorresti che fosse andato diversamente.

    Forma: **wish / if only + past perfect (had + pp)**
    → *I wish I **had studied** harder.* (non ho studiato abbastanza — me ne pento)
    → *If only she **hadn't said** that.* (l'ha detto — brutto risultato)
    → *I wish I **had taken** that job.* (non l'ho preso — me ne pento)

    ⚠️ L'azione è FINITA — non puoi cambiarla. Questo è puro rimpianto.
    ⚠️ Trappola italiana: «Vorrei aver studiato» corrisponde esattamente a «I wish I had studied».
  example_basic:
    en: "I wish I had saved more money — if only I hadn't spent so much last summer."
    it: "Vorrei aver risparmiato di più — se solo non avessi speso tanto l'estate scorsa."
  example_complex:
    en: "If only the project manager had flagged the budget shortfall earlier; the board wish they had been given adequate warning before the situation became irreversible."
    it: "Se solo il project manager avesse segnalato prima la carenza di budget; il consiglio vorrebbe aver ricevuto un avvertimento adeguato prima che la situazione diventasse irreversibile."
  vocabulary:
    - word: flag (an issue)
      pos: verb
      ipa: /flæɡ/
      meaning_it: segnalare, evidenziare (un problema)
    - word: shortfall
      pos: noun
      ipa: /ˈʃɔːtfɔːl/
      meaning_it: carenza, deficit, ammanco
    - word: adequate
      pos: adjective
      ipa: /ˈædɪkwɪt/
      meaning_it: adeguato, sufficiente
    - word: irreversible
      pos: adjective
      ipa: /ˌɪrɪˈvɜːsɪbəl/
      meaning_it: irreversibile
    - word: warning
      pos: noun
      ipa: /ˈwɔːnɪŋ/
      meaning_it: avvertimento, avviso
  story_it: |
    Lo stesso specchio magico di prima ora è ammaccato e annerito —
    la realtà è già successa e non si può cambiare.
    Marco ci batte sopra con il pugno (tatto: dolore lieve, superficie fredda),
    ma l'immagine è congelata: vede se stesso che non studia ieri sera.
    «I wish I **had studied**» — il past perfect nel rimpianto:
    HAD è come una mano che tende verso il passato dentro lo specchio ammaccato,
    il participio è l'azione che avresti voluto fare.
    Il professor Verne annusa lo specchio: odore di fumo vecchio, rimpianto bruciato.
    La differenza con lo specchio del presente: quello era freddo e integro (ancora cambiabile),
    questo è ammaccato e tiepido (già successo, irrimediabile).
    Prima la fotografia del passato (hai già visto cosa è successo),
    poi la mano che tende verso il cambiamento impossibile (wish + had + pp).
    Non puoi rimpiangere qualcosa che non è ancora avvenuto.

- slug: wish_would_annoyance
  tags: [wish_if_only, wish_block, wish_would_annoyance, part4_transformation]
  title_en: "Wish + would — Annoyance & Desire for Change"
  title_it: "Wish + would — Fastidio e Desiderio di Cambiamento"
  display_order: 112
  rule_en: |
    Use **wish + would** to express **annoyance** about someone's behaviour
    or a strong desire for something to change (often repeated or ongoing situation).

    → *I wish you **would** stop interrupting me.* (you keep interrupting — it's annoying)
    → *I wish it **would** stop raining.* (the rain is ongoing and annoying — not a person)
    → *If only they **would** reply to my emails.*

    ⚠️ Do NOT use **wish + would** about yourself (except «I wish I could» — that's different)
    → NOT «*I wish I would study more.*» → Use: «I wish I **studied** more.» (wish + past simple)

    ⚠️ «I wish you **would**» = you're being annoying / please change.
    «I wish you **were**» = I wish you were different (your nature, not your behaviour)
  rule_it: |
    Usa **wish + would** per esprimere **fastidio** per il comportamento di qualcuno
    o un forte desiderio che qualcosa cambi (spesso situazione ripetuta o in corso).

    → *I wish you **would** stop interrupting me.* (mi interrompi continuamente — è fastidioso)
    → *I wish it **would** stop raining.* (piove continuamente — fastidioso)
    → *If only they **would** reply to my emails.*

    ⚠️ NON usare **wish + would** parlando di sé stessi (eccetto «I wish I could» — è diverso)
    → NON «*I wish I would study more.*» → Usa: «I wish I **studied** more.» (wish + past simple)

    ⚠️ «I wish you **would**» = sei fastidioso / per favore cambia.
    «I wish you **were**» = vorrei che fossi diverso (natura, non comportamento)
  example_basic:
    en: "I wish my colleague would stop leaving the kitchen in such a mess."
    it: "Vorrei che il mio collega smettesse di lasciare la cucina in tale disordine."
  example_complex:
    en: "If only the authorities would introduce stricter regulations; many residents wish they would take more decisive action to address the persistent noise pollution in the area."
    it: "Se solo le autorità introducessero normative più severe; molti residenti vorrebbero che prendessero misure più decisive per affrontare il persistente inquinamento acustico nella zona."
  vocabulary:
    - word: authorities
      pos: noun (plural)
      ipa: /ɔːˈθɒrɪtiz/
      meaning_it: autorità, istituzioni
    - word: regulation
      pos: noun
      ipa: /ˌrɛɡjʊˈleɪʃən/
      meaning_it: normativa, regolamento
    - word: decisive
      pos: adjective
      ipa: /dɪˈsaɪsɪv/
      meaning_it: decisivo, risoluto
    - word: persistent
      pos: adjective
      ipa: /pəˈsɪstənt/
      meaning_it: persistente, continuo
    - word: noise pollution
      pos: noun phrase
      ipa: /nɔɪz pəˈluːʃən/
      meaning_it: inquinamento acustico
  story_it: |
    Il terzo specchio del Grammar Lab è ROSSO e vibra continuamente —
    è lo specchio del fastidio. Marco ci guarda dentro e vede il Gigante
    che batte i piedi per terra, ancora e ancora (si sente il BOOM di ogni passo,
    il pavimento che trema sotto i piedi di Marco). Irritante, ripetuto, continuo.
    «I wish he **would** stop» — il WOULD è come un segnale d'allarme rosso
    che si accende ogni volta che l'azione si ripete (lampeggia, odore di plastica calda).
    Diverso dagli altri specchi: questo non descrive una singola situazione —
    descrive un COMPORTAMENTO ALTRUI che vuoi cambiare.
    Marco prova «I wish I would study more» — lo specchio rosso lo respinge (si sente l'aria compressa).
    Non funziona su sé stessi: per i propri desideri si torna allo specchio integro (wish + past simple).
    Prima il comportamento fastidioso ripetuto, poi lo specchio rosso, poi il WOULD.


# ─────────────────────────────────────────
# BLOCCO 12 — GERUND & INFINITIVE (giorni 43–45)
# ─────────────────────────────────────────

- slug: verb_gerund_patterns
  tags: [gerund_infinitive, gerund_infinitive_block, verb_gerund, part4_transformation]
  title_en: "Gerund & Infinitive — Verbs followed by -ing"
  title_it: "Gerundio & Infinito — Verbi seguiti da -ing"
  display_order: 120
  rule_en: |
    These verbs are ALWAYS followed by the **gerund (-ing form)**:

    **Mind, Deny, Admit, Avoid, Consider, Delay, Enjoy, Finish, Imagine, Keep, Miss,
    Practise, Recommend, Risk, Suggest, Can't help, Can't stand, Give up, Put off**

    → *He denied **stealing** the money.*
    → *I enjoy **reading** in the evenings.*
    → *She suggested **going** by train.*
    → *I can't help **laughing** when I see that.*

    Also after **prepositions**: be interested in doing / without doing / instead of doing

    ⚠️ «avoid» is NEVER followed by to-infinitive: NOT «*avoid to make*»
  rule_it: |
    Questi verbi sono SEMPRE seguiti dal **gerundio (-ing)**:

    **Mind, Deny, Admit, Avoid, Consider, Delay, Enjoy, Finish, Imagine, Keep, Miss,
    Practise, Recommend, Risk, Suggest, Can't help, Can't stand, Give up, Put off**

    → *He denied **stealing** the money.*
    → *I enjoy **reading** in the evenings.*
    → *She suggested **going** by train.*
    → *I can't help **laughing** when I see that.*

    Anche dopo le **preposizioni**: be interested in doing / without doing / instead of doing

    ⚠️ «avoid» non è MAI seguito dal to-infinitive: NON «*avoid to make*»
  example_basic:
    en: "I keep putting off finishing my assignment — I can't help avoiding it."
    it: "Continuo a rimandare il completamento del compito — non riesco a fare a meno di evitarlo."
  example_complex:
    en: "The board considered postponing the launch but ultimately decided against delaying any further, despite recommendations suggesting waiting for more favourable market conditions."
    it: "Il consiglio ha considerato di posticipare il lancio ma ha infine deciso di non ritardare ulteriormente, nonostante le raccomandazioni di attendere condizioni di mercato più favorevoli."
  vocabulary:
    - word: postpone
      pos: verb
      ipa: /pəʊstˈpəʊn/
      meaning_it: posticipare, rimandare
    - word: launch
      pos: noun
      ipa: /lɔːntʃ/
      meaning_it: lancio (di un prodotto/evento)
    - word: ultimately
      pos: adverb
      ipa: /ˈʌltɪmɪtli/
      meaning_it: alla fine, in definitiva
    - word: favourable
      pos: adjective
      ipa: /ˈfeɪvərəbəl/
      meaning_it: favorevole, propizio
    - word: conditions
      pos: noun (plural)
      ipa: /kənˈdɪʃənz/
      meaning_it: condizioni
  story_it: |
    Nel Grammar Lab c'è un tubo rotondo (il gerundio è tondo, rotante — -ING gira su sé stesso).
    I verbi DENY, AVOID, ENJOY, SUGGEST sono calamite che ATTRAGGONO solo il tubo rotondo.
    Marco porta «suggest» vicino al tubo: CLACK, si agganciano.
    Porta «suggest» vicino alla freccia retta (to-infinitive): respinta.
    La freccia retta odora di metallo freddo, il tubo rotondo odora di legno caldo.
    «Can't help» è speciale: è una trappola magnetica — ti attira il gerundio
    ANCHE quando non vuoi. Il prof. Verne dice: «Non puoi resistere — can't help laughing.»
    Prima identifica il verbo (è una calamita per -ING?),
    poi il gerundio si aggancia automaticamente. Il Gigante porta «avoid» alla freccia:
    la freccia gli si inchioda alla mano con un suono acuto — errore fisico, impossibile ignorarlo.

- slug: verb_infinitive_patterns
  tags: [gerund_infinitive, gerund_infinitive_block, verb_infinitive, part4_transformation]
  title_en: "Gerund & Infinitive — Verbs followed by to-infinitive"
  title_it: "Gerundio & Infinito — Verbi seguiti da to-infinitive"
  display_order: 121
  rule_en: |
    These verbs are ALWAYS followed by the **to-infinitive**:

    **Afford, Agree, Aim, Arrange, Choose, Decide, Expect, Fail, Hope, Learn,
    Manage, Need, Offer, Plan, Pretend, Promise, Refuse, Seem, Tend, Want, Wish**

    → *She managed **to finish** in time.*
    → *He refused **to answer** any questions.*
    → *They expect **to receive** a response by Friday.*

    Also: **want / ask / tell / expect / advise / encourage / remind + object + to-inf**
    → *She told him **to leave**.*  / *I reminded her **to call**.*
  rule_it: |
    Questi verbi sono SEMPRE seguiti dal **to-infinitive**:

    **Afford, Agree, Aim, Arrange, Choose, Decide, Expect, Fail, Hope, Learn,
    Manage, Need, Offer, Plan, Pretend, Promise, Refuse, Seem, Tend, Want, Wish**

    → *She managed **to finish** in time.*
    → *He refused **to answer** any questions.*
    → *They expect **to receive** a response by Friday.*

    Anche: **want / ask / tell / expect / advise / encourage / remind + oggetto + to-inf**
    → *She told him **to leave**.*  / *I reminded her **to call**.*
  example_basic:
    en: "He refused to acknowledge the problem and failed to provide any satisfactory explanation."
    it: "Ha rifiutato di riconoscere il problema e non è riuscito a fornire alcuna spiegazione soddisfacente."
  example_complex:
    en: "The organisation managed to secure substantial funding after agreeing to implement more rigorous oversight measures, which it had previously failed to enforce adequately."
    it: "L'organizzazione è riuscita ad assicurarsi finanziamenti sostanziali dopo aver accettato di implementare misure di supervisione più rigorose, che in precedenza non era riuscita ad applicare adeguatamente."
  vocabulary:
    - word: secure (funding)
      pos: verb
      ipa: /sɪˈkjʊə/
      meaning_it: assicurarsi, ottenere
    - word: rigorous
      pos: adjective
      ipa: /ˈrɪɡərəs/
      meaning_it: rigoroso, severo
    - word: oversight
      pos: noun
      ipa: /ˈəʊvəsaɪt/
      meaning_it: "supervisione, controllo (anche: svista)"
    - word: enforce
      pos: verb
      ipa: /ɪnˈfɔːs/
      meaning_it: far rispettare, applicare
    - word: satisfactory
      pos: adjective
      ipa: /ˌsætɪsˈfæktəri/
      meaning_it: soddisfacente, adeguato
  story_it: |
    La freccia retta del Grammar Lab (to-infinitive) è attratta dai verbi MANAGE, REFUSE, HOPE.
    È una freccia di metallo cromato, fredda, dritta — punta sempre avanti verso il futuro.
    «Manage» la afferra con la mano destra (si sente il click della freccia in mano),
    «refuse» la respinge con forza (la freccia vola via ma torna — magnetismo).
    Il professor Verne tiene la lista: «Questi verbi guardano AVANTI — vogliono la freccia,
    non il tubo rotondo.» Marco porta REFUSE vicino al tubo -ING:
    odore di plastica bruciata, rumore di attrito — rifiuto totale.
    Prima identifica il verbo (freccia o tubo?), poi aggancia il giusto.
    Il Gigante mischia i due gruppi: alcune frecce si piantano nel soffitto,
    alcuni tubi rotolano via — il lab è in caos finché Marco li rimette in ordine.

- slug: verb_gerund_infinitive_change
  tags: [gerund_infinitive, gerund_infinitive_block, be_used_to, stop_try_remember, part4_transformation]
  title_en: "Gerund vs Infinitive — Verbs that change meaning"
  title_it: "Gerundio vs Infinito — Verbi che cambiano significato"
  display_order: 122
  rule_en: |
    Some verbs take BOTH -ing and to-infinitive but with DIFFERENT meanings:

    **stop + -ing** = quit doing something
    → *She stopped **talking**.* (she was talking, then she stopped)
    **stop + to-inf** = pause in order to do something
    → *She stopped **to talk** to him.* (she was walking; she paused to have a conversation)

    **remember + -ing** = recall a past action (the action happened first)
    → *I remember **locking** the door.* (I locked it, and I recall this)
    **remember + to-inf** = not forget to do something (the action is still ahead)
    → *Remember **to lock** the door!* (don't forget — it's future)

    **try + -ing** = experiment, attempt a different approach
    → *Try **adding** more salt.* (see if it helps)
    **try + to-inf** = make an effort to do something difficult
    → *I tried **to open** the window but it was stuck.*
  rule_it: |
    Alcuni verbi accettano sia -ing che to-infinitive ma con SIGNIFICATI DIVERSI:

    **stop + -ing** = smettere di fare qualcosa
    → *She stopped **talking**.* (stava parlando, poi ha smesso)
    **stop + to-inf** = fermarsi per fare qualcosa
    → *She stopped **to talk** to him.* (stava camminando; si è fermata per parlare)

    **remember + -ing** = ricordare un'azione passata (l'azione è già avvenuta)
    → *I remember **locking** the door.* (l'ho chiusa e me lo ricordo)
    **remember + to-inf** = non dimenticare di fare qualcosa (l'azione è futura)
    → *Remember **to lock** the door!* (non dimenticare — è futuro)

    **try + -ing** = sperimentare, provare un approccio diverso
    → *Try **adding** more salt.* (vedi se aiuta)
    **try + to-inf** = fare uno sforzo per fare qualcosa di difficile
    → *I tried **to open** the window but it was stuck.*
  example_basic:
    en: "I remember meeting her — she stopped to talk to us and tried to explain the situation."
    it: "Ricordo di averla incontrata — si è fermata per parlarci e ha cercato di spiegare la situazione."
  example_complex:
    en: "The engineer tried adjusting the settings but then tried to reconfigure the system entirely; she remembered having encountered the same fault before but didn't remember what had resolved it."
    it: "L'ingegnere ha provato a regolare le impostazioni ma poi ha cercato di riconfigurare l'intero sistema; ricordava di aver incontrato lo stesso guasto in precedenza ma non ricordava cosa l'avesse risolto."
  vocabulary:
    - word: adjust
      pos: verb
      ipa: /əˈdʒʌst/
      meaning_it: regolare, aggiustare
    - word: reconfigure
      pos: verb
      ipa: /ˌriːkənˈfɪɡə/
      meaning_it: riconfigurare
    - word: fault
      pos: noun
      ipa: /fɔːlt/
      meaning_it: guasto, difetto, errore
    - word: encounter
      pos: verb
      ipa: /ɪnˈkaʊntə/
      meaning_it: incontrare, imbattersi in
    - word: resolve
      pos: verb
      ipa: /rɪˈzɒlv/
      meaning_it: risolvere
  story_it: |
    STOP, REMEMBER e TRY hanno due porte nel Grammar Lab —
    una porta ROTONDA (gerundio) e una porta FRECCIA (infinito).
    Per STOP: se entri dalla porta rotonda (stop + -ing), l'azione finisce qui,
    come sbattere una porta — BANG — silenzio. Se entri dalla porta freccia
    (stop + to), ti fermi un momento davanti alla porta freccia e poi la attraversi:
    interruzione temporanea per fare qualcos'altro.
    Il Gigante prova a capire quale porta entrare:
    «Ho smesso di fumare» → porta rotonda (l'azione è finita).
    «Mi sono fermato per comprare il giornale» → porta freccia (mi sono fermato, poi ho comprato).
    Annusa le porte: la rotonda odora di chiusura (legno umido, finale),
    la freccia odora di apertura (aria fresca, futuro).
    Prima capisci SE l'azione finisce o SE ti fermi per fare altro — poi scegli la porta.


# ─────────────────────────────────────────
# BLOCCO 13 — LINKING WORDS (giorni 46–48)
# ─────────────────────────────────────────

- slug: linking_contrast
  tags: [linking_words, linking_words_block, link_contrast, part1_mc_cloze, part2_open_cloze]
  title_en: "Linkers — Contrast: although, however, despite, in spite of, whereas"
  title_it: "Connettori — Contrasto: although, however, despite, in spite of, whereas"
  display_order: 130
  rule_en: |
    **although / even though / though** + subject + verb (clause)
    → *Although it was cold, she wore a light jacket.*

    **however / nevertheless / nonetheless** + comma (connector between sentences)
    → *The plan seemed solid. However, several key factors had been overlooked.*

    **despite / in spite of** + noun / -ing (NOT + clause directly)
    → *Despite the rain, the event was a success.*
    → *In spite of feeling unwell, she attended the meeting.*
    ⚠️ NOT «*despite that it rained*» — use «despite the fact that + clause»

    **whereas / while** = contrast between two parallel facts
    → *She prefers tea, whereas he drinks only coffee.*
  rule_it: |
    **although / even though / though** + soggetto + verbo (frase completa)
    → *Although it was cold, she wore a light jacket.*

    **however / nevertheless / nonetheless** + virgola (connettore tra frasi)
    → *The plan seemed solid. However, several key factors had been overlooked.*

    **despite / in spite of** + sostantivo / -ing (NON + frase completa direttamente)
    → *Despite the rain, the event was a success.*
    → *In spite of feeling unwell, she attended the meeting.*
    ⚠️ NON «*despite that it rained*» — usa «despite the fact that + frase»

    **whereas / while** = contrasto tra due fatti paralleli
    → *She prefers tea, whereas he drinks only coffee.*
  example_basic:
    en: "Although the budget was limited, the team produced impressive results. However, the timeline proved extremely challenging."
    it: "Sebbene il budget fosse limitato, il team ha prodotto risultati impressionanti. Tuttavia, la tempistica si è rivelata estremamente impegnativa."
  example_complex:
    en: "Despite facing considerable opposition from established stakeholders, the initiative gained widespread support, whereas previous attempts had consistently failed to attract sufficient public interest."
    it: "Nonostante l'opposizione considerevole da parte degli stakeholder affermati, l'iniziativa ha ottenuto un ampio sostegno, mentre i precedenti tentativi erano costantemente falliti nell'attrarre sufficiente interesse pubblico."
  vocabulary:
    - word: opposition
      pos: noun
      ipa: /ˌɒpəˈzɪʃən/
      meaning_it: opposizione, resistenza
    - word: established
      pos: adjective
      ipa: /ɪˈstæblɪʃt/
      meaning_it: affermato, consolidato
    - word: initiative
      pos: noun
      ipa: /ɪˈnɪʃɪətɪv/
      meaning_it: iniziativa
    - word: consistently
      pos: adverb
      ipa: /kənˈsɪstəntli/
      meaning_it: costantemente, sistematicamente
    - word: sufficient
      pos: adjective
      ipa: /səˈfɪʃənt/
      meaning_it: sufficiente
  story_it: |
    Nel Grammar Lab c'è un ring da boxe dove due fatti si fronteggiano.
    ALTHOUGH è un arbitro che tiene i due pugili nella stessa frase —
    entrano insieme dalla stessa porta, uno dopo l'altro (suono di guantoni che atterrano).
    HOWEVER invece è un muro di vetro tra due stanze separate:
    il primo fatto è nella stanza A, HOWEVER apre il pannello di vetro (SCRIC),
    il secondo fatto arriva dalla stanza B. Si sentono due temperature diverse (una stanza calda, una fredda).
    DESPITE è speciale: non vuole due frasi — vuole un sostantivo o un -ING.
    Marco prova «despite that it rained»: l'arbitro fischia (suono acuto),
    la parola «that» rimbalza fuori come un pugile mandato al tappeto — BONG.
    DESPITE vuole solo: «despite the rain» o «despite raining».
    Prima capisci se hai UNA frase (although) o DUE frasi (however) o UN SOSTANTIVO (despite).

- slug: linking_addition_result
  tags: [linking_words, linking_words_block, link_addition, link_result, part1_mc_cloze, part2_open_cloze]
  title_en: "Linkers — Addition & Result: furthermore, therefore, consequently…"
  title_it: "Connettori — Aggiunta e Risultato: furthermore, therefore, consequently…"
  display_order: 131
  rule_en: |
    **ADDITION** (adding more information — same direction):
    **furthermore / moreover / in addition / additionally** + comma
    → *The report was thorough. Furthermore, it was delivered ahead of schedule.*
    **as well as + noun/-ing** (not between sentences)
    → *She speaks French as well as Spanish.*

    **RESULT/CONSEQUENCE** (the second idea follows from the first):
    **therefore / consequently / as a result / thus** + comma
    → *The data was incomplete; therefore, the conclusions remain uncertain.*
    **so** (informal, in the middle of a sentence)
    → *It was late, so we left.*

    ⚠️ «therefore» is formal — avoid in spoken English. «so» is informal — avoid in essays.
  rule_it: |
    **AGGIUNTA** (aggiungere informazioni nella stessa direzione):
    **furthermore / moreover / in addition / additionally** + virgola
    → *The report was thorough. Furthermore, it was delivered ahead of schedule.*
    **as well as + sostantivo/-ing** (non tra frasi separate)
    → *She speaks French as well as Spanish.*

    **RISULTATO/CONSEGUENZA** (la seconda idea deriva dalla prima):
    **therefore / consequently / as a result / thus** + virgola
    → *The data was incomplete; therefore, the conclusions remain uncertain.*
    **so** (informale, a metà frase)
    → *It was late, so we left.*

    ⚠️ «therefore» è formale — evitalo nel parlato. «so» è informale — evitalo nei saggi.
  example_basic:
    en: "The project was underfunded; consequently, several key milestones were missed. Furthermore, the team was not given adequate support."
    it: "Il progetto era sottofinanziato; di conseguenza, sono stati mancati diversi traguardi chiave. Inoltre, il team non ha ricevuto un supporto adeguato."
  example_complex:
    en: "The findings strongly corroborate the initial hypothesis; therefore, the research team has decided to proceed to the next phase. Furthermore, two additional partners have agreed to contribute both expertise and resources."
    it: "I risultati corroborano fortemente l'ipotesi iniziale; pertanto, il team di ricerca ha deciso di procedere alla fase successiva. Inoltre, due partner aggiuntivi hanno accettato di contribuire sia con competenze che con risorse."
  vocabulary:
    - word: corroborate
      pos: verb
      ipa: /kəˈrɒbəreɪt/
      meaning_it: corroborare, confermare, avvalorare
    - word: hypothesis
      pos: noun
      ipa: /haɪˈpɒθɪsɪs/
      meaning_it: ipotesi
    - word: proceed
      pos: verb
      ipa: /prəˈsiːd/
      meaning_it: procedere, andare avanti
    - word: expertise
      pos: noun
      ipa: /ˌɛkspɜːˈtiːz/
      meaning_it: competenza, perizia
    - word: milestone
      pos: noun
      ipa: /ˈmaɪlstəʊn/
      meaning_it: traguardo, pietra miliare
  story_it: |
    Nel Grammar Lab le frasi sono vagoni di un treno.
    FURTHERMORE e MOREOVER sono ganci di aggancio che uniscono un vagone nella STESSA direzione —
    si sente il CLONK dell'aggancio, poi il treno riparte più lungo (aggiunta).
    THEREFORE e CONSEQUENTLY sono locomotori di spinta: il primo vagone causa il movimento
    del secondo — si sente l'accelerazione, si sente il vapore (il risultato è inevitabile).
    Marco cerca di usare «so» in un saggio formale:
    il professor Verne scuote la testa e il vagone «so» si colora di rosso (informale —
    non entra nel convoglio formale). Marco prova «therefore» in una conversazione:
    il Gigante ride così forte che il vagone «therefore» deraglia (troppo pesante per il parlato).
    Prima capisci il registro (formale/informale), poi scegli il gancio giusto.

- slug: linking_purpose_time
  tags: [linking_words, linking_words_block, link_purpose, link_time, part1_mc_cloze]
  title_en: "Linkers — Purpose & Time: so that, in order to, as soon as, once…"
  title_it: "Connettori — Scopo e Tempo: so that, in order to, as soon as, once…"
  display_order: 132
  rule_en: |
    **PURPOSE** (why something is done):
    **in order to / so as to** + infinitive (formal)
    → *She left early in order to avoid the traffic.*
    **so that** + subject + verb (with modal: can, could, would, might)
    → *I'll write it down so that I don't forget.*

    **TIME CONNECTORS**:
    **as soon as / the moment** = immediately when
    → *Call me as soon as you arrive.*
    **once** = when and only after (implies completion)
    → *Once you've finished, you can leave.*
    **by the time** = before/when a deadline/moment is reached
    → *By the time she arrived, everyone had left.*
    **until / till** = up to the moment when
    → *Wait until I get back.*
  rule_it: |
    **SCOPO** (perché si fa qualcosa):
    **in order to / so as to** + infinito (formale)
    → *She left early in order to avoid the traffic.*
    **so that** + soggetto + verbo (con modale: can, could, would, might)
    → *I'll write it down so that I don't forget.*

    **CONNETTORI DI TEMPO**:
    **as soon as / the moment** = immediatamente quando
    → *Call me as soon as you arrive.*
    **once** = quando e solo dopo (implica completamento)
    → *Once you've finished, you can leave.*
    **by the time** = prima/quando si raggiunge una scadenza/momento
    → *By the time she arrived, everyone had left.*
    **until / till** = fino al momento in cui
    → *Wait until I get back.*
  example_basic:
    en: "I called her as soon as I arrived so that she wouldn't worry."
    it: "L'ho chiamata appena sono arrivato in modo che non si preoccupasse."
  example_complex:
    en: "The team worked through the night in order to finalise the proposal, so that by the time the board convened the following morning, all outstanding issues had been resolved."
    it: "Il team ha lavorato tutta la notte per finalizzare la proposta, cosicché quando il consiglio si è riunito la mattina seguente, tutti i problemi in sospeso erano stati risolti."
  vocabulary:
    - word: finalise
      pos: verb
      ipa: /ˈfaɪnəlaɪz/
      meaning_it: finalizzare, completare
    - word: convene
      pos: verb
      ipa: /kənˈviːn/
      meaning_it: riunirsi, convocarsi
    - word: outstanding
      pos: adjective
      ipa: /ˌaʊtˈstændɪŋ/
      meaning_it: "in sospeso, non risolto (anche: eccezionale)"
    - word: resolve
      pos: verb
      ipa: /rɪˈzɒlv/
      meaning_it: risolvere
  story_it: |
    I connettori di scopo sono frecce su un arco — puntano verso un obiettivo.
    IN ORDER TO è una freccia elegante di metallo (formale, si sente il freddo del metallo),
    SO THAT è una freccia di legno semplice con una corda (si sente la tensione della corda).
    I connettori di tempo invece sono un orologio con diversi pulsanti:
    AS SOON AS fa suonare la sveglia istantaneamente — DRIIIN — nel momento esatto.
    ONCE è un interruttore che si attiva solo dopo che il primo processo è completato —
    si sente il click quando il circuito si chiude (prima finisci, poi il click, poi l'azione).
    BY THE TIME è un timer che conta alla rovescia — quando arriva a zero,
    tutto deve essere già successo (si sente il BEEP finale, odore di urgenza).
    Il Gigante usa «in order to» in una conversazione informale —
    tutti si girano a guardarlo come se portasse la giacca della cerimonia al supermercato.


# ─────────────────────────────────────────
# BLOCCO 14 — COMPARATIVES & SUPERLATIVES (giorni 49–50)
# ─────────────────────────────────────────

- slug: comparatives_as_as
  tags: [comparatives, comparatives_block, comparative_as_as, part4_transformation]
  title_en: "Comparatives — as…as, comparative, double comparative"
  title_it: "Comparativi — as…as, comparativo, doppio comparativo"
  display_order: 140
  rule_en: |
    **as + adj/adv + as** = equal comparison
    → *She is as talented as her sister.*
    → *It didn't take as long as I expected.*

    **Comparative + than** (short adj: +er; long adj: more + adj)
    → *This model is cheaper than the previous one.*
    → *The results were more significant than anticipated.*

    **Double comparative** = gradual change (the more…the more)
    → *The more you practise, the better you become.*
    → *The harder she worked, the more confident she felt.*

    **no sooner…than / hardly…when** = one event immediately followed by another
    → *No sooner had she arrived than the meeting started.*
    → *Hardly had he spoken when the alarm went off.*
    ⚠️ «no sooner/hardly» require INVERSION: had + subject (not «No sooner she had arrived»)
  rule_it: |
    **as + agg/avv + as** = confronto di uguaglianza
    → *She is as talented as her sister.*
    → *It didn't take as long as I expected.*

    **Comparativo + than** (agg. corti: +er; agg. lunghi: more + agg)
    → *This model is cheaper than the previous one.*
    → *The results were more significant than anticipated.*

    **Doppio comparativo** = cambiamento graduale (più…più)
    → *The more you practise, the better you become.*
    → *The harder she worked, the more confident she felt.*

    **no sooner…than / hardly…when** = un evento immediatamente seguito da un altro
    → *No sooner had she arrived than the meeting started.*
    ⚠️ «no sooner/hardly» richiedono INVERSIONE: had + soggetto
  example_basic:
    en: "The new system is far more efficient than the old one and isn't as expensive as we feared."
    it: "Il nuovo sistema è molto più efficiente di quello vecchio e non è così costoso come temevamo."
  example_complex:
    en: "The more stakeholders were consulted, the more complex the requirements became; no sooner had a consensus been reached than new objections arose from previously silent parties."
    it: "Più venivano consultati gli stakeholder, più i requisiti diventavano complessi; non appena si era raggiunto un consenso, sorgevano nuove obiezioni da parti precedentemente silenziose."
  vocabulary:
    - word: consulted
      pos: verb (past passive)
      ipa: /kənˈsʌltɪd/
      meaning_it: consultato
    - word: requirement
      pos: noun
      ipa: /rɪˈkwaɪəmənt/
      meaning_it: requisito, esigenza
    - word: consensus
      pos: noun
      ipa: /kənˈsɛnsəs/
      meaning_it: consenso
    - word: objection
      pos: noun
      ipa: /əbˈdʒɛkʃən/
      meaning_it: obiezione, riserva
    - word: previously
      pos: adverb
      ipa: /ˈpriːviəsli/
      meaning_it: precedentemente, prima
  story_it: |
    Nel Grammar Lab c'è una bilancia con due piatti.
    AS...AS mette pesi IDENTICI su entrambi i piatti — la bilancia è perfettamente in equilibrio
    (si sente il silenzio della bilancia ferma, nessun cigolìo).
    Il comparativo mette più peso su UN piatto — la bilancia si inclina (si sente il tonfo),
    e c'è sempre un THAN accanto al piatto più pesante.
    Il doppio comparativo è una bilancia automatica che scala:
    aggiungi peso a sinistra (MORE) e il piatto destro sale automaticamente (BETTER).
    NO SOONER è drammatico: il Gigante arriva correndo (BOOM dei piedi sul pavimento),
    la bilancia si rovescia — HAD + soggetto prima, poi la conseguenza.
    Il prof. Verne fa notare l'inversione: «No sooner HAD she arrived — non *she had*.»
    Prima capisci il tipo di confronto (uguale/diverso/graduale), poi scegli lo strumento.

- slug: superlatives_structures
  tags: [comparatives, comparatives_block, superlative, part4_transformation]
  title_en: "Superlatives — the most / -est, by far, comparative of fraction"
  title_it: "Superlativi — the most / -est, by far, fraction comparatives"
  display_order: 141
  rule_en: |
    **Superlatives**: the + adjective + -est (short) OR the most + adjective (long)
    → *This is the longest bridge in the country.*
    → *She is the most experienced candidate.*

    After superlatives: use **in** (places/groups) or **of** (amounts/time)
    → *the best restaurant **in** the city* / *the hottest day **of** the year*

    **by far** = emphasise the superlative
    → *She is by far the most qualified applicant.*

    **Fraction comparatives** (formal, FCE Part 4):
    → *This model costs three times **as much as** the other.*
    → *The new route is twice **as long as** the old one.*
    → *There are half **as many** applicants as last year.*
  rule_it: |
    **Superlativi**: the + aggettivo + -est (corti) OPPURE the most + aggettivo (lunghi)
    → *This is the longest bridge in the country.*
    → *She is the most experienced candidate.*

    Dopo i superlativi: usa **in** (luoghi/gruppi) o **of** (quantità/tempo)
    → *the best restaurant **in** the city* / *the hottest day **of** the year*

    **by far** = enfatizza il superlativo
    → *She is by far the most qualified applicant.*

    **Comparativi frazionali** (formale, FCE Part 4):
    → *This model costs three times **as much as** the other.*
    → *The new route is twice **as long as** the old one.*
  example_basic:
    en: "This is by far the most challenging project I have ever managed — and the most rewarding."
    it: "Questo è di gran lunga il progetto più impegnativo che abbia mai gestito — e il più gratificante."
  example_complex:
    en: "The proposed infrastructure investment is nearly twice as costly as the previous scheme and by far the most ambitious undertaking the city has approved in over a decade."
    it: "L'investimento infrastrutturale proposto costa quasi il doppio del piano precedente ed è di gran lunga l'impresa più ambiziosa approvata dalla città in oltre un decennio."
  vocabulary:
    - word: infrastructure
      pos: noun
      ipa: /ˈɪnfrəˌstrʌktʃə/
      meaning_it: infrastruttura
    - word: ambitious
      pos: adjective
      ipa: /æmˈbɪʃəs/
      meaning_it: ambizioso
    - word: undertaking
      pos: noun
      ipa: /ˌʌndəˈteɪkɪŋ/
      meaning_it: impresa, progetto
    - word: scheme
      pos: noun
      ipa: /skiːm/
      meaning_it: piano, programma, schema
    - word: costly
      pos: adjective
      ipa: /ˈkɒstli/
      meaning_it: costoso
  story_it: |
    I superlativi nel Grammar Lab sono trofei sul più alto scaffale della libreria —
    si deve usare la scala per arrivare a THE (il palco più alto, legno lucido, profumo di cera).
    BY FAR è un faro che illumina il trofeo da lontano — lo vedi brillare anche dall'altra parte del lab.
    I comparativi frazionali (twice as…as, three times as…as) sono righelli sovrapposti:
    il Gigante tiene due righelli fianco a fianco — uno è il DOPPIO dell'altro
    (si vede la differenza visivamente, si sente il peso diverso in mano).
    Marco prova «the best restaurant of the city» — lo scaffale trema (OF non va con i luoghi).
    Il trofeo cade, si sente il CRASH, il prof. Verne lo raccoglie e dice: «IN the city.»
    Prima impara il trofeo (superlativo), poi scegli la preposizione giusta (in/of).


# ─────────────────────────────────────────
# BLOCCO 15 — RELATIVE CLAUSES (giorni 51–52)
# ─────────────────────────────────────────

- slug: relative_defining
  tags: [relative_clauses, relative_clauses_block, rel_defining, part2_open_cloze]
  title_en: "Relative Clauses — Defining (no comma)"
  title_it: "Relative Clauses — Definenti (senza virgola)"
  display_order: 150
  rule_en: |
    A **defining relative clause** identifies WHICH person/thing we mean.
    It is essential — remove it and the sentence loses its meaning.
    **No commas.**

    **who** → people (subject or object)
    → *The scientist **who discovered** penicillin was Alexander Fleming.*
    **which** → things/animals
    → *The report **which was submitted** yesterday needs revising.*
    **that** → people OR things (common in defining clauses, especially spoken)
    → *The policy **that was introduced** last year has been effective.*
    **whose** → possession (people and things)
    → *The researcher **whose findings** challenged the theory retired last year.*

    ⚠️ In defining clauses: «that» can replace «who/which» — but NOT in non-defining.
    ⚠️ Object pronouns can be omitted: *The book (that) I read was excellent.*
  rule_it: |
    Una **relative clause definente** identifica DI QUALE persona/cosa stiamo parlando.
    È essenziale — toglila e la frase perde il significato. **Senza virgola.**

    **who** → persone (soggetto o oggetto)
    → *The scientist **who discovered** penicillin was Alexander Fleming.*
    **which** → cose/animali
    → *The report **which was submitted** yesterday needs revising.*
    **that** → persone O cose (comune nelle definenti, specialmente nel parlato)
    → *The policy **that was introduced** last year has been effective.*
    **whose** → possesso (persone e cose)
    → *The researcher **whose findings** challenged the theory retired last year.*

    ⚠️ Nelle definenti: «that» può sostituire «who/which» — ma NON nelle non-definenti.
    ⚠️ I pronomi oggetto possono essere omessi: *The book (that) I read was excellent.*
  example_basic:
    en: "The colleague that submitted the report and the manager whose signature was missing are both being investigated."
    it: "Il collega che ha presentato il rapporto e il manager la cui firma mancava sono entrambi sotto indagine."
  example_complex:
    en: "The investigative journalist who exposed the scandal, whose article prompted widespread calls for reform, has been shortlisted for the most prestigious award in the field."
    it: "La giornalista investigativa che ha scoperto lo scandalo, il cui articolo ha suscitato un ampio appello alla riforma, è stata inserita nella rosa dei candidati per il premio più prestigioso del settore."
  vocabulary:
    - word: investigative
      pos: adjective
      ipa: /ɪnˈvɛstɪɡətɪv/
      meaning_it: investigativo, d'inchiesta
    - word: expose
      pos: verb
      ipa: /ɪkˈspəʊz/
      meaning_it: smascherare, rivelare, esporre
    - word: prompt
      pos: verb
      ipa: /prɒmpt/
      meaning_it: suscitare, provocare, spingere a
    - word: shortlist
      pos: verb
      ipa: /ˈʃɔːtlɪst/
      meaning_it: inserire nella rosa finale dei candidati
    - word: prestigious
      pos: adjective
      ipa: /prɛˈstɪdʒəs/
      meaning_it: prestigioso
  story_it: |
    Nel Grammar Lab ogni sostantivo porta un cartellino identificativo.
    La relative clause definente è come un cartellino ROSSO OBBLIGATORIO —
    senza di esso non si sa di quale persona/cosa stai parlando
    (il Gigante entra in una stanza piena di scienziati senza sapere quale).
    WHO, WHICH, THAT sono tre pass d'ingresso — ognuno apre la porta al gruppo giusto:
    WHO apre la porta dei corridori umani (si sente il calpestio di piedi),
    WHICH apre la porta degli oggetti (rumore di cose che tintinnano),
    THAT apre entrambe le porte (universale, ma solo in assenza di virgola).
    Nessuna virgola = il cartellino è attaccato direttamente al sostantivo.
    Marco prova a mettere una virgola: il cartellino si stacca e cade a terra —
    diventa NON-defining (vedi prossima scheda).

- slug: relative_non_defining
  tags: [relative_clauses, relative_clauses_block, rel_defining_vs_non_defining, part2_open_cloze]
  title_en: "Relative Clauses — Non-defining (comma required)"
  title_it: "Relative Clauses — Non-definenti (virgola obbligatoria)"
  display_order: 151
  rule_en: |
    A **non-defining relative clause** adds EXTRA information about someone/something
    already identified. It is not essential — it could be removed in brackets.
    **Commas are obligatory.**

    → *Alexander Fleming, **who discovered penicillin**, was Scottish.* (extra info — we know who)
    → *The new policy, **which was introduced last year**, has been widely praised.* (extra info)

    Rules for non-defining clauses:
    ✓ Use **who** (people), **which** (things) — NEVER «that»
    ✓ Always use commas (before AND after if in the middle)
    ✓ The pronoun CANNOT be omitted

    ⚠️ NEVER use «that» in non-defining clauses — this is a very common error.
    ⚠️ «which» at the start of a new clause = referring back to whole previous idea:
    → *She passed the exam, **which** surprised everyone.* (the whole fact surprised people)
  rule_it: |
    Una **relative clause non-definente** aggiunge informazioni EXTRA su qualcuno/qualcosa
    già identificato. Non è essenziale — potrebbe essere rimossa tra parentesi.
    **Le virgole sono obbligatorie.**

    → *Alexander Fleming, **who discovered penicillin**, was Scottish.*
    → *The new policy, **which was introduced last year**, has been widely praised.*

    Regole per le non-definenti:
    ✓ Usa **who** (persone), **which** (cose) — MAI «that»
    ✓ Sempre virgole (prima E dopo se è al centro)
    ✓ Il pronome NON può essere omesso

    ⚠️ Non usare MAI «that» nelle non-definenti — errore molto comune.
    ⚠️ «which» all'inizio di una nuova frase = riferimento all'intera frase precedente:
    → *She passed the exam, **which** surprised everyone.* (il fatto intero ha sorpreso tutti)
  example_basic:
    en: "My manager, who has worked here for fifteen years, which is quite remarkable, will retire next month."
    it: "Il mio manager, che lavora qui da quindici anni, il che è abbastanza notevole, andrà in pensione il mese prossimo."
  example_complex:
    en: "The committee's final report, which was published after months of deliberation, concluded that the regulatory framework, whose weaknesses had long been acknowledged, required fundamental reform."
    it: "Il rapporto finale del comitato, pubblicato dopo mesi di deliberazione, ha concluso che il quadro normativo, le cui debolezze erano state a lungo riconosciute, necessitava di una riforma fondamentale."
  vocabulary:
    - word: deliberation
      pos: noun
      ipa: /dɪˌlɪbəˈreɪʃən/
      meaning_it: deliberazione, riflessione approfondita
    - word: regulatory
      pos: adjective
      ipa: /ˈrɛɡjʊlətəri/
      meaning_it: normativo, regolatorio
    - word: framework
      pos: noun
      ipa: /ˈfreɪmwɜːk/
      meaning_it: quadro normativo, struttura, framework
    - word: fundamental
      pos: adjective
      ipa: /ˌfʌndəˈmɛntəl/
      meaning_it: fondamentale
    - word: acknowledge
      pos: verb
      ipa: /əkˈnɒlɪdʒ/
      meaning_it: riconoscere, ammettere
  story_it: |
    Le virgole nel Grammar Lab sono parentesi fisiche — due pannelli di vetro
    che isolano acusticamente la clausola non-definente.
    Marco parla di Alexander Fleming — tutti sanno già chi è (identificato).
    La clausola «who discovered penicillin» entra tra i due pannelli di vetro:
    si sente la differenza di eco (risuona diversamente, meno urgente).
    Se Marco rimuove i pannelli (toglie le virgole), la clausola diventa definente —
    come se non sapessimo chi fosse Fleming (assurdo, paradossale: tutti lo conoscono).
    THAT non può passare tra i pannelli — ha un sensore che lo blocca
    (beep acuto, odore di plastica surriscaldata). Solo WHO e WHICH passano.
    Prima l'identificazione (il soggetto è già noto),
    poi i pannelli di vetro (virgole), poi l'informazione extra.
    Non puoi mettere i pannelli intorno a informazioni obbligatorie — cadono.


# ─────────────────────────────────────────
# BLOCCO 16 — CONDITIONALS & INVERSION (giorni 53–54)
# ─────────────────────────────────────────

- slug: conditional_2nd_3rd
  tags: [conditionals, conditionals_block, conditional_2, conditional_3, part4_transformation]
  title_en: "Conditionals — 2nd & 3rd Conditional"
  title_it: "Condizionali — 2° e 3° Condizionale"
  display_order: 160
  rule_en: |
    **2nd Conditional** — imaginary/unlikely present or future situation
    If + **past simple**, subject + **would + infinitive**
    → *If I had more time, I would learn a third language.*
    → *If she were the director, things would be different.* (were — formal for all persons)

    **3rd Conditional** — imaginary past (couldn't happen — it's over)
    If + **past perfect**, subject + **would have + past participle**
    → *If I had studied harder, I would have passed the exam.*
    → *If they had invested earlier, the company wouldn't have collapsed.*

    **Mixed Conditional** — past cause, present result
    If + **past perfect**, subject + **would + infinitive**
    → *If she had taken that job, she would be living in Paris now.*

    ⚠️ NEVER «would» in the if-clause: NOT «*If I would have…*»
  rule_it: |
    **2° Condizionale** — situazione immaginaria/improbabile nel presente o futuro
    If + **past simple**, soggetto + **would + infinito**
    → *If I had more time, I would learn a third language.*
    → *If she were the director, things would be different.* (were — formale per tutte le persone)

    **3° Condizionale** — passato immaginario (impossibile — è già finito)
    If + **past perfect**, soggetto + **would have + participio passato**
    → *If I had studied harder, I would have passed the exam.*

    **Condizionale Misto** — causa passata, risultato presente
    If + **past perfect**, soggetto + **would + infinito**
    → *If she had taken that job, she would be living in Paris now.*

    ⚠️ MAI «would» nella if-clause: NON «*If I would have…*»
  example_basic:
    en: "If they had planned more carefully, the project wouldn't have gone over budget."
    it: "Se avessero pianificato più attentamente, il progetto non avrebbe sforato il budget."
  example_complex:
    en: "If the committee had adopted a more transparent approach from the outset, public trust would not have eroded so significantly, and the organisation would still be operating at full capacity."
    it: "Se il comitato avesse adottato un approccio più trasparente fin dall'inizio, la fiducia pubblica non si sarebbe erosa così significativamente, e l'organizzazione starebbe ancora operando a piena capacità."
  vocabulary:
    - word: transparent
      pos: adjective
      ipa: /trænsˈpærənt/
      meaning_it: trasparente (anche figurato)
    - word: from the outset
      pos: phrase
      ipa: /frɒm ðə ˈaʊtsɛt/
      meaning_it: fin dall'inizio, sin dall'inizio
    - word: erode
      pos: verb
      ipa: /ɪˈrəʊd/
      meaning_it: erodere, consumare gradualmente
    - word: capacity
      pos: noun
      ipa: /kəˈpæsɪti/
      meaning_it: capacità, potenziale massimo
    - word: go over budget
      pos: phrase
      ipa: /ɡəʊ ˈəʊvə ˈbʌdʒɪt/
      meaning_it: sforare il budget
  story_it: |
    Il Grammar Lab ha una macchina del tempo con due impostazioni.
    IMPOSTAZIONE 2: Marco entra nel futuro immaginario — non è reale,
    si sente la consistenza morbida e impalpabile dell'aria (texture di sogno),
    colori leggermente sbiaditi. «If I had time» — il past simple nella if-clause
    è il biglietto d'ingresso per questo universo parallelo.
    IMPOSTAZIONE 3: Marco entra nel passato già avvenuto — le porte sono sigillate
    e opache (si sente il freddo definitivo del metallo), c'è un cartello: «NON MODIFICABILE».
    Il would have + pp è il lamento di chi guarda dalla finestra chiusa.
    Il Gigante prova a mettere «would» nella if-clause:
    la macchina del tempo si blocca con un CRASH, odore di cavi bruciati.
    Prima scegli l'impostazione (presente/futuro immaginario o passato irrecuperabile),
    poi compila il biglietto correttamente. Il WOULD non va mai nel biglietto d'ingresso.

- slug: inversion_conditional
  tags: [conditionals, conditionals_block, inversion_had_were_should, part4_transformation]
  title_en: "Inversion — Had, Were, Should (Conditional Inversion)"
  title_it: "Inversione — Had, Were, Should (Inversione Condizionale)"
  display_order: 161
  rule_en: |
    In formal English, you can replace «if» with **inverted word order** (auxiliary before subject).
    This is common in written English and FCE Part 4.

    **Had** + subject + pp (replaces: if + had + pp)
    → *If I had known* → ***Had** I known*, I would have acted differently.*
    → *If she had arrived earlier* → ***Had** she arrived earlier, we wouldn't have missed it.*

    **Were** + subject + infinitive (replaces: if + were to + infinitive)
    → ***Were** he to resign, the entire team would be affected.*

    **Should** + subject + infinitive (replaces: if + should + inf — unlikely future)
    → ***Should** you have any further questions, please do not hesitate to contact us.*

    ⚠️ Inversion = no «if», but the meaning is identical. Used to sound more formal.
  rule_it: |
    In inglese formale, puoi sostituire «if» con l'**ordine invertito** (ausiliare prima del soggetto).
    Comune nell'inglese scritto e nel FCE Part 4.

    **Had** + soggetto + pp (sostituisce: if + had + pp)
    → *If I had known* → ***Had** I known*, I would have acted differently.*

    **Were** + soggetto + infinito (sostituisce: if + were to + infinito)
    → ***Were** he to resign, the entire team would be affected.*

    **Should** + soggetto + infinito (sostituisce: if + should + inf — futuro improbabile)
    → ***Should** you have any further questions, please do not hesitate to contact us.*

    ⚠️ Inversione = no «if», ma il significato è identico. Si usa per suonare più formale.
  example_basic:
    en: "Had I known about the meeting, I would have prepared better. Should you need any further information, do not hesitate to ask."
    it: "Se avessi saputo della riunione, mi sarei preparato meglio. Se dovesse avere bisogno di ulteriori informazioni, non esiti a chiedere."
  example_complex:
    en: "Had the regulatory changes been implemented sooner, the crisis might have been averted; were the committee to reconsider its position now, it would need to acknowledge past oversights."
    it: "Se i cambiamenti normativi fossero stati implementati prima, la crisi avrebbe potuto essere evitata; se il comitato dovesse riconsiderare la propria posizione ora, dovrebbe riconoscere le sviste passate."
  vocabulary:
    - word: avert
      pos: verb
      ipa: /əˈvɜːt/
      meaning_it: evitare, scongiurare
    - word: oversight
      pos: noun
      ipa: /ˈəʊvəsaɪt/
      meaning_it: "svista, omissione (anche: supervisione)"
    - word: hesitate
      pos: verb
      ipa: /ˈhɛzɪteɪt/
      meaning_it: esitare
    - word: resign
      pos: verb
      ipa: /rɪˈzaɪn/
      meaning_it: dimettersi, rassegnare le dimissioni
  story_it: |
    Il professor Verne ha una giacca formale che indossa solo nelle occasioni importanti
    (odore di naftalina, tessuto rigido e freddo al tatto — formale).
    Quando la indossa, le frasi si invertono automaticamente:
    IF sparisce (come un coniglio che scompare nel cappello — WHOMP)
    e l'ausiliare (HAD, WERE, SHOULD) balza in prima posizione.
    «If I had known» → «Had I known» — stesso significato, giacca formale.
    Marco la prova: la giacca è scomoda (è insolita) ma funziona perfettamente
    nelle situazioni formali (lettere, saggi, FCE Writing).
    Il Gigante la indossa per ordinare una pizza al telefono:
    «Should you have any toppings to suggest, please do not hesitate...»
    — il pizzaiolo riattacca (paradossale, si sente il tono del telefono che cade).
    Prima valuti il contesto (formale = giacca), poi togli IF e metti l'ausiliare davanti.


