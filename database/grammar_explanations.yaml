# BLOCCO 17 — QUANTIFIERS & ARTICLES (giorni 55–56)
# ─────────────────────────────────────────

- slug: quantifiers_few_little
  tags: [quantifiers, quantifiers_block, quant_few_little, false_friend_italian, part2_open_cloze]
  title_en: "Quantifiers — few/a few, little/a little, much/many, too/enough"
  title_it: "Quantificatori — few/a few, little/a little, much/many, too/enough"
  display_order: 170
  rule_en: |
    **Countable nouns** (can be counted: books, people, mistakes):
    **many** / **a great number of** / **a few** (some, positive) / **few** (almost none, negative)
    → *A few students passed.* (some — good) vs *Few students passed.* (almost none — bad)

    **Uncountable nouns** (can't be counted: water, money, advice):
    **much** / **a great deal of** / **a little** (some, positive) / **little** (almost none, negative)
    → *A little time remains.* (some — ok) vs *Little time remains.* (almost none — urgent)

    **both countable and uncountable**: some / any / a lot of / plenty of / enough

    **too** + adj/adv = more than necessary/desired (negative)
    → *It's too cold to swim.* / *He works too slowly.*
    **enough** + noun / adj/adv + enough = sufficient
    → *We have enough time.* / *She isn't tall enough.*

    ⚠️ Italian trap: «pochi» = few (negative) OR a few (positive) — in English they're VERY different.
  rule_it: |
    **Sostantivi numerabili** (si possono contare: books, people, mistakes):
    **many** / **a great number of** / **a few** (alcuni, positivo) / **few** (quasi nessuno, negativo)
    → *A few students passed.* (alcuni — bene) vs *Few students passed.* (quasi nessuno — male)

    **Sostantivi non numerabili** (non si contano: water, money, advice):
    **much** / **a great deal of** / **a little** (un po', positivo) / **little** (quasi niente, negativo)
    → *A little time remains.* (un po' — ok) vs *Little time remains.* (quasi niente — urgente)

    **entrambi**: some / any / a lot of / plenty of / enough

    **too** + agg/avv = più del necessario (negativo)
    → *It's too cold to swim.* / *He works too slowly.*
    **enough** + sost / agg/avv + enough = sufficiente
    → *We have enough time.* / *She isn't tall enough.*

    ⚠️ Trappola italiana: «pochi» = few (negativo) O a few (positivo) — in inglese sono MOLTO diversi.
  example_basic:
    en: "Few people applied, but a few of the candidates were highly qualified. Unfortunately, there wasn't enough time to interview them all properly."
    it: "Poche persone si sono candidate, ma alcuni dei candidati erano altamente qualificati. Purtroppo non c'era abbastanza tempo per intervistarli tutti adeguatamente."
  example_complex:
    en: "There is little evidence to support the claim, yet a little encouragement from senior management could make a considerable difference, provided there is enough political will to act decisively."
    it: "Ci sono poche prove a supporto della tesi, eppure un po' di incoraggiamento da parte del management senior potrebbe fare una differenza considerevole, a condizione che ci sia sufficiente volontà politica per agire in modo decisivo."
  vocabulary:
    - word: evidence
      pos: noun
      ipa: /ˈɛvɪdəns/
      meaning_it: prova, evidenza
    - word: encouragement
      pos: noun
      ipa: /ɪnˈkʌrɪdʒmənt/
      meaning_it: incoraggiamento
    - word: political will
      pos: noun phrase
      ipa: /pəˈlɪtɪkəl wɪl/
      meaning_it: volontà politica
    - word: decisively
      pos: adverb
      ipa: /dɪˈsaɪsɪvli/
      meaning_it: in modo decisivo, risolutamente
    - word: provided
      pos: conjunction
      ipa: /prəˈvaɪdɪd/
      meaning_it: a condizione che, purché
  story_it: |
    Nel Grammar Lab c'è una dispensa con due scomparti.
    Scomparto CONTABILE (scaffale a destra): libri, persone, errori — si possono contare.
    Scomparto INCONTABILE (scaffale a sinistra): acqua, consiglio, tempo — scorrono, non si contano.
    La Gemella FEW vive nello scaffale contabile con una faccia triste (quasi vuoto —
    quasi nessuno, odore di polvere). La Gemella A FEW ha la stessa faccia ma con un sorriso
    (alcuni, il barattolo ha qualcosa dentro — odore di cibo fresco).
    La confusione italiana: «pochi» ha UNA parola, l'inglese ne ha due con significati opposti.
    Marco assaggia FEW: sapore amaro (negativo).
    Assaggia A FEW: sapore neutro (positivo). Stessa parola, articolo diverso — tutto cambia.
    Il Gigante mischia i due barattoli: «Few people came — it was a great party!»
    Il professor Verne scuote la testa: se FEW, il party era desolante.

- slug: articles_the_zero
  tags: [quantifiers, quantifiers_block, article_the_zero, part2_open_cloze]
  title_en: "Articles — the, a/an, and zero article"
  title_it: "Articoli — the, a/an e assenza di articolo"
  display_order: 171
  rule_en: |
    **a / an** = first mention, one of many, classifying
    → *I saw a film.* / *She is a doctor.*

    **the** = specific, already mentioned, unique, shared knowledge
    → *The film I saw was excellent.* / *The sun / the moon / the government*

    **Zero article (no article)**:
    - Plural/uncountable in general statements: *Dogs are loyal.* / *Water is essential.*
    - Names of most countries, cities, languages: *Italy, London, English*
    - Meals, transport, institutions (general): *at school / by train / at breakfast*
    - Abstract nouns in general: *Love is complicated.* / *Life is short.*

    ⚠️ «the» is used with: oceans (the Pacific), mountain ranges (the Alps),
    rivers (the Thames), plural country names (the Netherlands, the United States)
  rule_it: |
    **a / an** = prima menzione, uno tra tanti, classificazione
    → *I saw a film.* / *She is a doctor.*

    **the** = specifico, già menzionato, unico, conoscenza condivisa
    → *The film I saw was excellent.* / *The sun / the moon / the government*

    **Assenza di articolo (zero article)**:
    - Plurali/incontabili in affermazioni generali: *Dogs are loyal.* / *Water is essential.*
    - Nomi di la maggior parte di paesi, città, lingue: *Italy, London, English*
    - Pasti, trasporti, istituzioni (uso generale): *at school / by train / at breakfast*
    - Sostantivi astratti in generale: *Love is complicated.* / *Life is short.*

    ⚠️ «the» si usa con: oceani (the Pacific), catene montuose (the Alps),
    fiumi (the Thames), nomi di paesi al plurale (the Netherlands, the United States)
  example_basic:
    en: "I had a meeting at the office this morning. The manager who attended is an expert in the field."
    it: "Stamattina ho avuto una riunione in ufficio. Il manager che ha partecipato è un esperto nel settore."
  example_complex:
    en: "The report published by the United Nations highlights the urgent need for governments to address water scarcity — a challenge that demands both political will and international cooperation."
    it: "Il rapporto pubblicato dalle Nazioni Unite evidenzia l'urgente necessità che i governi affrontino la scarsità d'acqua — una sfida che richiede sia volontà politica che cooperazione internazionale."
  vocabulary:
    - word: scarcity
      pos: noun
      ipa: /ˈskɛəsɪti/
      meaning_it: scarsità, carenza
    - word: cooperation
      pos: noun
      ipa: /kəʊˌɒpəˈreɪʃən/
      meaning_it: cooperazione
    - word: highlight
      pos: verb
      ipa: /ˈhaɪlaɪt/
      meaning_it: evidenziare, mettere in risalto
    - word: urgent
      pos: adjective
      ipa: /ˈɜːdʒənt/
      meaning_it: urgente
  story_it: |
    Il professor Verne ha tre cappelli che indossa in sequenza.
    Il cappello A/AN (di paglia, leggero) lo indossa quando incontra qualcosa per la prima volta
    (si sente la texture fresca della paglia): «There is A dog in the garden» — primo avvistamento.
    Il cappello THE (di velluto scuro, pesante, familiare) lo indossa la volta successiva:
    «THE dog is barking» — lo conosciamo già, è specifico.
    Il cappello ZERO (la testa scoperta, aria fresca) lo indossa per le generalizzazioni:
    «Dogs are loyal» — tutti i cani, universo intero, nessun cappello necessario.
    Il Gigante prova a usare THE per generalizzare: «The dogs are loyal animals» —
    come se stesse parlando di dei cani specifici già menzionati.
    Il prof. Verne si toglie il cappello di velluto con un gesto preciso:
    «Generalizzazione = testa scoperta. The = già noto, specifico.»


# ─────────────────────────────────────────
# BLOCCO 18 — PHRASAL VERBS & FALSE FRIENDS (giorni 57–58)
# ─────────────────────────────────────────

- slug: phrasal_verbs_core
  tags: [phrasal_verbs, phrasal_verbs_block, pv_set_up, pv_call_off, part1_mc_cloze, part4_transformation]
  title_en: "Phrasal Verbs — Core FCE Patterns"
  title_it: "Phrasal Verbs — Pattern FCE Fondamentali"
  display_order: 180
  rule_en: |
    Phrasal verbs = verb + particle (preposition or adverb). The meaning often differs from the parts.

    **Separable** (object can go between verb and particle — with pronoun it MUST):
    *set up* (establish): *She set up a company.* / *She set it up.*
    *call off* (cancel): *They called off the meeting.* / *They called it off.*
    *put off* (postpone): *He put off making a decision.* / *He put it off.*
    *bring up* (raise — topic or child): *She brought up the issue.* / *She brought it up.*
    *turn down* (refuse/lower): *He turned down the offer.* / *He turned it down.*

    **Inseparable** (object always after the particle):
    *look into* (investigate): *We'll look into the matter.*
    *come across* (find unexpectedly): *I came across an interesting article.*
    *take after* (resemble): *She takes after her father.*
    *look forward to* (+ -ing): *I look forward to hearing from you.*

    ⚠️ «look forward to» + gerund, NOT infinitive: *NOT «look forward to hear»*
  rule_it: |
    I phrasal verbs = verbo + particella (preposizione o avverbio). Il significato spesso differisce dalle parti.

    **Separabili** (l'oggetto può andare tra verbo e particella — con i pronomi DEVE):
    *set up* (fondare): *She set up a company.* / *She set it up.*
    *call off* (cancellare): *They called off the meeting.* / *They called it off.*
    *put off* (rimandare): *He put off making a decision.* / *He put it off.*
    *bring up* (sollevare — argomento; crescere — figlio): *She brought up the issue.*
    *turn down* (rifiutare/abbassare): *He turned down the offer.*

    **Inseparabili** (l'oggetto va sempre dopo la particella):
    *look into* (indagare): *We'll look into the matter.*
    *come across* (trovare per caso): *I came across an interesting article.*
    *look forward to* (+ -ing): *I look forward to hearing from you.*

    ⚠️ «look forward to» + gerundio, NON infinito
  example_basic:
    en: "She set up the project but eventually called it off after the main investor turned down their revised proposal."
    it: "Ha avviato il progetto ma alla fine lo ha cancellato dopo che il principale investitore ha rifiutato la loro proposta rivista."
  example_complex:
    en: "The auditors are looking into the matter and have already come across several irregularities that the management had consistently put off addressing, which has brought up serious questions about corporate governance."
    it: "I revisori stanno esaminando la questione e hanno già trovato diverse irregolarità che il management aveva continuamente rimandato, il che ha sollevato seri interrogativi sulla governance aziendale."
  vocabulary:
    - word: auditor
      pos: noun
      ipa: /ˈɔːdɪtə/
      meaning_it: revisore dei conti
    - word: irregularity
      pos: noun
      ipa: /ɪˌrɛɡjʊˈlærɪti/
      meaning_it: irregolarità
    - word: governance
      pos: noun
      ipa: /ˈɡʌvənəns/
      meaning_it: governance, gestione
    - word: investor
      pos: noun
      ipa: /ɪnˈvɛstə/
      meaning_it: investitore
    - word: corporate
      pos: adjective
      ipa: /ˈkɔːpərɪt/
      meaning_it: aziendale, societario
  story_it: |
    Il professor Verne ha una valigetta piena di pezzi di puzzle —
    verbi separabili e inseparabili hanno colori diversi.
    Per i SEPARABILI (set up, call off): il puzzle si può smontare
    e rimontare con l'oggetto in mezzo (Marco smonta «set up» e mette «it» nel mezzo —
    si sente il CLICK del pezzo che entra). Ma se l'oggetto è un pronome,
    DEVE stare in mezzo — la scatola del pezzo dice «PRONOME: OBBLIGATORIO AL CENTRO».
    Per gli INSEPARABILI (look into, come across): i pezzi sono incollati con colla forte
    (odore di colla, superfici appiccicose) — non si possono separare.
    Marco prova a mettere «it» dopo «look into»: la colla gli rimane sulle dita.
    «Look forward to» ha un pezzo speciale: dopo TO arriva sempre -ING, non l'infinito.
    Il pezzo -ING si incastra perfettamente (suono di click soddisfacente),
    il pezzo TO-INF rimbalza fuori (rumore di pezzo che cade sul tavolo).

- slug: false_friends_italian
  tags: [phrasal_verbs, phrasal_verbs_block, false_friend_italian, confusables]
  title_en: "False Friends — Italian False Friends & Confusables"
  title_it: "Falsi Amici — False Friends italiani e parole simili"
  display_order: 181
  rule_en: |
    These English words look similar to Italian words but have DIFFERENT meanings:

    | English | Looks like | Actual meaning | Italian equivalent |
    |---|---|---|---|
    | **actually** | attualmente | in fact, in reality | currently / at the moment |
    | **eventually** | eventualmente | in the end, finally | possibly / if necessary |
    | **sensible** | sensibile | reasonable, practical | sensitive |
    | **sensitive** | sensibile | emotionally responsive | sensibile |
    | **sympathetic** | simpatico | understanding, compassionate | nice, likeable |
    | **comprehensive** | comprensivo | thorough, complete | understanding (forgiving) |
    | **argument** | argomento | disagreement, quarrel | topic, subject |
    | **historic** | storico | of great historical importance | qualunque cosa del passato |
    | **few** | pochi (gen.) | almost none (negative) | «a few» = some |
    | **pretend** | pretendere | to act as if, to fake | to demand, to expect |

    ⚠️ «Actually, I agree» = in realtà, sono d'accordo (NOT «attualmente sono d'accordo»)
  rule_it: |
    Queste parole inglesi sembrano simili a parole italiane ma hanno significati DIVERSI:

    | Inglese | Sembra | Significato reale | Equivalente italiano |
    |---|---|---|---|
    | **actually** | attualmente | in realtà, di fatto | currently / at the moment |
    | **eventually** | eventualmente | alla fine, infine | possibly / if necessary |
    | **sensible** | sensibile | ragionevole, pratico | sensitive |
    | **sensitive** | sensibile | emotivamente reattivo | sensibile |
    | **sympathetic** | simpatico | comprensivo, empatico | nice, likeable |
    | **comprehensive** | comprensivo | esaustivo, completo | understanding (indulgente) |
    | **argument** | argomento | litigio, discussione | topic, subject |
    | **historic** | storico | di grande importanza storica | qualunque cosa del passato |
    | **few** | pochi (gen.) | quasi nessuno (negativo) | «a few» = alcuni |
    | **pretend** | pretendere | fingere, fare finta | to demand, to expect |
  example_basic:
    en: "He is actually quite sensible, not sensitive — he eventually became sympathetic to our argument after a comprehensive explanation."
    it: "In realtà è abbastanza ragionevole, non emotivo — alla fine si è dimostrato comprensivo riguardo alla nostra discussione dopo una spiegazione esaustiva."
  example_complex:
    en: "The spokesperson, who actually turned out to be remarkably sympathetic to our concerns, eventually proposed a comprehensive solution that even the most sensitive critics found sensible."
    it: "Il portavoce, che in realtà si è rivelato straordinariamente comprensivo riguardo alle nostre preoccupazioni, ha infine proposto una soluzione esaustiva che anche i critici più emotivi hanno trovato ragionevole."
  vocabulary:
    - word: spokesperson
      pos: noun
      ipa: /ˈspəʊkspɜːsən/
      meaning_it: portavoce
    - word: remarkably
      pos: adverb
      ipa: /rɪˈmɑːkəbli/
      meaning_it: notevolmente, straordinariamente
    - word: comprehensive
      pos: adjective
      ipa: /ˌkɒmprɪˈhɛnsɪv/
      meaning_it: esaustivo, completo (NON comprensivo)
    - word: eventually
      pos: adverb
      ipa: /ɪˈvɛntʃuəli/
      meaning_it: alla fine (NON eventualmente!)
  story_it: |
    Nel Grammar Lab c'è una galleria di maschere — ogni falso amico indossa la maschera
    di una parola italiana ma ha un volto completamente diverso sotto.
    Marco alza la maschera di «actually»: sotto trova il viso di «in realtà», non di «attualmente».
    Odore di inganno (legno verniciato, artificiale).
    «Eventually» ha la maschera di «eventualmente» — ma dentro dice «alla fine»,
    voce profonda e definitiva. Marco tocca la maschera: fredda, come un travestimento.
    Il prof. Verne gli mostra «sympathetic» con la maschera di «simpatico» —
    ma sotto c'è un volto serioso, empatico, non allegro.
    Il Gigante si fida di tutte le maschere: usa «actually» come «attualmente»,
    «pretend» come «pretendere» — le maschere cadono tutte in cascata (CRASH CRASH CRASH,
    rumore di maschere di legno che battono sul pavimento).
    Prima togli la maschera, guarda il vero volto — poi usa la parola.

