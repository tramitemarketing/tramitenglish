# BLOCCO 1 — VERB TENSES (giorni 1–6)
# ─────────────────────────────────────────

- slug: present_simple_habits
  tags: [verb_tenses, verb_tenses_block, present_simple]
  title_en: "Present Simple — Habits, Facts & States"
  title_it: "Present Simple — Abitudini, Fatti e Stati"
  display_order: 10
  rule_en: |
    Use the **Present Simple** for:
    1. **Habits & routines** — actions that repeat regularly (always, usually, every day)
    2. **General truths & permanent facts** — things that are always true
    3. **States** — non-action verbs: know, believe, own, love, seem, contain

    Form: subject + base verb. Add **-s / -es** for he / she / it.
    ⚠️ Do NOT use Present Simple for what is happening right now → use Present Continuous.
  rule_it: |
    Usa il **Present Simple** per:
    1. **Abitudini e routine** — azioni che si ripetono regolarmente (always, usually, every day)
    2. **Verità generali e fatti permanenti** — cose sempre vere
    3. **Stati** — verbi non-d'azione: know, believe, own, love, seem, contain

    Forma: soggetto + verbo base. Aggiungi **-s / -es** per he / she / it.
    ⚠️ NON usarlo per ciò che sta accadendo adesso → usa il Present Continuous.
  example_basic:
    en: "She reads the newspaper every morning."
    it: "Lei legge il giornale ogni mattina."
  example_complex:
    en: "Scientists generally acknowledge that biodiversity significantly contributes to ecosystem resilience."
    it: "Gli scienziati generalmente riconoscono che la biodiversità contribuisce significativamente alla resilienza degli ecosistemi."
  vocabulary:
    - word: acknowledge
      pos: verb
      ipa: /əkˈnɒlɪdʒ/
      meaning_it: riconoscere, ammettere
    - word: biodiversity
      pos: noun
      ipa: /ˌbaɪəʊdaɪˈvɜːsɪti/
      meaning_it: biodiversità
    - word: significantly
      pos: adverb
      ipa: /sɪɡˈnɪfɪkəntli/
      meaning_it: significativamente, notevolmente
    - word: ecosystem
      pos: noun
      ipa: /ˈiːkəʊˌsɪstəm/
      meaning_it: ecosistema
    - word: resilience
      pos: noun
      ipa: /rɪˈzɪliəns/
      meaning_it: resilienza, capacità di recupero
  story_it: |
    Nel Grammar Lab del Professor Verne c'è un enorme pendolo di ottone che non si ferma MAI.
    Ogni volta che oscilla, brucia un segno nel legno della scrivania (odore di legno tostato,
    calore sul dorso della mano se ci passi vicino). Sulla scrivania ci sono già diecimila segni,
    tutti identici. Marco li conta — e sviene per la noia, perché sono SEMPRE UGUALI.
    Inciso su ogni segno c'è scritto "ALWAYS." in lettere minuscole.
    Il professor Verne sorride: «Prima oscilla il pendolo — l'abitudine esiste.
    Solo DOPO appare il segno — la prova che è un fatto permanente.
    Non puoi avere il segno senza la ripetizione. Questo è il Present Simple.»
    Marco tocca un segno fresco (ancora caldo, ruvido), annusa il legno bruciato, e non dimentica più.

- slug: present_continuous_now
  tags: [verb_tenses, verb_tenses_block, present_continuous]
  title_en: "Present Continuous — Actions in Progress & Temporary States"
  title_it: "Present Continuous — Azioni in Corso e Stati Temporanei"
  display_order: 11
  rule_en: |
    Use the **Present Continuous** for:
    1. **Actions happening right now** (at this moment)
    2. **Temporary situations** — true now, but not forever
    3. **Fixed future arrangements** (I'm meeting her tonight)
    4. **Annoying habits** with *always* (He's always losing his keys!)

    Form: subject + **am / is / are** + verb**-ing**
    ⚠️ State verbs (know, like, own, seem) do NOT take -ing form.
  rule_it: |
    Usa il **Present Continuous** per:
    1. **Azioni in corso adesso** (in questo momento)
    2. **Situazioni temporanee** — vere ora, ma non per sempre
    3. **Appuntamenti futuri già fissati** (I'm meeting her tonight)
    4. **Abitudini fastidiose** con *always* (He's always losing his keys!)

    Forma: soggetto + **am / is / are** + verbo**-ing**
    ⚠️ I verbi di stato (know, like, own, seem) NON prendono la forma -ing.
  example_basic:
    en: "She is reading the newspaper right now — don't disturb her."
    it: "Sta leggendo il giornale proprio adesso — non disturbarla."
  example_complex:
    en: "The company is currently restructuring its supply chain to address mounting logistical challenges."
    it: "L'azienda sta attualmente ristrutturando la sua catena di approvvigionamento per affrontare crescenti sfide logistiche."
  vocabulary:
    - word: restructure
      pos: verb
      ipa: /ˌriːˈstrʌktʃə/
      meaning_it: ristrutturare, riorganizzare
    - word: supply chain
      pos: noun
      ipa: /səˈplaɪ tʃeɪn/
      meaning_it: catena di approvvigionamento / fornitura
    - word: address
      pos: verb
      ipa: /əˈdrɛs/
      meaning_it: affrontare, occuparsi di (non solo "indirizzo"!)
    - word: mounting
      pos: adjective
      ipa: /ˈmaʊntɪŋ/
      meaning_it: crescente, che aumenta
    - word: logistical
      pos: adjective
      ipa: /ləˈdʒɪstɪkəl/
      meaning_it: logistico
  story_it: |
    Il calderone al centro del Grammar Lab bolle ADESSO — vapore denso, odore di zolfo e
    menta insieme (paradossale). Il professor Verne corre dentro con il cappotto ancora bagnato
    (è nel mezzo di qualcosa, non ha finito). Immerge la mano nel vapore e tira fuori
    una parola GOCCIOLANTE di suffisso **-ING** — le gocce cadono sul pavimento con un
    suono secco CLOC CLOC. «Vedi?» dice a Marco, «Il -ING cola perché l'azione
    è ancora IN CORSO. Prima il calderone bolle — l'azione inizia.
    Solo dopo il -ING gocciola fuori.» Marco tocca una goccia: è tiepida, viscosa.
    Tra cinque minuti il calderone si spegne — l'azione temporanea finisce —
    e il -ING evapora. Non puoi avere il -ING prima che il calderone bolla.

- slug: past_simple_completed
  tags: [verb_tenses, verb_tenses_block, past_simple]
  title_en: "Past Simple — Completed Actions & Narrative Past"
  title_it: "Past Simple — Azioni Completate e Racconto al Passato"
  display_order: 12
  rule_en: |
    Use the **Past Simple** for:
    1. **Completed actions** at a specific time in the past (yesterday, in 2020, last week)
    2. **Sequence of past events** (narrative: first… then… finally…)
    3. **Past habits** no longer true (She walked to school every day when she was young)

    Form: verb + **-ed** (regular) OR irregular form (go→went, see→saw, buy→bought).
    ⚠️ Always with a time marker OR clear past context. No connection to the present.
  rule_it: |
    Usa il **Past Simple** per:
    1. **Azioni completate** in un momento preciso del passato (yesterday, in 2020, last week)
    2. **Sequenza di eventi passati** (racconto: first… then… finally…)
    3. **Abitudini passate** non più vere (She walked to school every day when she was young)

    Forma: verbo + **-ed** (regolare) OPPURE forma irregolare (go→went, see→saw).
    ⚠️ Sempre con un marcatore temporale O un contesto passato chiaro. Nessun legame col presente.
  example_basic:
    en: "He locked the door and left without saying goodbye."
    it: "Chiuse la porta a chiave e se ne andò senza dire arrivederci."
  example_complex:
    en: "The archaeologists unearthed a remarkably well-preserved mosaic that immediately contradicted previous assumptions about the settlement."
    it: "Gli archeologi portarono alla luce un mosaico straordinariamente ben conservato che contraddiceva immediatamente le precedenti ipotesi sull'insediamento."
  vocabulary:
    - word: unearthed
      pos: verb (past simple of unearth)
      ipa: /ʌnˈɜːθt/
      meaning_it: portare alla luce, dissotterrare
    - word: remarkably
      pos: adverb
      ipa: /rɪˈmɑːkəbli/
      meaning_it: straordinariamente, notevolmente
    - word: well-preserved
      pos: adjective
      ipa: /ˌwɛl prɪˈzɜːvd/
      meaning_it: ben conservato
    - word: contradict
      pos: verb
      ipa: /ˌkɒntrəˈdɪkt/
      meaning_it: contraddire
    - word: assumption
      pos: noun
      ipa: /əˈsʌmpʃən/
      meaning_it: ipotesi, supposizione
    - word: settlement
      pos: noun
      ipa: /ˈsɛtlmənt/
      meaning_it: insediamento, colonia
  story_it: |
    Lungo una parete del Grammar Lab ci sono centinaia di fotografie incorniciate —
    momenti congelati per sempre. Il professor Verne ne prende una, la annusa
    (odore di carta antica, un po' di muffa), e la appende al muro con un chiodo
    che fa un BANG secco. «Finito. Immutabile. Quel momento è chiuso.»
    Marco guarda la foto: mostra Il Gigante che inciampa su una pietra ieri mattina.
    Il Gigante non sta inciampando ADESSO — lo ha fatto IERI, è finita.
    Prima l'inciampo (l'azione accade nel passato), poi il BANG del chiodo (viene chiusa),
    poi la foto sul muro (resta lì per sempre, staccata dal presente).
    Marco tocca la cornice fredda e rugosa — quella foto non si muoverà mai più.

- slug: past_continuous_background
  tags: [verb_tenses, verb_tenses_block, past_continuous]
  title_en: "Past Continuous — Background Actions & Interrupted Past"
  title_it: "Past Continuous — Azioni di Sfondo e Passato Interrotto"
  display_order: 13
  rule_en: |
    Use the **Past Continuous** for:
    1. **Background action** interrupted by a Past Simple event
       → *I was reading when the phone rang.*
    2. **Two parallel ongoing actions** in the past
       → *While she was cooking, he was setting the table.*
    3. **Temporary situation** in the past (at a specific past moment)
       → *At 8 pm yesterday I was watching a film.*

    Form: subject + **was / were** + verb**-ing**
    Key signal words: while, when, as, at that moment.
  rule_it: |
    Usa il **Past Continuous** per:
    1. **Azione di sfondo** interrotta da un Past Simple
       → *I was reading when the phone rang.*
    2. **Due azioni parallele in corso** nel passato
       → *While she was cooking, he was setting the table.*
    3. **Situazione temporanea** nel passato (in un momento preciso)
       → *At 8 pm yesterday I was watching a film.*

    Forma: soggetto + **was / were** + verbo**-ing**
    Segnali chiave: while, when, as, at that moment.
  example_basic:
    en: "I was writing my essay when the power suddenly went out."
    it: "Stavo scrivendo il mio tema quando la corrente è andata via all'improvviso."
  example_complex:
    en: "While the delegates were negotiating the final terms of the agreement, a journalist was leaking confidential details to the press."
    it: "Mentre i delegati stavano negoziando i termini finali dell'accordo, un giornalista stava rivelando dettagli riservati alla stampa."
  vocabulary:
    - word: delegate
      pos: noun
      ipa: /ˈdɛlɪɡət/
      meaning_it: delegato, rappresentante
    - word: negotiate
      pos: verb
      ipa: /nɪˈɡəʊʃieɪt/
      meaning_it: negoziare, trattare
    - word: terms
      pos: noun (plural)
      ipa: /tɜːmz/
      meaning_it: termini, condizioni
    - word: leak
      pos: verb
      ipa: /liːk/
      meaning_it: far trapelare, divulgare (informazioni riservate)
    - word: confidential
      pos: adjective
      ipa: /ˌkɒnfɪˈdɛnʃəl/
      meaning_it: riservato, confidenziale
  story_it: |
    Il professor Verne dipinge una grande tela — pennellate lente, odore di olio di lino
    (olfatto), pennello morbido in mano (tatto). È il PAST CONTINUOUS: l'azione di sfondo,
    ampia e in corso. Poi, all'improvviso, Marco entra di corsa e fa cadere il barattolo
    di vernice rossa — SPLASH! — una macchia netta sulla tela.
    Quella macchia è il Past Simple: breve, preciso, interruzione.
    Prima la tela in costruzione (was + -ing = azione in corso),
    poi la macchia rossa (Past Simple = interruzione).
    Non si può invertire: non puoi avere la macchia su una tela che non esiste ancora.
    Marco tocca la vernice fresca (fredda, appiccicosa), annusa l'olio —
    e ricorda: **while** = due pennelli che dipingono insieme; **when** = la macchia che cade.

- slug: past_perfect_had_done
  tags: [verb_tenses, verb_tenses_block, past_perfect]
  title_en: "Past Perfect — The Past Before the Past"
  title_it: "Past Perfect — Il Passato Prima del Passato"
  display_order: 14
  rule_en: |
    Use the **Past Perfect** when you are already talking about the past and need to refer
    to something that happened **even earlier**.

    → *When I arrived, she had already left.* (she left → then I arrived)

    Form: subject + **had** + past participle
    Key signal words: already, just, yet, never, by the time, when, after, before.

    ⚠️ Not needed if the chronological order is already clear from before/after/then.
  rule_it: |
    Usa il **Past Perfect** quando stai già parlando al passato e devi riferire qualcosa
    accaduto **ancora prima**.

    → *When I arrived, she had already left.* (lei è partita → poi io sono arrivato)

    Forma: soggetto + **had** + participio passato
    Segnali chiave: already, just, yet, never, by the time, when, after, before.

    ⚠️ Non è necessario se l'ordine cronologico è già chiaro da before/after/then.
  example_basic:
    en: "By the time we reached the theatre, the performance had already begun."
    it: "Quando arrivammo al teatro, lo spettacolo era già iniziato."
  example_complex:
    en: "The inspector realised that the witness had deliberately withheld crucial evidence that could have altered the entire verdict."
    it: "L'ispettore si rese conto che il testimone aveva deliberatamente nascosto prove cruciali che avrebbero potuto cambiare l'intero verdetto."
  vocabulary:
    - word: deliberately
      pos: adverb
      ipa: /dɪˈlɪbərətli/
      meaning_it: deliberatamente, intenzionalmente
    - word: withhold
      pos: verb
      ipa: /wɪðˈhəʊld/
      meaning_it: trattenere, nascondere, non divulgare
    - word: crucial
      pos: adjective
      ipa: /ˈkruːʃəl/
      meaning_it: cruciale, fondamentale
    - word: evidence
      pos: noun
      ipa: /ˈɛvɪdəns/
      meaning_it: prova, elemento di prova
    - word: verdict
      pos: noun
      ipa: /ˈvɜːdɪkt/
      meaning_it: verdetto, sentenza
    - word: alter
      pos: verb
      ipa: /ˈɔːltə/
      meaning_it: alterare, modificare
  story_it: |
    Nel Grammar Lab le fotografie sul muro (Past Simple) hanno ciascuna un piccolo
    cassetto sotto. Il professor Verne apre il cassetto sotto la foto di ieri —
    dentro c'è una fotografia ancora più vecchia, ingiallita, che odora di naftalina
    (olfatto). «Questo è successo PRIMA di quella foto», dice toccando la carta fragile
    (tatto, quasi si spezza). Marco guarda: prima la foto nel cassetto (Past Perfect —
    il passato più antico), poi la foto sul muro (Past Simple — il passato recente).
    Non puoi aprire il cassetto di una foto che non è ancora appesa.
    Il Gigante cerca di aprire il cassetto prima di appendere la foto
    e il cassetto gli esplode in mano con un BONG sordo. Ordine impossibile da invertire.

- slug: future_forms_will_going_to
  tags: [verb_tenses, verb_tenses_block, future_forms]
  title_en: "Future Forms — will vs going to vs Present Continuous"
  title_it: "Forme del Futuro — will vs going to vs Present Continuous"
  display_order: 15
  rule_en: |
    Three main future forms — each with a different use:

    **will** → spontaneous decisions, predictions without evidence, promises, offers
    → *I'll help you with that.* / *I think it will rain.*

    **going to** → plans already decided, predictions with present evidence
    → *I'm going to study abroad next year.* / *Look at those clouds — it's going to rain.*

    **Present Continuous** → fixed future arrangements (date/time/place already set)
    → *I'm meeting the director at 3 pm tomorrow.*

    ⚠️ «Vado a fare» in Italian = I'm going to do (NOT «I go to do»)
  rule_it: |
    Tre forme principali del futuro — ognuna con uso diverso:

    **will** → decisioni spontanee, previsioni senza prove, promesse, offerte
    → *I'll help you with that.* / *I think it will rain.*

    **going to** → piani già decisi, previsioni con prove presenti
    → *I'm going to study abroad next year.* / *Look at those clouds — it's going to rain.*

    **Present Continuous** → appuntamenti futuri già fissati (data/ora/luogo stabiliti)
    → *I'm meeting the director at 3 pm tomorrow.*

    ⚠️ «Vado a fare» in italiano = I'm going to do (NON «I go to do»)
  example_basic:
    en: "— The printer is broken! — Don't worry, I'll fix it."
    it: "— La stampante è rotta! — Non preoccuparti, la sistemo io. (decisione spontanea)"
  example_complex:
    en: "Given the alarming unemployment figures, economists predict the government is going to implement further stimulus measures before the next election."
    it: "Dati gli allarmanti dati sulla disoccupazione, gli economisti prevedono che il governo implementerà ulteriori misure di stimolo prima delle prossime elezioni."
  vocabulary:
    - word: alarming
      pos: adjective
      ipa: /əˈlɑːmɪŋ/
      meaning_it: allarmante, preoccupante
    - word: unemployment
      pos: noun
      ipa: /ˌʌnɪmˈplɔɪmənt/
      meaning_it: disoccupazione
    - word: implement
      pos: verb
      ipa: /ˈɪmplɪmɛnt/
      meaning_it: attuare, implementare, mettere in atto
    - word: stimulus
      pos: noun
      ipa: /ˈstɪmjʊləs/
      meaning_it: stimolo (economico), incentivo
    - word: measure
      pos: noun
      ipa: /ˈmɛʒə/
      meaning_it: misura, provvedimento
  story_it: |
    Nella stanza del futuro del Grammar Lab ci sono tre porte.
    La porta **WILL** è bianca e si apre solo quando Marco decide al momento —
    lui vede il calderone che trabocca e SUBITO dice «I'll stop it!»
    (odore di vapore improvviso, decisione istantanea).
    La porta **GOING TO** è blu con un cartello già scritto a mano —
    un piano vecchio di giorni. Marco la apre: dentro c'è il Gigante
    con la valigia già pronta, biglietto in mano (il piano era già deciso,
    si sente il profumo di aeroporto).
    La porta **PRESENT CONTINUOUS** ha un calendario inchiodato —
    data, ora, luogo già stampati. Non si può aprire senza il calendario.
    Prima la decisione/piano/appuntamento — poi la porta giusta.
    Marco prova ad aprire la porta blu senza aver pianificato niente:
    riceve una scarica elettrica leggera sul polso (paradossale, tattile).

# ─────────────────────────────────────────
# BLOCCO 2 — COLLOCATIONS I (giorni 7–10)
# make / do / have / take
# ─────────────────────────────────────────

- slug: coll_make
  tags: [collocations, collocations_i_block, coll_make]
  title_en: "Collocations with MAKE"
  title_it: "Collocazioni con MAKE"
  display_order: 20
  rule_en: |
    **MAKE** = to produce, create, or cause something.
    Use it when the result is something NEW or when you CAUSE a situation.

    Most common collocations:
    make a **mistake** / make a **decision** / make a **suggestion** / make a **complaint**
    make a **phone call** / make a **noise** / make **progress** / make **friends**
    make an **effort** / make an **appointment** / make **money** / make a **difference**

    ⚠️ Italian trap: «fare un errore» → make a mistake (NOT *do a mistake*)
  rule_it: |
    **MAKE** = produrre, creare o causare qualcosa.
    Si usa quando il risultato è qualcosa di NUOVO o quando si CAUSA una situazione.

    Collocazioni più comuni:
    make a **mistake** / make a **decision** / make a **suggestion** / make a **complaint**
    make a **phone call** / make a **noise** / make **progress** / make **friends**
    make an **effort** / make an **appointment** / make **money** / make a **difference**

    ⚠️ Trappola italiana: «fare un errore» → make a mistake (NON *do a mistake*)
  example_basic:
    en: "She made a terrible mistake by ignoring the warning signs."
    it: "Ha fatto un errore terribile ignorando i segnali di avvertimento."
  example_complex:
    en: "Despite the considerable setbacks, the research team continued to make remarkable progress towards developing a viable vaccine."
    it: "Nonostante i notevoli contrattempi, il team di ricerca ha continuato a fare notevoli progressi verso lo sviluppo di un vaccino efficace."
  vocabulary:
    - word: considerable
      pos: adjective
      ipa: /kənˈsɪdərəbəl/
      meaning_it: notevole, considerevole
    - word: setback
      pos: noun
      ipa: /ˈsɛtbæk/
      meaning_it: contrattempo, battuta d'arresto
    - word: remarkable
      pos: adjective
      ipa: /rɪˈmɑːkəbəl/
      meaning_it: notevole, straordinario
    - word: viable
      pos: adjective
      ipa: /ˈvaɪəbəl/
      meaning_it: fattibile, praticabile, vitale
    - word: vaccine
      pos: noun
      ipa: /ˈvæksiːn/
      meaning_it: vaccino
  story_it: |
    Nel Grammar Lab c'è una fabbrica in miniatura che COSTRUISCE cose dal nulla —
    odore di metallo caldo e plastica nuova. Il professor Verne prende un foglio bianco
    (NIENTE sopra) e ci stampa sopra «a mistake» con un timbro rosso —
    CLONK — una cosa nuova è apparsa. «MAKE crea», dice. «Guarda: prima il foglio vuoto,
    poi il timbro, poi l'errore esiste.» Il Gigante prova a timbrarci «a homework»
    e la fabbrica gli spara fuori il foglio in faccia (paradossale, si sente il vento).
    DO non costruisce — esegue. Prima il foglio bianco (il nulla),
    poi il MAKE che produce qualcosa di concreto. Non si può invertire:
    non puoi timbrar su un foglio che non hai ancora.

- slug: coll_do
  tags: [collocations, collocations_i_block, coll_do]
  title_en: "Collocations with DO"
  title_it: "Collocazioni con DO"
  display_order: 21
  rule_en: |
    **DO** = to perform an activity or task (especially work, duties, activities).
    Use it for actions, tasks, and activities — often without creating a tangible new object.

    Most common collocations:
    do **homework** / do the **dishes** / do **research** / do **business**
    do **damage** / do **exercise** / do your **best** / do a **course**
    do **harm** / do **well** / do **someone a favour**

    ⚠️ Italian trap: «fare i compiti» → do homework (NOT *make homework*)
  rule_it: |
    **DO** = svolgere un'attività o un compito (specialmente lavoro, doveri, attività).
    Si usa per azioni, compiti e attività — spesso senza creare un nuovo oggetto tangibile.

    Collocazioni più comuni:
    do **homework** / do the **dishes** / do **research** / do **business**
    do **damage** / do **exercise** / do your **best** / do a **course**
    do **harm** / do **well** / do **someone a favour**

    ⚠️ Trappola italiana: «fare i compiti» → do homework (NON *make homework*)
  example_basic:
    en: "Could you do me a favour and pass on the message?"
    it: "Potresti farmi un favore e trasmettere il messaggio?"
  example_complex:
    en: "The charity has done considerable damage to its reputation by failing to disclose its funding sources transparently."
    it: "L'ente di beneficenza ha fatto danni considerevoli alla sua reputazione non rivelando in modo trasparente le sue fonti di finanziamento."
  vocabulary:
    - word: charity
      pos: noun
      ipa: /ˈtʃærɪti/
      meaning_it: ente di beneficenza, associazione no-profit
    - word: reputation
      pos: noun
      ipa: /ˌrɛpjʊˈteɪʃən/
      meaning_it: reputazione, fama
    - word: disclose
      pos: verb
      ipa: /dɪsˈkləʊz/
      meaning_it: rivelare, rendere noto, divulgare
    - word: funding
      pos: noun
      ipa: /ˈfʌndɪŋ/
      meaning_it: finanziamento, fondi
    - word: transparently
      pos: adverb
      ipa: /trænsˈpærəntli/
      meaning_it: in modo trasparente
  story_it: |
    Accanto alla fabbrica MAKE c'è un corridoio di tapis roulant —
    ogni tapis roulant è un compito da svolgere. Marco cammina su quello
    etichettato «homework»: non produce niente di nuovo, ma il tapis roulant avanza
    (si sente la vibrazione sotto i piedi, odore di gomma calda). «DO è movimento»,
    dice il professor Verne, «non costruzione.» Il Gigante prova a sedersi su un tapis roulant
    per «make homework» e la cinghia lo catapulta fuori dalla finestra (WHOOSH — vento in faccia).
    Prima scegli il tapis roulant giusto (l'attività esiste già),
    poi ci cammini sopra (la esegui). Non puoi camminare su un tapis roulant che non hai scelto.

- slug: coll_have
  tags: [collocations, collocations_i_block, coll_have]
  title_en: "Collocations with HAVE"
  title_it: "Collocazioni con HAVE"
  display_order: 22
  rule_en: |
    **HAVE** = to experience something or to possess/undergo an action.
    In collocations, HAVE often describes experiences, activities you participate in,
    or states of possession.

    Most common collocations:
    have a **break** / have **fun** / have a **conversation** / have a **look**
    have a **meal** / have a **shower** / have **difficulty** / have **doubts**
    have an **argument** / have a **good time** / have a **go** / have **lunch**

    ⚠️ «Avere una pausa» → have a break (NOT *make a break* or *do a break*)
  rule_it: |
    **HAVE** = vivere/sperimentare qualcosa oppure possedere/subire un'azione.
    Nelle collocazioni, HAVE descrive spesso esperienze, attività a cui si partecipa,
    o stati di possesso.

    Collocazioni più comuni:
    have a **break** / have **fun** / have a **conversation** / have a **look**
    have a **meal** / have a **shower** / have **difficulty** / have **doubts**
    have an **argument** / have a **good time** / have a **go** / have **lunch**

    ⚠️ «Avere una pausa» → have a break (NON *make a break* o *do a break*)
  example_basic:
    en: "We had a heated argument about the proposed changes to the schedule."
    it: "Abbiamo avuto un acceso dibattito sulle modifiche proposte al programma."
  example_complex:
    en: "The visiting delegates had considerable difficulty reaching a consensus on the most contentious clauses of the treaty."
    it: "I delegati in visita hanno avuto notevoli difficoltà a raggiungere un consenso sulle clausole più controverse del trattato."
  vocabulary:
    - word: considerable
      pos: adjective
      ipa: /kənˈsɪdərəbəl/
      meaning_it: notevole, considerevole
    - word: consensus
      pos: noun
      ipa: /kənˈsɛnsəs/
      meaning_it: consenso, accordo generale
    - word: contentious
      pos: adjective
      ipa: /kənˈtɛnʃəs/
      meaning_it: controverso, dibattuto
    - word: clause
      pos: noun
      ipa: /klɔːz/
      meaning_it: clausola (di un contratto/trattato)
    - word: treaty
      pos: noun
      ipa: /ˈtriːti/
      meaning_it: trattato (internazionale)
  story_it: |
    Nel Grammar Lab c'è una vasca da bagno piena di esperienze liquide —
    ogni liquido ha un colore e un profumo diverso. Per «have a break»
    il liquido è verde menta (odore fresco). Marco si immerge:
    sente il calore avvolgerlo (tatto), la menta nel naso.
    HAVE significa immergersi nell'esperienza — non crearla (MAKE),
    non eseguire un compito (DO), ma VIVERLA.
    Il professor Verne non può fare «have» dall'esterno della vasca —
    deve entrarci. Prima la vasca esiste con il liquido,
    poi Marco ci entra e vive l'esperienza.
    Il Gigante prova a fare «make a break»: la fabbrica produce un interruttore
    elettrico invece di una pausa — CLONK — luce che si spegne, buio totale.
    Ordine chiaro: prima la vasca (l'esperienza è disponibile), poi l'immersione.

- slug: coll_take
  tags: [collocations, collocations_i_block, coll_take]
  title_en: "Collocations with TAKE"
  title_it: "Collocazioni con TAKE"
  display_order: 23
  rule_en: |
    **TAKE** = to accept, grab, or hold something — often implies obtaining or assuming control.
    In collocations, TAKE suggests taking something FOR yourself or assuming a role/action.

    Most common collocations:
    take a **risk** / take a **break** / take **responsibility** / take **action**
    take **place** / take **part** / take **turns** / take **notes**
    take **advantage** / take **care** / take **time** / take an **exam**

    ⚠️ «Prendere un esame» → take an exam (NOT *make an exam* or *do an exam*)
    ⚠️ take a break AND have a break are BOTH correct — but take suggests more deliberate choice.
  rule_it: |
    **TAKE** = accettare, prendere o assumere qualcosa — implica spesso ottenere o assumere controllo.
    Nelle collocazioni, TAKE suggerisce prendere qualcosa PER sé o assumere un ruolo/azione.

    Collocazioni più comuni:
    take a **risk** / take a **break** / take **responsibility** / take **action**
    take **place** / take **part** / take **turns** / take **notes**
    take **advantage** / take **care** / take **time** / take an **exam**

    ⚠️ «Prendere un esame» → take an exam (NON *make an exam* o *do an exam*)
    ⚠️ take a break E have a break sono entrambi corretti — ma take implica una scelta più deliberata.
  example_basic:
    en: "You should take responsibility for the errors in the report."
    it: "Dovresti assumerti la responsabilità degli errori nel rapporto."
  example_complex:
    en: "Facing mounting criticism, the board finally decided to take decisive action to address the widespread allegations of misconduct."
    it: "Di fronte a critiche crescenti, il consiglio ha finalmente deciso di intraprendere un'azione decisiva per affrontare le diffuse accuse di cattiva condotta."
  vocabulary:
    - word: mounting
      pos: adjective
      ipa: /ˈmaʊntɪŋ/
      meaning_it: crescente, in aumento
    - word: decisive
      pos: adjective
      ipa: /dɪˈsaɪsɪv/
      meaning_it: decisivo, risoluto
    - word: widespread
      pos: adjective
      ipa: /ˈwaɪdsprɛd/
      meaning_it: diffuso, esteso
    - word: allegation
      pos: noun
      ipa: /ˌælɪˈɡeɪʃən/
      meaning_it: accusa, allegazione
    - word: misconduct
      pos: noun
      ipa: /ˌmɪsˈkɒndʌkt/
      meaning_it: cattiva condotta, comportamento scorretto
  story_it: |
    Nel Grammar Lab c'è un gancio sul soffitto con diversi oggetti appesi —
    rischi, responsabilità, esami, appunti. Marco deve ALLUNGARE LA MANO e PRENDERE
    quello che vuole (tatto: sente il peso dell'oggetto, l'aria fresca in alto).
    «TAKE è prendere attivamente per sé», dice il prof. Il Gigante
    prova a «do a risk» e il tapis roulant inizia ad andare senza che lui abbia scelto
    nulla (caotico, rumore di cinghia che scivola). Poi prova «make a risk»
    e la fabbrica produce un dado di metallo che gli cade sul piede — CLANG —
    grido basso come un tuono. TAKE invece: Marco allunga la mano,
    afferra «responsibility» dal gancio (pesante, superficie ruvida),
    se la mette in spalla deliberatamente. Prima il gancio con l'oggetto,
    poi la mano che si allunga, poi il peso sulle spalle. Impossibile da invertire.

# ─────────────────────────────────────────
# BLOCCO 3 — COLLOCATIONS II (giorni 11–14)
# Intensifiers + adj+noun collocations
# ─────────────────────────────────────────

- slug: coll_adv_intensifiers
  tags: [collocations, collocations_ii_block, coll_adv_intensifiers, false_friend_italian]
  title_en: "Intensifier Adverbs — deeply, highly, widely, strongly"
  title_it: "Avverbi intensificatori — deeply, highly, widely, strongly"
  display_order: 30
  rule_en: |
    Certain adverbs collocate with specific adjectives/verbs. You cannot swap them freely.

    **deeply** + concerned / affected / committed / regret / moved / disturbing
    **highly** + recommended / skilled / unlikely / competitive / regarded / effective
    **widely** + regarded / used / accepted / available / known / criticised
    **strongly** + recommend / suggest / oppose / believe / disagree / influence

    ⚠️ NOT «*greatly recommended*» or «*deeply skilled*» — these sound unnatural.
    ⚠️ Italian trap: «molto» covers all of these in Italian — in English each has its own partner.
  rule_it: |
    Certi avverbi si collocano con aggettivi/verbi specifici. Non sono intercambiabili.

    **deeply** + concerned / affected / committed / regret / moved / disturbing
    **highly** + recommended / skilled / unlikely / competitive / regarded / effective
    **widely** + regarded / used / accepted / available / known / criticised
    **strongly** + recommend / suggest / oppose / believe / disagree / influence

    ⚠️ NON «*greatly recommended*» o «*deeply skilled*» — suonano innaturali.
    ⚠️ Trappola italiana: «molto» copre tutto in italiano — in inglese ogni avverbio ha il suo partner.
  example_basic:
    en: "I strongly recommend reading this book before the exam."
    it: "Raccomando vivamente di leggere questo libro prima dell'esame."
  example_complex:
    en: "The documentary was widely regarded as a deeply disturbing portrayal of corruption within the financial sector."
    it: "Il documentario era ampiamente considerato come un ritratto profondamente inquietante della corruzione nel settore finanziario."
  vocabulary:
    - word: portrayal
      pos: noun
      ipa: /pɔːˈtreɪəl/
      meaning_it: ritratto, rappresentazione
    - word: corruption
      pos: noun
      ipa: /kəˈrʌpʃən/
      meaning_it: corruzione
    - word: financial sector
      pos: noun phrase
      ipa: /faɪˈnænʃəl ˈsɛktə/
      meaning_it: settore finanziario
    - word: disturbing
      pos: adjective
      ipa: /dɪˈstɜːbɪŋ/
      meaning_it: inquietante, disturbante
    - word: regard (as)
      pos: verb
      ipa: /rɪˈɡɑːd/
      meaning_it: considerare, ritenere
  story_it: |
    Nel Grammar Lab ci sono quattro tazze di colore diverso sul bancone del prof. Verne.
    La tazza BLU SCURA (deeply) emana vapore freddo e sa di oceano profondo (olfatto salino).
    La tazza DORATA (highly) ha bordi brillanti e brilla verso l'alto.
    La tazza VERDE LARGA (widely) è piatta e si espande ai lati come un lago.
    La tazza ROSSA (strongly) è tiepida e vibrante sotto le dita (tatto: tremore leggero).
    Marco prova a mescolare le tazze — mette deeply nella tazza dorata:
    esplosione di schiuma amarissima (sapore, paradossale).
    Prima impari il colore della tazza (l'avverbio), poi il suo partner naturale.
    Il Gigante prova «very recommended» e tutte e quattro le tazze gli si rovesciano addosso.

- slug: coll_adj_noun_strong_powerful
  tags: [collocations, collocations_ii_block, coll_adj_noun_strong_powerful]
  title_en: "Adj+Noun Collocations — strong vs powerful vs heavy vs great"
  title_it: "Collocazioni Agg+Sost — strong vs powerful vs heavy vs great"
  display_order: 31
  rule_en: |
    Some adjectives look interchangeable but collocate with fixed nouns:

    **strong** + opinion / evidence / accent / coffee / candidate / argument
    **powerful** + engine / speech / drug / tool / message / impact
    **heavy** + rain / traffic / smoker / drinker / burden / workload / influence
    **great** + deal / pleasure / success / importance / difficulty / variety

    ⚠️ «*a powerful opinion*» or «*a strong engine*» sound wrong to native speakers.
    ⚠️ Italian trap: «forte», «potente», «pesante», «grande» all feel equivalent — they are not.
  rule_it: |
    Alcuni aggettivi sembrano intercambiabili ma si collocano con sostantivi fissi:

    **strong** + opinion / evidence / accent / coffee / candidate / argument
    **powerful** + engine / speech / drug / tool / message / impact
    **heavy** + rain / traffic / smoker / drinker / burden / workload / influence
    **great** + deal / pleasure / success / importance / difficulty / variety

    ⚠️ «*a powerful opinion*» o «*a strong engine*» suonano sbagliati ai madrelingua.
    ⚠️ Trappola italiana: «forte», «potente», «pesante», «grande» sembrano equivalenti — non lo sono.
  example_basic:
    en: "Despite the heavy workload, she delivered the project ahead of schedule."
    it: "Nonostante il carico di lavoro intenso, ha consegnato il progetto prima del previsto."
  example_complex:
    en: "The prosecution presented strong evidence and delivered a powerful closing speech that had a great deal of impact on the jury."
    it: "L'accusa ha presentato prove solide e ha tenuto un potente discorso finale che ha avuto un grande impatto sulla giuria."
  vocabulary:
    - word: prosecution
      pos: noun
      ipa: /ˌprɒsɪˈkjuːʃən/
      meaning_it: accusa (parte accusante in un processo)
    - word: closing speech
      pos: noun phrase
      ipa: /ˈkləʊzɪŋ spiːtʃ/
      meaning_it: arringa finale, discorso conclusivo
    - word: jury
      pos: noun
      ipa: /ˈdʒʊəri/
      meaning_it: giuria
    - word: impact
      pos: noun
      ipa: /ˈɪmpækt/
      meaning_it: impatto, effetto
    - word: ahead of schedule
      pos: phrase
      ipa: /əˈhɛd əv ˈʃɛdjuːl/
      meaning_it: in anticipo rispetto al programma
  story_it: |
    Nel Grammar Lab c'è un armadietto con quattro cassetti etichettati:
    STRONG (cassetto di acciaio, freddo al tatto), POWERFUL (vibrante, ronza),
    HEAVY (difficile da aprire, cigola), GREAT (dorato, odore di legno pregiato).
    Marco apre il cassetto STRONG e trova: opinioni, caffè, prove.
    Apre POWERFUL: motori, discorsi, farmaci.
    Prova a mettere «engine» nel cassetto STRONG — il cassetto si blocca,
    gli pizzica le dita (tatto acuto, paradossale). Prima conosci il cassetto giusto,
    poi ci metti il sostantivo. Il Gigante apre tutti i cassetti insieme
    e le combinazioni sbagliate cadono sul pavimento come pietre —
    CLANG CLANG CLANG — il rumore risveglia tutti nel lab.


# ─────────────────────────────────────────
# BLOCCO 4 — PREPOSITIONS (giorni 15–18)
# ─────────────────────────────────────────

- slug: prep_time_in_at_on
  tags: [prepositions, prepositions_block, prep_time]
  title_en: "Prepositions of Time — in / at / on"
  title_it: "Preposizioni di Tempo — in / at / on"
  display_order: 40
  rule_en: |
    **at** → precise times & specific moments
    at 3 pm / at midnight / at noon / at the weekend (BrE) / at Christmas / at the moment

    **on** → days and dates
    on Monday / on 5th March / on Christmas Day / on my birthday / on time

    **in** → longer periods (months, years, seasons, centuries, parts of day)
    in March / in 2024 / in summer / in the morning / in the 19th century / in five minutes

    ⚠️ Italian trap: in Italian «a» covers at/on for times — in English you must choose carefully.
    ⚠️ NO preposition with: last/next/this/every + time word (last Monday, every year)
  rule_it: |
    **at** → orari precisi e momenti specifici
    at 3 pm / at midnight / at noon / at the weekend (BrE) / at Christmas / at the moment

    **on** → giorni e date
    on Monday / on 5th March / on Christmas Day / on my birthday / on time

    **in** → periodi più lunghi (mesi, anni, stagioni, secoli, parti della giornata)
    in March / in 2024 / in summer / in the morning / in the 19th century / in five minutes

    ⚠️ Trappola italiana: in italiano «a» copre at/on per gli orari — in inglese devi scegliere.
    ⚠️ NESSUNA preposizione con: last/next/this/every + parola temporale (last Monday, every year)
  example_basic:
    en: "The meeting is on Thursday at 9 am, not in the afternoon."
    it: "La riunione è giovedì alle 9, non nel pomeriggio."
  example_complex:
    en: "In the early 20th century, at a time of profound social upheaval, the movement gained significant momentum on the very day its manifesto was published."
    it: "All'inizio del XX secolo, in un momento di profondo sconvolgimento sociale, il movimento acquistò slancio significativo proprio il giorno in cui il suo manifesto venne pubblicato."
  vocabulary:
    - word: upheaval
      pos: noun
      ipa: /ʌpˈhiːvəl/
      meaning_it: sconvolgimento, tumulto
    - word: momentum
      pos: noun
      ipa: /məˈmɛntəm/
      meaning_it: slancio, spinta, momento (fisico)
    - word: manifesto
      pos: noun
      ipa: /ˌmænɪˈfɛstəʊ/
      meaning_it: manifesto, dichiarazione programmatica
    - word: profound
      pos: adjective
      ipa: /prəˈfaʊnd/
      meaning_it: profondo, intenso
  story_it: |
    Il professor Verne ha tre cassetti sul suo orologio da tasca (paradossale: un orologio con cassetti).
    Cassetto AT: ha un cerchio piccolo e preciso come la punta di uno spillo — si apre solo per momenti esatti.
    Cassetto ON: è piatto come un foglio di calendario, si apre soltanto posando il dito su UN giorno.
    Cassetto IN: è profondo come un pozzo, ci cadono dentro mesi interi, anni, stagioni.
    Marco apre AT e dice «in Monday» — il cassetto gli pizzica le dita (tatto pungente).
    Poi prova ON per «on March» — il cassetto si gonfia e lo respinge (mese troppo grande per ON).
    Prima capisci la grandezza del periodo, poi scegli il cassetto giusto.
    Il Gigante mette «last Monday» in un cassetto qualsiasi: tutti e tre si bloccano.
    Nessuna preposizione per last/next/this — i cassetti spariscono del tutto.

- slug: prep_place_in_at_on
  tags: [prepositions, prepositions_block, prep_place]
  title_en: "Prepositions of Place — in / at / on"
  title_it: "Preposizioni di Luogo — in / at / on"
  display_order: 41
  rule_en: |
    **in** → enclosed space, inside something, cities, countries
    in the box / in London / in Italy / in the room / in the street (BrE)

    **at** → a specific point or location (address, institution, event)
    at the bus stop / at school / at work / at the station / at 14 Baker Street

    **on** → surface, floor, line (transport, street AmE, floor of building)
    on the table / on the wall / on the first floor / on the bus / on the street (AmE)

    ⚠️ Tricky pairs: *in* the car vs *on* the bus/train/plane (size matters)
    ⚠️ at school/work/home = no article; in the school/office = specific building
  rule_it: |
    **in** → spazio chiuso, dentro qualcosa, città, paesi
    in the box / in London / in Italy / in the room / in the street (BrE)

    **at** → punto specifico o luogo (indirizzo, istituzione, evento)
    at the bus stop / at school / at work / at the station / at 14 Baker Street

    **on** → superficie, piano, linea (trasporti, piano dell'edificio)
    on the table / on the wall / on the first floor / on the bus / on the street (AmE)

    ⚠️ Coppie difficili: *in* the car vs *on* the bus/train/plane (conta la grandezza)
    ⚠️ at school/work/home = senza articolo; in the school/office = edificio specifico
  example_basic:
    en: "She left her keys on the table, not in her bag."
    it: "Ha lasciato le chiavi sul tavolo, non nella borsa."
  example_complex:
    en: "The negotiations took place at the embassy on the outskirts of the city, in a room overlooking a surprisingly tranquil courtyard."
    it: "I negoziati si sono svolti all'ambasciata alla periferia della città, in una stanza che si affacciava su un cortile sorprendentemente tranquillo."
  vocabulary:
    - word: embassy
      pos: noun
      ipa: /ˈɛmbəsi/
      meaning_it: ambasciata
    - word: outskirts
      pos: noun (plural)
      ipa: /ˈaʊtskɜːts/
      meaning_it: periferia, zone periferiche
    - word: overlook
      pos: verb
      ipa: /ˌəʊvəˈlʊk/
      meaning_it: affacciarsi su, dare su (vista dall'alto)
    - word: tranquil
      pos: adjective
      ipa: /ˈtræŋkwɪl/
      meaning_it: tranquillo, sereno
    - word: courtyard
      pos: noun
      ipa: /ˈkɔːtjɑːd/
      meaning_it: cortile
  story_it: |
    Il Grammar Lab ha tre zone demarcate da linee colorate sul pavimento.
    La zona IN è una scatola di vetro chiusa — Marco entra e sente l'aria ferma intorno,
    le pareti lo avvolgono (tatto: muri lisci e freddi). IN = spazio chiuso.
    La zona AT è una croce rossa sul pavimento — un punto preciso. Il prof. Verne
    ci punta il dito sopra: «Sei QUI, in questo punto esatto. At.»
    La zona ON è una superficie piatta rialzata — Marco ci sale su e sente il pavimento
    solido sotto i piedi (tatto). ON = sopra una superficie.
    Il Gigante si siede «in the bus» — si capisce che è dentro il motore.
    Poi sale «on the car» — è letteralmente sul tetto (rumore di lamiera che si piega).
    Prima la forma dello spazio (chiuso/punto/superficie), poi la preposizione.

- slug: prep_verb_preposition
  tags: [prepositions, prepositions_block, vprep_fixed]
  title_en: "Verb + Preposition — Fixed Combinations"
  title_it: "Verbo + Preposizione — Combinazioni Fisse"
  display_order: 42
  rule_en: |
    Many verbs require a specific preposition. These must be memorised as units.

    **about**: think / worry / complain / dream / hear / care / be excited
    **for**: apply / ask / search / wait / look / hope / be responsible / pay
    **of**: consist / be aware / be proud / be capable / be afraid / remind / accuse
    **on**: depend / rely / insist / concentrate / congratulate / comment
    **with**: agree / deal / be satisfied / be familiar / provide / cope
    **to**: belong / refer / respond / apologise / listen / object / be used to

    ⚠️ «Dipende da» = depends ON (not *depends of*)
    ⚠️ «Essere d'accordo con» = agree WITH (not *agree to* a person)
  rule_it: |
    Molti verbi richiedono una preposizione specifica. Vanno memorizzati come unità.

    **about**: think / worry / complain / dream / hear / care / be excited
    **for**: apply / ask / search / wait / look / hope / be responsible / pay
    **of**: consist / be aware / be proud / be capable / be afraid / remind / accuse
    **on**: depend / rely / insist / concentrate / congratulate / comment
    **with**: agree / deal / be satisfied / be familiar / provide / cope
    **to**: belong / refer / respond / apologise / listen / object / be used to

    ⚠️ «Dipende da» = depends ON (non *depends of*)
    ⚠️ «Essere d'accordo con» = agree WITH (non *agree to* una persona)
  example_basic:
    en: "The success of the project depends on the cooperation of all team members."
    it: "Il successo del progetto dipende dalla cooperazione di tutti i membri del team."
  example_complex:
    en: "The committee insisted on reviewing all the evidence before commenting on the allegations made against the former director."
    it: "Il comitato ha insistito per esaminare tutte le prove prima di commentare le accuse formulate contro l'ex direttore."
  vocabulary:
    - word: committee
      pos: noun
      ipa: /kəˈmɪti/
      meaning_it: comitato, commissione
    - word: insist on
      pos: verb + prep
      ipa: /ɪnˈsɪst ɒn/
      meaning_it: insistere per/su
    - word: comment on
      pos: verb + prep
      ipa: /ˈkɒmɛnt ɒn/
      meaning_it: commentare, esprimersi su
    - word: allegation
      pos: noun
      ipa: /ˌælɪˈɡeɪʃən/
      meaning_it: accusa, allegazione
    - word: former
      pos: adjective
      ipa: /ˈfɔːmə/
      meaning_it: ex, precedente, primo (di due)
  story_it: |
    Nel Grammar Lab ogni verbo è un magnete a forma di verbo (la parola incisa sul metallo,
    freddo e pesante in mano). Ogni magnete può attaccarsi SOLO alla preposizione giusta —
    le altre la respingono con uno scatto secco (tatto: vibrazione sul palmo).
    Marco prende «depends» e lo avvicina a «of»: SCATTO, rimbalza indietro.
    Lo avvicina a «on»: CLICK, si aggancia (sensazione calda, soddisfacente).
    Il professor Verne tira fuori una scatola con cento magneti:
    «Prima impara la forma del magnete (il verbo), poi cerca la preposizione che si aggancia.»
    Il Gigante prova ad attaccare tutti i magneti a «of»: si forma una palla magnetica
    enorme che rotola fuori dal laboratorio — odore di metallo caldo,
    rumore di clic e scatti. Ordine: prima il verbo, poi la preposizione giusta.

- slug: prep_fixed_phrases
  tags: [prepositions, prepositions_block, fixed_prep_phrases]
  title_en: "Fixed Prepositional Phrases"
  title_it: "Frasi Preposizionali Fisse"
  display_order: 43
  rule_en: |
    Some prepositional phrases are fixed expressions. Memorise them as chunks.

    **by**: by mistake / by chance / by heart / by hand / by far / by now / by the way
    **in**: in advance / in common / in favour of / in charge of / in debt / in touch / in time
    **on**: on purpose / on behalf of / on the contrary / on the whole / on strike / on sale
    **at**: at last / at least / at first / at once / at random / at risk / at fault
    **out of**: out of date / out of order / out of breath / out of the question / out of work

    ⚠️ «A proposito» = by the way (NOT *on purpose* which means «di proposito»)
  rule_it: |
    Alcune frasi preposizionali sono espressioni fisse. Memorizzale come blocchi interi.

    **by**: by mistake / by chance / by heart / by hand / by far / by now / by the way
    **in**: in advance / in common / in favour of / in charge of / in debt / in touch / in time
    **on**: on purpose / on behalf of / on the contrary / on the whole / on strike / on sale
    **at**: at last / at least / at first / at once / at random / at risk / at fault
    **out of**: out of date / out of order / out of breath / out of the question / out of work

    ⚠️ «A proposito» = by the way (NON *on purpose* che significa «di proposito»)
  example_basic:
    en: "I deleted the file by mistake — I didn't do it on purpose."
    it: "Ho cancellato il file per errore — non l'ho fatto apposta."
  example_complex:
    en: "On behalf of the entire delegation, I would like to express, in advance, our gratitude for the warm welcome and the arrangements made on our behalf."
    it: "A nome dell'intera delegazione, vorrei esprimere, in anticipo, la nostra gratitudine per la calorosa accoglienza e per le disposizioni prese a nostro nome."
  vocabulary:
    - word: on behalf of
      pos: phrase
      ipa: /ɒn bɪˈhɑːf əv/
      meaning_it: a nome di, per conto di
    - word: delegation
      pos: noun
      ipa: /ˌdɛlɪˈɡeɪʃən/
      meaning_it: delegazione
    - word: gratitude
      pos: noun
      ipa: /ˈɡrætɪtjuːd/
      meaning_it: gratitudine, riconoscenza
    - word: arrangement
      pos: noun
      ipa: /əˈreɪndʒmənt/
      meaning_it: sistemazione, accordo, disposizione
  story_it: |
    Nel Grammar Lab c'è una libreria con scaffali etichettati BY, IN, ON, AT, OUT OF.
    Ogni frase è una statuetta di pietra incisa — fredda, pesante, non modificabile.
    Marco trova «on purpose» e «by the way» e le confonde (entrambe sembrano «a proposito»).
    Il professor Verne le mette vicine: «Annusa.» ON PURPOSE odora di inchiostro deliberato —
    qualcuno l'ha incisa con cura, con intenzione. BY THE WAY odora di polvere di strada —
    è un pensiero che arriva per caso mentre cammini.
    Prima il significato, poi lo scaffale giusto.
    Il Gigante prende tutte le statuette e le rimescola sugli scaffali sbagliati:
    le statuette iniziano a tremare e cadono una ad una — CRASH — finché ogni statuetta
    è sul suo scaffale e il rumore si ferma. Ordine impossibile da invertire:
    le statuette non riposano finché non sono nel posto giusto.


# ─────────────────────────────────────────
# BLOCCO 5 — WORD FORMATION I (giorni 19–22)
# Suffissi noun/adj/adv
# ─────────────────────────────────────────

- slug: rule_verb_to_noun_tion
  tags: [word_formation, word_formation_i_block, rule_verb_to_noun_tion, part3_word_formation]
  title_en: "Word Formation — Verb → Noun: -tion / -sion / -ation"
  title_it: "Word Formation — Verbo → Sostantivo: -tion / -sion / -ation"
  display_order: 50
  rule_en: |
    Add **-tion / -sion / -ation** to a verb to form a noun.

    **-tion**: educate→education / produce→production / introduce→introduction
    **-sion**: decide→decision / extend→extension / expand→expansion / divide→division
    **-ation**: imagine→imagination / organise→organisation / examine→examination

    Spelling rules:
    - Drop the final **-e**: produce → produc**tion** (not producEtion)
    - Verb ends in **-de**: decide → deci**sion** (de→sion)
    - Verb ends in **-d** or **-nd**: expand → expan**sion**

    ⚠️ The stress often shifts: exˈamine → examinˈation
  rule_it: |
    Aggiungi **-tion / -sion / -ation** a un verbo per formare un sostantivo.

    **-tion**: educate→education / produce→production / introduce→introduction
    **-sion**: decide→decision / extend→extension / expand→expansion / divide→division
    **-ation**: imagine→imagination / organise→organisation / examine→examination

    Regole di spelling:
    - Elimina la **-e** finale: produce → produc**tion** (non producEtion)
    - Il verbo finisce in **-de**: decide → deci**sion** (de→sion)
    - Il verbo finisce in **-d** o **-nd**: expand → expan**sion**

    ⚠️ Lo stress spesso si sposta: exˈamine → examinˈation
  example_basic:
    en: "The introduction of new technology has transformed modern production methods."
    it: "L'introduzione di nuove tecnologie ha trasformato i moderni metodi di produzione."
  example_complex:
    en: "The government's decision to increase taxation on luxury goods sparked considerable opposition from the business community."
    it: "La decisione del governo di aumentare la tassazione sui beni di lusso ha suscitato una considerevole opposizione dalla comunità imprenditoriale."
  vocabulary:
    - word: taxation
      pos: noun
      ipa: /tækˈseɪʃən/
      meaning_it: tassazione, sistema fiscale
    - word: luxury goods
      pos: noun phrase
      ipa: /ˈlʌkʃəri ɡʊdz/
      meaning_it: beni di lusso
    - word: spark
      pos: verb
      ipa: /spɑːk/
      meaning_it: scatenare, suscitare, provocare
    - word: opposition
      pos: noun
      ipa: /ˌɒpəˈzɪʃən/
      meaning_it: opposizione, resistenza
    - word: community
      pos: noun
      ipa: /kəˈmjuːnɪti/
      meaning_it: comunità, ambiente
  story_it: |
    Nel Grammar Lab c'è una macchina con uno stampino a forma di -TION.
    Il professor Verne prende il verbo «produce» (una barretta di metallo verde, liscia),
    lo inserisce nella macchina — rumore di ingranaggi, odore di olio caldo —
    e la macchina pressa il suffisso sulla coda del verbo.
    Ma prima schiaccia via la -E finale (si sente il clic secco, la piccola E vola via come
    un insetto). Poi CLONK: esce «production» — più pesante, più rotondo (è diventato un oggetto,
    una cosa che puoi tenere in mano). Marco tocca la -TION: è rugosa, incisa in rilievo.
    Ordine fisso: prima inserisci il verbo, poi la macchina toglie la -e,
    poi applica il suffisso. Non puoi avere il sostantivo prima del verbo.

- slug: rule_noun_to_adj_ful_less
  tags: [word_formation, word_formation_i_block, rule_noun_to_adj_ful, rule_noun_to_adj_less, part3_word_formation]
  title_en: "Word Formation — Noun → Adjective: -ful / -less"
  title_it: "Word Formation — Sostantivo → Aggettivo: -ful / -less"
  display_order: 51
  rule_en: |
    Add **-ful** or **-less** to a noun to create opposite adjectives.

    **-ful** = having the quality of (positive/neutral):
    care→careful / hope→hopeful / use→useful / help→helpful / power→powerful / harm→harmful

    **-less** = without the quality of (negative/lacking):
    care→careless / hope→hopeless / use→useless / help→helpless / harm→harmless / end→endless

    ⚠️ Many nouns have BOTH forms with opposite meanings: careful ↔ careless
    ⚠️ Spelling: if noun ends in -y → change y to i: beauty→beautiful (NOT *beautyful*)
  rule_it: |
    Aggiungi **-ful** o **-less** a un sostantivo per creare aggettivi opposti.

    **-ful** = che ha la qualità di (positivo/neutro):
    care→careful / hope→hopeful / use→useful / help→helpful / power→powerful / harm→harmful

    **-less** = senza la qualità di (negativo/mancante):
    care→careless / hope→hopeless / use→useless / help→helpless / harm→harmless / end→endless

    ⚠️ Molti sostantivi hanno ENTRAMBE le forme con significati opposti: careful ↔ careless
    ⚠️ Spelling: se il sostantivo finisce in -y → cambia y in i: beauty→beautiful (NON *beautyful*)
  example_basic:
    en: "Her careless attitude made her increasingly hopeless at managing deadlines."
    it: "Il suo atteggiamento negligente la rendeva sempre più incapace di rispettare le scadenze."
  example_complex:
    en: "The seemingly harmless remark proved remarkably harmful to the delicate negotiations, leaving both sides feeling helpless and hopeless."
    it: "Il commento apparentemente innocuo si rivelò notevolmente dannoso per i delicati negoziati, lasciando entrambe le parti in una sensazione di impotenza e sconforto."
  vocabulary:
    - word: seemingly
      pos: adverb
      ipa: /ˈsiːmɪŋli/
      meaning_it: apparentemente, in apparenza
    - word: remark
      pos: noun
      ipa: /rɪˈmɑːk/
      meaning_it: commento, osservazione
    - word: prove
      pos: verb
      ipa: /pruːv/
      meaning_it: rivelarsi, dimostrarsi (+ aggettivo)
    - word: delicate
      pos: adjective
      ipa: /ˈdɛlɪkɪt/
      meaning_it: delicato, fragile, difficile
  story_it: |
    Le gemelle Irregolari del Grammar Lab sono FULL (piena, ottimista, -FUL)
    e EMPTY (vuota, assente, -LESS). Sono identiche tranne per questo.
    Marco prende un sacchetto di «care» (si sente il calore attraverso il tessuto —
    care è soffice) e deve scegliere: lo dà a FULL o lo svuota con LESS.
    Se lo dà a FULL: diventa «careful» — la gemella lo tiene stretto al petto (caldo, sicuro).
    Se lo passa a LESS: diventa «careless» — la gemella lo buca e il contenuto si sparge per terra
    (odore di terra, sensazione di vuoto). Prima il sostantivo (il sacchetto),
    poi la scelta: -ful (riempie) o -less (svuota). Il Gigante aggiunge -y alla fine di «beauty»:
    «beautyfull» — Le gemelle si tappano le orecchie dal suono sbagliato.
    La y si trasforma in i prima del -ful: «beau-ti-ful», tre sillabe dolci.

- slug: rule_verb_to_adj_ive
  tags: [word_formation, word_formation_i_block, rule_verb_to_adj_ive, part3_word_formation]
  title_en: "Word Formation — Verb → Adjective: -ive / -ative / -itive"
  title_it: "Word Formation — Verbo → Aggettivo: -ive / -ative / -itive"
  display_order: 52
  rule_en: |
    Add **-ive / -ative / -itive** to a verb (or noun) to form an adjective
    meaning "having the tendency to" or "relating to".

    **-ive**: create→creative / effect→effective / attract→attractive / act→active
    **-ative**: inform→informative / imagine→imaginative / cooperate→cooperative / talk→talkative
    **-itive**: compete→competitive / add→additive / sense→sensitive

    Spelling rules:
    - Drop the final **-e**: create→creat**ive** / imagine→imagin**ative**
    - Verb ends in **-ate**: inform**ate**→inform**ative** (drop -ate, add -ative)

    ⚠️ «sensitive» = sensibile (emotionally) — NOT «sensible» which means «ragionevole»!
  rule_it: |
    Aggiungi **-ive / -ative / -itive** a un verbo (o sostantivo) per formare un aggettivo
    con significato «che tende a» o «relativo a».

    **-ive**: create→creative / effect→effective / attract→attractive / act→active
    **-ative**: inform→informative / imagine→imaginative / cooperate→cooperative / talk→talkative
    **-itive**: compete→competitive / add→additive / sense→sensitive

    Regole di spelling:
    - Elimina la **-e** finale: create→creat**ive** / imagine→imagin**ative**
    - Il verbo finisce in **-ate**: inform**ate**→inform**ative** (togli -ate, aggiungi -ative)

    ⚠️ «sensitive» = sensibile (emotivamente) — NON «sensible» che significa «ragionevole»!
  example_basic:
    en: "She is incredibly creative and always comes up with imaginative solutions."
    it: "È incredibilmente creativa e trova sempre soluzioni fantasiose."
  example_complex:
    en: "The highly competitive nature of the industry demands that companies remain consistently innovative and responsive to shifting consumer demands."
    it: "La natura altamente competitiva del settore richiede che le aziende rimangano costantemente innovative e reattive ai cambiamenti delle richieste dei consumatori."
  vocabulary:
    - word: consistently
      pos: adverb
      ipa: /kənˈsɪstəntli/
      meaning_it: costantemente, in modo coerente
    - word: innovative
      pos: adjective
      ipa: /ˈɪnəvətɪv/
      meaning_it: innovativo
    - word: responsive
      pos: adjective
      ipa: /rɪˈspɒnsɪv/
      meaning_it: reattivo, ricettivo, pronto a rispondere
    - word: shifting
      pos: adjective
      ipa: /ˈʃɪftɪŋ/
      meaning_it: mutevole, in cambiamento
    - word: consumer
      pos: noun
      ipa: /kənˈsjuːmə/
      meaning_it: consumatore
  story_it: |
    La macchina -TION del Grammar Lab ha anche un canale laterale per -IVE.
    Invece di schiacciare il verbo in un oggetto pesante (sostantivo),
    il canale -IVE lo trasforma in uno strato sottile e colorato che si attacca sui nomi —
    come vernice ancora fresca (odore di solvente, superficie appiccicosa al tatto).
    Marco prende «create», rimuove la -e (la piccola lettera vola via come prima),
    poi applica -IVE: esce «creative» — leggero, si appiccica su «person»: «a creative person».
    La Gemella FULL lo guarda soddisfatta: -IVE descrive, non sostituisce.
    Il prof. lancia in aria «sensitive» e «sensible»:
    hanno colori diversi sotto la luce del laboratorio.
    Marco le tocca — sensitive è più morbida (emotiva), sensible è più dura e solida (razionale).
    Prima il verbo, poi togli la -e, poi applica -IVE. Irreversibile.

- slug: rule_adj_to_adv_ly
  tags: [word_formation, word_formation_i_block, rule_adj_to_adv_ly, part3_word_formation]
  title_en: "Word Formation — Adjective → Adverb: -ly"
  title_it: "Word Formation — Aggettivo → Avverbio: -ly"
  display_order: 53
  rule_en: |
    Add **-ly** to an adjective to form an adverb (describes HOW an action is done).

    Most adjectives: add -ly directly
    careful→carefully / slow→slowly / clear→clearly / complete→completely

    **Spelling rules:**
    - Ends in **-y**: change y→i + ly: happy→happily / easy→easily / heavy→heavily
    - Ends in **-le**: change -le → -ly: simple→simply / gentle→gently / possible→possibly
    - Ends in **-ic**: add **-ally**: basic→basically / dramatic→dramatically / automatic→automatically
    - Ends in **-l**: just add -ly: careful→carefully (keep the l)

    ⚠️ Irregular: good→**well** / fast→**fast** / hard→**hard** (NOT *hardly* = quasi mai!)
    ⚠️ «hardly» means «quasi mai» — NOT the adverb of «hard»
  rule_it: |
    Aggiungi **-ly** a un aggettivo per formare un avverbio (descrive COME si fa un'azione).

    La maggior parte degli aggettivi: aggiungi -ly direttamente
    careful→carefully / slow→slowly / clear→clearly / complete→completely

    **Regole di spelling:**
    - Finisce in **-y**: cambia y→i + ly: happy→happily / easy→easily / heavy→heavily
    - Finisce in **-le**: cambia -le → -ly: simple→simply / gentle→gently / possible→possibly
    - Finisce in **-ic**: aggiungi **-ally**: basic→basically / dramatic→dramatically
    - Finisce in **-l**: aggiungi solo -ly: careful→carefully (mantieni la l)

    ⚠️ Irregolari: good→**well** / fast→**fast** / hard→**hard** (NON *hardly* = quasi mai!)
    ⚠️ «hardly» significa «quasi mai» — NON l'avverbio di «hard»
  example_basic:
    en: "He spoke so quickly that I could hardly understand a word."
    it: "Parlava così velocemente che riuscivo a malapena a capire una parola."
  example_complex:
    en: "She dramatically underestimated how profoundly the restructuring would affect staff morale, particularly among the most recently recruited employees."
    it: "Ha drammaticamente sottovalutato quanto profondamente la ristrutturazione avrebbe influenzato il morale del personale, in particolare tra i dipendenti assunti più di recente."
  vocabulary:
    - word: dramatically
      pos: adverb
      ipa: /drəˈmætɪkli/
      meaning_it: drammaticamente, in modo drastico
    - word: underestimate
      pos: verb
      ipa: /ˌʌndərˈɛstɪmeɪt/
      meaning_it: sottovalutare
    - word: profoundly
      pos: adverb
      ipa: /prəˈfaʊndli/
      meaning_it: profondamente
    - word: restructuring
      pos: noun
      ipa: /ˌriːˈstrʌktʃərɪŋ/
      meaning_it: ristrutturazione
    - word: morale
      pos: noun
      ipa: /məˈrɑːl/
      meaning_it: morale (psicologico di un gruppo)
    - word: recruit
      pos: verb
      ipa: /rɪˈkruːt/
      meaning_it: assumere, reclutare
  story_it: |
    Il professor Verne ha un timbro speciale a forma di -LY (gomma rossa, odore di caucciù).
    Prende una farfalla colorata (è un aggettivo — «beautiful»),
    la poggia delicatamente sul tavolo (si sentono le ali morbide tra le dita)
    e STAMPA -LY sulla coda. La farfalla ora vola diversamente — non è più un aggettivo
    che descrive com'è una cosa, ora descrive COME vola: «beautifully».
    Ma prima delle farfalle difficili: quella che finisce in -Y
    (la gemella EASY). Il prof. gira la Y al contrario — diventa I —
    e poi applica -LY. Quella con la -LE finale (SIMPLE)?
    Le ultime due lettere si staccano con un strappo netto (si sente il suono carta),
    rimane «simp-», poi arriva -LY. Il Gigante prova «hardly» per «with effort»:
    il timbro esplode in una nuvola di fumo blu — «hardly» significa quasi MAI,
    non hard + ly. Prima la farfalla (aggettivo), poi il timbro, poi il volo (avverbio).


# ─────────────────────────────────────────
# BLOCCO 6 — WORD FORMATION II (giorni 23–26)
# Prefissi + spelling avanzato
# ─────────────────────────────────────────

- slug: rule_prefix_un_dis
  tags: [word_formation, word_formation_ii_block, rule_prefix_un, rule_prefix_dis, part3_word_formation]
  title_en: "Word Formation — Negative Prefixes: un- / dis-"
  title_it: "Word Formation — Prefissi negativi: un- / dis-"
  display_order: 60
  rule_en: |
    **un-** = not / reverse of (added to adjectives, past participles, some verbs)
    unhappy / uncertain / unexpected / unaware / unlock / undo / unpack / unfair

    **dis-** = not / opposite / reverse of (often with verbs, nouns, and some adjectives)
    disagree / disappear / dishonest / discomfort / disorder / dislike / disconnect / disturb

    How to choose:
    - **un-** is more common with adjectives and past participles
    - **dis-** is more common with verbs meaning "reverse the action"
    - Some words only take one: *undecided* (not *disdecided*), *disappear* (not *unappear*)

    ⚠️ There is no rule for every case — learn common pairs, not the formula.
  rule_it: |
    **un-** = non / contrario di (si aggiunge ad aggettivi, participi passati, alcuni verbi)
    unhappy / uncertain / unexpected / unaware / unlock / undo / unpack / unfair

    **dis-** = non / opposto / inversione di (spesso con verbi, sostantivi, alcuni aggettivi)
    disagree / disappear / dishonest / discomfort / disorder / dislike / disconnect / disturb

    Come scegliere:
    - **un-** è più comune con aggettivi e participi passati
    - **dis-** è più comune con verbi che significano "invertire l'azione"
    - Alcune parole accettano solo uno: *undecided* (non *disdecided*), *disappear* (non *unappear*)

    ⚠️ Non esiste una regola per ogni caso — impara le coppie comuni, non la formula.
  example_basic:
    en: "I completely disagree — the results were totally unexpected."
    it: "Non sono per niente d'accordo — i risultati erano del tutto inaspettati."
  example_complex:
    en: "The disorganised response to the crisis left many residents feeling deeply uncertain and increasingly disheartened about their prospects."
    it: "La risposta disorganizzata alla crisi ha lasciato molti residenti profondamente incerti e sempre più scoraggiati riguardo alle loro prospettive."
  vocabulary:
    - word: disorganised
      pos: adjective
      ipa: /dɪsˈɔːɡənaɪzd/
      meaning_it: disorganizzato
    - word: disheartened
      pos: adjective
      ipa: /dɪsˈhɑːtənd/
      meaning_it: scoraggiato, demoralizzato
    - word: prospects
      pos: noun (plural)
      ipa: /ˈprɒspɛkts/
      meaning_it: prospettive, possibilità future
    - word: resident
      pos: noun
      ipa: /ˈrɛzɪdənt/
      meaning_it: residente, abitante
  story_it: |
    Nel Grammar Lab ci sono due gemelle negativizzatrici: UN (capelli bianchi, fredda)
    e DIS (capelli neri, energica). Lavorano in modo diverso.
    UN prende aggettivi — li afferra per la testa, li capovolge (si sente il tonfo),
    e li ridipinge al contrario: «happy» diventa «unhappy» (stesso oggetto, colori invertiti).
    DIS invece prende VERBI e li spinge all'indietro — «appear» entra nella porta,
    DIS lo afferra per le spalle e lo spinge fuori al contrario: DISAPPEAR.
    Marco prova a chiedere a UN di fare «unappear» — UN scuote la testa con un sorriso gelido.
    DIS prova «disdecided» — DIS si arrabbia e lancia il verbo dal laboratorio.
    Prima impara a chi appartiene la parola, poi chiedi al prefisso giusto.
    Il Gigante chiede a entrambe insieme: le gemelle si scontrano, esplosione di confetti
    neri e bianchi (odore di carta bruciata) — e lui resta senza risposta.

- slug: rule_prefix_im_in_ir
  tags: [word_formation, word_formation_ii_block, rule_prefix_im, rule_prefix_in, part3_word_formation]
  title_en: "Word Formation — Negative Prefixes: im- / in- / ir- / il-"
  title_it: "Word Formation — Prefissi negativi: im- / in- / ir- / il-"
  display_order: 61
  rule_en: |
    These prefixes all mean **not** — but the form depends on the first letter of the base word.

    **in-** → the default negative prefix for adjectives
    incorrect / invisible / informal / incomplete / inefficient

    **im-** → before roots starting with **m** or **p**
    impossible / impatient / immature / impolite / imperfect / immoral

    **ir-** → before roots starting with **r**
    irresponsible / irregular / irrelevant / irreversible / irrational

    **il-** → before roots starting with **l**
    illegal / illogical / illegible / illiterate

    Memory trick: the prefix **assimilates** — it changes to match the first letter.
  rule_it: |
    Questi prefissi significano tutti **non** — ma la forma dipende dalla prima lettera della parola base.

    **in-** → prefisso negativo di default per gli aggettivi
    incorrect / invisible / informal / incomplete / inefficient

    **im-** → prima di radici che iniziano con **m** o **p**
    impossible / impatient / immature / impolite / imperfect / immoral

    **ir-** → prima di radici che iniziano con **r**
    irresponsible / irregular / irrelevant / irreversible / irrational

    **il-** → prima di radici che iniziano con **l**
    illegal / illogical / illegible / illiterate

    Trucco mnemonico: il prefisso si **assimila** — cambia forma per adattarsi alla prima lettera.
  example_basic:
    en: "It's completely irresponsible and highly irregular to submit an incomplete report."
    it: "È del tutto irresponsabile e molto irregolare presentare un rapporto incompleto."
  example_complex:
    en: "The committee deemed the proposal irrelevant and the proposed timeline entirely unrealistic, given the immature infrastructure currently in place."
    it: "Il comitato ha giudicato la proposta irrilevante e la tempistica proposta del tutto irrealistica, data l'infrastruttura ancora immatura attualmente in uso."
  vocabulary:
    - word: deem
      pos: verb
      ipa: /diːm/
      meaning_it: ritenere, considerare, giudicare
    - word: timeline
      pos: noun
      ipa: /ˈtaɪmlaɪn/
      meaning_it: tempistica, cronoprogramma
    - word: infrastructure
      pos: noun
      ipa: /ˈɪnfrəˌstrʌktʃə/
      meaning_it: infrastruttura
    - word: unrealistic
      pos: adjective
      ipa: /ˌʌnrɪəˈlɪstɪk/
      meaning_it: irrealistico, poco realistico
  story_it: |
    Il prefisso IN- è un camaleonte del Grammar Lab — entra nella parola
    e cambia colore in base alla prima lettera che incontra.
    Marco lo vede avvicinarsi a «possible» (inizia con P):
    il camaleonte tocca la P e diventa IM- istantaneamente — pelle che cambia
    colore in tempo reale (visivo, si sente il calore del cambiamento).
    Si avvicina a «responsible» (R): diventa IR- con una piccola vibrazione rossa.
    Si avvicina a «legal» (L): diventa IL- con un lampo giallo.
    Per tutte le altre lettere rimane IN- (freddo, blu, neutro).
    Il Gigante prova a forzare IN- davanti a «possible»: lo stomaco del camaleonte
    fa un suono borbottante (GLURP) e rigurgita la doppia lettera.
    Prima guarda la prima lettera della parola base, poi sai quale forma prende il prefisso.

- slug: rule_spelling_drop_e_double
  tags: [word_formation, word_formation_ii_block, rule_spelling_drop_e, rule_double_transformation, part3_word_formation]
  title_en: "Word Formation — Spelling Rules: drop -e & double consonant"
  title_it: "Word Formation — Spelling: eliminare -e & raddoppiare consonante"
  display_order: 62
  rule_en: |
    **Rule 1 — Drop the silent -e before a vowel suffix:**
    write→writing / make→making / hope→hoping / love→lovable / argue→argument
    (Keep the -e before consonant suffixes: hope→hopeful, care→careful, excite→excitement)

    **Rule 2 — Double the final consonant** (1-syllable verb, short vowel, ends in consonant):
    run→running / sit→sitting / stop→stopped / swim→swimming / plan→planned
    (Do NOT double if: 2+ syllables with stress NOT on last: listen→listening, offer→offered)
    (Do NOT double if: vowel before final consonant is long: read→reading, rain→raining)

    **Double transformation** (2-step formation — most difficult):
    happy (adj) → happiness (noun) → happily (adverb) — y→i at each step
    compete (v) → competition (noun) → competitive (adj) → competitively (adv)
  rule_it: |
    **Regola 1 — Elimina la -e muta prima di un suffisso vocalico:**
    write→writing / make→making / hope→hoping / love→lovable / argue→argument
    (Mantieni la -e prima di suffissi consonantici: hope→hopeful, care→careful)

    **Regola 2 — Raddoppia la consonante finale** (verbo 1 sillaba, vocale breve, finisce in consonante):
    run→running / sit→sitting / stop→stopped / swim→swimming / plan→planned
    (NON raddoppiare se: 2+ sillabe con stress NON sull'ultima: listen→listening, offer→offered)
    (NON raddoppiare se: la vocale prima della consonante finale è lunga: read→reading)

    **Doppia trasformazione** (formazione in 2 passi — la più difficile):
    happy (agg) → happiness (sost) → happily (avv) — y→i ad ogni passo
    compete (v) → competition (sost) → competitive (agg) → competitively (avv)
  example_basic:
    en: "She is running a highly competitive business while carefully managing a demanding workload."
    it: "Gestisce un'attività altamente competitiva mentre gestisce con cura un carico di lavoro impegnativo."
  example_complex:
    en: "The surprisingly imaginative and competitively priced proposal was submitted following an exhausting but ultimately rewarding process of refinement."
    it: "La proposta sorprendentemente fantasiosa e dal prezzo competitivo fu presentata dopo un processo di perfezionamento estenuante ma alla fine gratificante."
  vocabulary:
    - word: exhausting
      pos: adjective
      ipa: /ɪɡˈzɔːstɪŋ/
      meaning_it: estenuante, sfiancante
    - word: ultimately
      pos: adverb
      ipa: /ˈʌltɪmɪtli/
      meaning_it: alla fine, in definitiva
    - word: rewarding
      pos: adjective
      ipa: /rɪˈwɔːdɪŋ/
      meaning_it: gratificante, soddisfacente
    - word: refinement
      pos: noun
      ipa: /rɪˈfaɪnmənt/
      meaning_it: perfezionamento, raffinamento
    - word: submission
      pos: noun
      ipa: /səbˈmɪʃən/
      meaning_it: presentazione, consegna (di un documento)
  story_it: |
    Il professor Verne ha due strumenti chirurgici sul bancone.
    Il BISTURI DEL DROP-E: quando un suffisso vocalico si avvicina (come -ING),
    il bisturi ritaglia via la -e finale del verbo — un taglio netto, quasi indolore
    (si sente solo un piccolo clic). Write → writ + ing. Pulito.
    Il MARTELLO DEL DOUBLE: quando un verbo corto (run, sit, stop) deve prendere -ING o -ED,
    il martello batte sulla consonante finale — BANG — e appare una copia identica accanto
    (si sente il colpo sul bancone, odore di legno). Run → runn + ing.
    La doppia trasformazione è la più complessa: il professor Verne usa ENTRAMBI gli strumenti
    in sequenza su «compete». Prima il bisturi (compete→compet-), poi il -ition,
    poi di nuovo un altro strumento per -ive. Come un'operazione chirurgica in più fasi —
    ogni passo dipende dal precedente. Non puoi saltare un passo.


# ─────────────────────────────────────────
# BLOCCO 7 — PRESENT PERFECT (giorni 27–29)
# ─────────────────────────────────────────

- slug: present_perfect_for_since
  tags: [present_perfect, present_perfect_block, pp_for_since, part4_transformation]
  title_en: "Present Perfect — for & since (Duration)"
  title_it: "Present Perfect — for & since (Durata)"
  display_order: 70
  rule_en: |
    Use **Present Perfect + for/since** for actions/states that **started in the past
    and are still true now**.

    **for** + period of time (how long?): for three years / for ages / for a long time
    **since** + point in time (since when?): since 2018 / since Monday / since I was a child

    Form: subject + **have/has** + past participle

    ⚠️ Italian trap: In Italian you often use «da + presente» (abito qui da tre anni).
    In English you MUST use Present Perfect, NOT Present Simple: «I have lived here for three years.»
    NOT «*I live here for three years.*»
  rule_it: |
    Usa il **Present Perfect + for/since** per azioni/stati che **sono iniziati nel passato
    e sono ancora veri adesso**.

    **for** + periodo di tempo (per quanto?): for three years / for ages / for a long time
    **since** + punto nel tempo (da quando?): since 2018 / since Monday / since I was a child

    Forma: soggetto + **have/has** + participio passato

    ⚠️ Trappola italiana: In italiano si usa «da + presente» (abito qui da tre anni).
    In inglese DEVI usare il Present Perfect, NON il Present Simple: «I have lived here for three years.»
    NON «*I live here for three years.*»
  example_basic:
    en: "She has worked at the same company since 2015 — that's over ten years."
    it: "Lavora nella stessa azienda dal 2015 — sono più di dieci anni."
  example_complex:
    en: "The charity has been providing emergency shelter for displaced families for nearly two decades, since its foundation following the regional conflict."
    it: "L'ente di beneficenza fornisce rifugio d'emergenza alle famiglie sfollate da quasi due decenni, dalla sua fondazione dopo il conflitto regionale."
  vocabulary:
    - word: shelter
      pos: noun
      ipa: /ˈʃɛltə/
      meaning_it: rifugio, riparo
    - word: displaced
      pos: adjective
      ipa: /dɪsˈpleɪst/
      meaning_it: sfollato, spostato
    - word: decade
      pos: noun
      ipa: /ˈdɛkeɪd/
      meaning_it: decennio
    - word: foundation
      pos: noun
      ipa: /faʊnˈdeɪʃən/
      meaning_it: fondazione, istituzione; le fondamenta
    - word: conflict
      pos: noun
      ipa: /ˈkɒnflɪkt/
      meaning_it: conflitto
  story_it: |
    Nel Grammar Lab c'è un lungo filo teso dal passato fino al presente.
    FOR è un righello che misura la LUNGHEZZA del filo — quanto è lungo il periodo.
    SINCE è un dito che indica il PUNTO dove il filo è stato attaccato al muro.
    Marco prende il filo, lo allunga da «2015» fino ad ADESSO:
    il filo è ancora teso (ancora vero), ancora vibra leggermente (tatto: vibrazione),
    ancora conduce corrente. «She has worked» — il Present Perfect è la corrente nel filo.
    Se Marco smette di tenere il filo (l'azione è finita), il filo cade —
    e allora serve il Past Simple, non più il Present Perfect.
    Il Gigante traduce dall'italiano: «I live here since three years» —
    il filo si spezza di netto con uno SNAP secco (silenzio improvviso).
    Il prof. lo riattacca con «have lived» e la corrente riprende a scorrere.

- slug: present_perfect_yet_already_just
  tags: [present_perfect, present_perfect_block, pp_yet_already, part4_transformation]
  title_en: "Present Perfect — yet, already, just"
  title_it: "Present Perfect — yet, already, just"
  display_order: 71
  rule_en: |
    **already** = before the expected time (sooner than expected) — affirmative
    Position: between have/has and past participle, or at the end.
    → *She has already finished.* / *I've already seen that film.*

    **yet** = up to now (expectation unfulfilled) — questions & negatives
    Position: always at the end of the sentence.
    → *Have you eaten yet?* / *I haven't called her yet.*

    **just** = a very short time ago — affirmative
    Position: between have/has and past participle.
    → *He has just arrived.* / *I've just heard the news.*

    ⚠️ «Ho appena» = I have just (NOT «I just have»)
  rule_it: |
    **already** = prima del momento atteso (prima del previsto) — affermativo
    Posizione: tra have/has e participio passato, oppure in fondo.
    → *She has already finished.* / *I've already seen that film.*

    **yet** = fino ad ora (aspettativa non soddisfatta) — domande e negativi
    Posizione: sempre alla fine della frase.
    → *Have you eaten yet?* / *I haven't called her yet.*

    **just** = pochissimo tempo fa — affermativo
    Posizione: tra have/has e participio passato.
    → *He has just arrived.* / *I've just heard the news.*

    ⚠️ «Ho appena» = I have just (NON «I just have»)
  example_basic:
    en: "— Has the director arrived yet? — Yes, she has just arrived and has already started the meeting."
    it: "— Il direttore è già arrivato? — Sì, è appena arrivato e ha già iniziato la riunione."
  example_complex:
    en: "Although the funding has already been allocated, the committee hasn't yet approved the revised budget, so the project hasn't officially commenced."
    it: "Sebbene i finanziamenti siano già stati stanziati, il comitato non ha ancora approvato il bilancio rivisto, quindi il progetto non è iniziato ufficialmente."
  vocabulary:
    - word: allocate
      pos: verb
      ipa: /ˈæləkeɪt/
      meaning_it: stanziare, assegnare, allocare
    - word: revised
      pos: adjective
      ipa: /rɪˈvaɪzd/
      meaning_it: rivisto, aggiornato
    - word: commence
      pos: verb
      ipa: /kəˈmɛns/
      meaning_it: iniziare, cominciare (formale)
    - word: officially
      pos: adverb
      ipa: /əˈfɪʃəli/
      meaning_it: ufficialmente
  story_it: |
    Tre elfi lavorano nel magazzino del Grammar Lab.
    ALREADY è un elfo in anticipo — porta i pacchi PRIMA che tu li aspetti,
    li mette già sul bancone (odore di pacchetto appena aperto, profumo di cartone).
    JUST è il più veloce — arriva di corsa, il pacco è ancora caldo in mano
    (tatto: superficie tiepida), il fiato affannato (si sente l'ansimo).
    YET è l'elfo delle domande e dei ritardi — guarda l'orologio con l'aria
    di chi aspetta ancora qualcosa, le mani vuote (paradossale: l'unico dei tre
    che non porta niente di fisico). «È arrivato YET?» = no, non ancora.
    ALREADY e JUST vanno sempre tra have e il participio (tra due cose),
    YET va sempre alla fine — è come se aspettasse in coda.
    Il Gigante mette YET tra have e arrived: l'elfo YET inciampa,
    il pacco si rompe — CRASH — e rotola fino alla fine della frase da solo.

- slug: present_perfect_never_ever
  tags: [present_perfect, present_perfect_block, pp_never_ever, part4_transformation]
  title_en: "Present Perfect — never, ever & PP vs Past Simple"
  title_it: "Present Perfect — never, ever & PP vs Past Simple"
  display_order: 72
  rule_en: |
    **ever** = at any time in your life — questions only
    → *Have you ever been to Japan?*

    **never** = at no time in your life — negative meaning without «not»
    → *I have never tried sushi.* (no «not» needed — never is already negative)

    **Present Perfect vs Past Simple — the key rule:**
    - **Present Perfect**: unspecified time, life experience, result matters NOW
      → *I've lost my keys.* (I can't find them now — the present matters)
    - **Past Simple**: specific time mentioned or implied
      → *I lost my keys yesterday.* (yesterday = finished past)

    ⚠️ The moment you say WHEN → use Past Simple.
  rule_it: |
    **ever** = in qualsiasi momento della propria vita — solo domande
    → *Have you ever been to Japan?*

    **never** = in nessun momento della propria vita — significato negativo senza «not»
    → *I have never tried sushi.* (non serve «not» — never è già negativo)

    **Present Perfect vs Past Simple — la regola chiave:**
    - **Present Perfect**: tempo non specificato, esperienza di vita, il risultato conta ORA
      → *I've lost my keys.* (non riesco a trovarle adesso — conta il presente)
    - **Past Simple**: tempo specifico menzionato o implicito
      → *I lost my keys yesterday.* (yesterday = passato concluso)

    ⚠️ Nel momento in cui dici QUANDO → usa il Past Simple.
  example_basic:
    en: "Have you ever worked abroad? — No, I've never had the opportunity, but I applied for a position in Vienna last year."
    it: "Hai mai lavorato all'estero? — No, non ne ho mai avuto l'opportunità, ma l'anno scorso ho fatto domanda per una posizione a Vienna."
  example_complex:
    en: "I have never encountered such a well-structured argument, though I must admit that when I first read the paper last month, I found several claims deeply unconvincing."
    it: "Non ho mai incontrato un argomento così ben strutturato, anche se devo ammettere che quando ho letto il saggio per la prima volta il mese scorso, ho trovato diverse affermazioni profondamente poco convincenti."
  vocabulary:
    - word: encounter
      pos: verb
      ipa: /ɪnˈkaʊntə/
      meaning_it: incontrare, imbattersi in
    - word: well-structured
      pos: adjective
      ipa: /ˌwɛl ˈstrʌktʃəd/
      meaning_it: ben strutturato
    - word: claim
      pos: noun
      ipa: /kleɪm/
      meaning_it: affermazione, tesi, rivendicazione
    - word: unconvincing
      pos: adjective
      ipa: /ˌʌnkənˈvɪnsɪŋ/
      meaning_it: poco convincente
  story_it: |
    EVER è una torcia che illumina tutta la linea della vita di Marco —
    dall'infanzia ad oggi. «Have you EVER?» = accendi la torcia, guarda TUTTA la linea.
    NEVER è la stessa torcia, ma Marco la punta verso tutta la linea e dice:
    «Non c'è niente qui» — nessuna esperienza, buio totale in quel punto.
    La differenza con il Past Simple è una porta: quando dici «yesterday» o «in 2019»,
    apri una porta specifica nel passato ed entri in quella stanza (Past Simple —
    porta con la data incisa, si sente il cigolìo). Con il Present Perfect
    la porta non ha data — è aperta sul corridoio intero.
    Il Gigante dice «I have lost my keys yesterday» —
    la torcia e la porta cercano di funzionare insieme e si scontrano,
    scintille (visivo), odore di cavi bruciati. Regola: appena dici quando,
    chiudi la torcia e usa la porta con la data.


# ─────────────────────────────────────────
# BLOCCO 8 — PASSIVE VOICE (giorni 30–33)
# ─────────────────────────────────────────

- slug: passive_simple_perfect
  tags: [passive, passive_block, passive_simple, part4_transformation]
  title_en: "Passive Voice — Present & Past Simple/Perfect"
  title_it: "Forma Passiva — Present & Past Simple/Perfect"
  display_order: 80
  rule_en: |
    Form: **object + be (correct tense) + past participle** (+ by agent, optional)

    | Tense | Active | Passive |
    |---|---|---|
    | Present Simple | They build houses. | Houses **are built**. |
    | Past Simple | They built the bridge. | The bridge **was built**. |
    | Present Perfect | They have finished the report. | The report **has been finished**. |
    | Past Perfect | They had stolen the car. | The car **had been stolen**. |
    | Future (will) | They will announce the results. | The results **will be announced**. |
    | Modal | They should review the plan. | The plan **should be reviewed**. |

    Use passive when: the action is more important than who does it; the agent is unknown/obvious/irrelevant.
    ⚠️ Italian overuses the passive with «si» (si dice = it is said) — English prefers passive or active.
  rule_it: |
    Forma: **oggetto + be (tempo corretto) + participio passato** (+ by agente, opzionale)

    | Tempo | Attiva | Passiva |
    |---|---|---|
    | Present Simple | They build houses. | Houses **are built**. |
    | Past Simple | They built the bridge. | The bridge **was built**. |
    | Present Perfect | They have finished the report. | The report **has been finished**. |
    | Past Perfect | They had stolen the car. | The car **had been stolen**. |
    | Future (will) | They will announce the results. | The results **will be announced**. |
    | Modale | They should review the plan. | The plan **should be reviewed**. |

    Usa il passivo quando: l'azione è più importante di chi la fa; l'agente è sconosciuto/ovvio/irrilevante.
    ⚠️ L'italiano abusa del «si» passivante (si dice) — l'inglese preferisce passivo o attivo.
  example_basic:
    en: "The new hospital was built in 2019 and has been expanded twice since then."
    it: "Il nuovo ospedale è stato costruito nel 2019 ed è stato ampliato due volte da allora."
  example_complex:
    en: "The confidential report had been leaked to the press before the official statement was issued, causing considerable damage to the organisation's reputation."
    it: "Il rapporto riservato era stato fatto trapelare alla stampa prima che venisse emessa la dichiarazione ufficiale, causando danni considerevoli alla reputazione dell'organizzazione."
  vocabulary:
    - word: leak
      pos: verb
      ipa: /liːk/
      meaning_it: far trapelare (informazioni)
    - word: issue (a statement)
      pos: verb
      ipa: /ˈɪʃuː/
      meaning_it: emettere, pubblicare, rilasciare
    - word: expand
      pos: verb
      ipa: /ɪkˈspænd/
      meaning_it: ampliare, espandere
    - word: official
      pos: adjective
      ipa: /əˈfɪʃəl/
      meaning_it: ufficiale
  story_it: |
    Nel Grammar Lab c'è una giostra che ruota gli attori di una frase.
    In attivo, il SOGGETTO è davanti (Marco costruisce la casa).
    Il professor Verne gira la giostra: la CASA viene in primo piano,
    Marco scivolona dietro (si sente la rotazione, il vento del movimento).
    Sul fondo della giostra c'è una barra metallica chiamata BE —
    devi regolarla nel tempo giusto (si gira un pomello: presente, passato, perfetto).
    Poi attacchi il participio passato alla barra. CLONK — la struttura si blocca.
    Se l'agente (Marco) è ovvio o irrilevante, sparisce dietro la tenda.
    Il Gigante prova a girare la giostra senza regolare la barra BE:
    la frase esce storta, le parole cadono a terra — PATATRAC.
    Prima regola BE nel tempo giusto, poi attacca il participio. Irreversibile.

- slug: causative_have_get
  tags: [passive, passive_block, causative_have, causative_get, part4_transformation]
  title_en: "Causative — have/get something done"
  title_it: "Causativo — have/get something done"
  display_order: 81
  rule_en: |
    Use the **causative** when you arrange for someone else to do something for you
    (you don't do it yourself — you cause it to happen).

    **have + object + past participle**
    → *I had my hair cut.* (a hairdresser cut it, not me)
    → *She had her car repaired.* (a mechanic repaired it)

    **get + object + past participle** (slightly more informal)
    → *I got my laptop fixed.* / *He got his suit dry-cleaned.*

    The structure can be used in any tense — just change have/get:
    → *I'm having the house painted next week.*
    → *She had her phone stolen.* (passive experience — bad thing happened TO her)
  rule_it: |
    Usa il **causativo** quando fai fare qualcosa a qualcun altro per te
    (non lo fai tu — lo FAI fare).

    **have + oggetto + participio passato**
    → *I had my hair cut.* (il parrucchiere l'ha tagliato, non io)
    → *She had her car repaired.* (il meccanico l'ha riparata)

    **get + oggetto + participio passato** (leggermente più informale)
    → *I got my laptop fixed.* / *He got his suit dry-cleaned.*

    La struttura funziona con tutti i tempi — basta cambiare have/get:
    → *I'm having the house painted next week.*
    → *She had her phone stolen.* (esperienza passiva — qualcosa di brutto è successo a lei)
  example_basic:
    en: "I need to have my passport renewed before the trip."
    it: "Devo far rinnovare il mio passaporto prima del viaggio."
  example_complex:
    en: "Following the flood damage, the residents are having the entire ground floor renovated at the landlord's expense, while simultaneously getting the electrical system upgraded."
    it: "Dopo i danni dell'alluvione, i residenti stanno facendo ristrutturare l'intero piano terra a spese del proprietario, mentre contestualmente fanno aggiornare l'impianto elettrico."
  vocabulary:
    - word: flood damage
      pos: noun phrase
      ipa: /flʌd ˈdæmɪdʒ/
      meaning_it: danni da alluvione
    - word: ground floor
      pos: noun
      ipa: /ˈɡraʊnd flɔː/
      meaning_it: piano terra
    - word: renovate
      pos: verb
      ipa: /ˈrɛnəveɪt/
      meaning_it: ristrutturare, rinnovare
    - word: simultaneously
      pos: adverb
      ipa: /ˌsɪməlˈteɪniəsli/
      meaning_it: simultaneamente, contemporaneamente
    - word: upgrade
      pos: verb
      ipa: /ˈʌpɡreɪd/
      meaning_it: aggiornare, potenziare
    - word: at one's expense
      pos: phrase
      ipa: /ɪkˈspɛns/
      meaning_it: a spese di qualcuno
  story_it: |
    Il professor Verne non si taglia mai i capelli da solo — li fa tagliare.
    Il professor Verne HAVE capelli → TAGLINO (il parrucchiere).
    Nel Grammar Lab c'è un assistente (Il Gigante, naturalmente).
    Il prof. indica i capelli, poi indica le forbici in mano al Gigante:
    «Have — oggetto — fatto da lui.»
    Prima il prof. punta il dito (HAD), poi l'oggetto (capelli) arriva davanti al Gigante,
    poi il Gigante tira fuori le forbici (past participle). Tre gesti, in ordine.
    Se il Gigante tira fuori le forbici PRIMA che il prof. indichi cosa tagliare:
    taglia per sbaglio il cappello di Marco — SNIP — e tutti ridono (paradossale).
    Ordine obbligatorio: HAVE/GET → oggetto → participio.

- slug: passive_reporting
  tags: [passive, passive_block, passive_reporting_said, part4_transformation]
  title_en: "Passive Reporting — it is said/believed/reported that…"
  title_it: "Passivo di Reporting — it is said/believed/reported that…"
  display_order: 82
  rule_en: |
    Used in formal writing/journalism to report without citing a specific source.

    **Structure 1** — it + passive reporting verb + that + clause:
    → *It is believed that the cost will rise.*
    → *It has been reported that several staff members resigned.*

    **Structure 2** — subject + passive reporting verb + to infinitive:
    → *The cost is believed to rise.*
    → *Several staff members are reported to have resigned.*

    Common reporting verbs: say / believe / report / claim / consider / expect / know / think / allege

    ⚠️ «It is said that» → «Si dice che» (NOT «È detto che» which is unnatural in English)
  rule_it: |
    Usato nella scrittura formale/giornalistica per riportare senza citare una fonte specifica.

    **Struttura 1** — it + verbo di reporting al passivo + that + frase:
    → *It is believed that the cost will rise.*
    → *It has been reported that several staff members resigned.*

    **Struttura 2** — soggetto + verbo di reporting al passivo + to infinitive:
    → *The cost is believed to rise.*
    → *Several staff members are reported to have resigned.*

    Verbi di reporting comuni: say / believe / report / claim / consider / expect / know / think / allege

    ⚠️ «It is said that» → «Si dice che» (NON «È detto che» che è innaturale in inglese)
  example_basic:
    en: "It is widely believed that the new policy will significantly reduce waiting times."
    it: "Si crede ampiamente che la nuova politica ridurrà significativamente i tempi di attesa."
  example_complex:
    en: "The former executive is alleged to have misappropriated substantial funds, and it has been claimed that several board members were fully aware of the irregularities."
    it: "Al ex dirigente viene attribuita l'appropriazione indebita di fondi sostanziali, e si afferma che diversi membri del consiglio fossero pienamente consapevoli delle irregolarità."
  vocabulary:
    - word: allege
      pos: verb
      ipa: /əˈlɛdʒ/
      meaning_it: asserire, sostenere, attribuire (senza prove certe)
    - word: misappropriate
      pos: verb
      ipa: /ˌmɪsəˈprəʊprieɪt/
      meaning_it: appropriarsi indebitamente di, sottrarre
    - word: substantial
      pos: adjective
      ipa: /səbˈstænʃəl/
      meaning_it: sostanziale, considerevole
    - word: irregularity
      pos: noun
      ipa: /ɪˌrɛɡjʊˈlærɪti/
      meaning_it: irregolarità
    - word: executive
      pos: noun
      ipa: /ɪɡˈzɛkjʊtɪv/
      meaning_it: dirigente, alto funzionario
  story_it: |
    Nel Grammar Lab c'è un giornalista senza faccia — nessuno sa chi è (la fonte è anonima).
    Scrive articoli con la struttura: IT IS SAID THAT…
    La frase appare sul muro del lab in lettere fumose — nessuno sa chi le ha scritte.
    Marco può anche girare la struttura: «The cost is believed to rise» —
    ora il soggetto è davanti, ma l'autore rimane senza faccia.
    Il professor Verne annusa l'inchiostro fumoso (odore di giornale bagnato):
    «Formale. Distante. Nessun dito puntato.»
    Il Gigante prova a mettere un nome sull'articolo: il giornalista senza faccia sparisce
    (si sente uno SBUFFO di vento, odore di carta bruciata) e la struttura si rompe.
    La regola è che l'autore rimane invisibile — prima la notizia, poi il verbo passivo,
    poi il contenuto. Non puoi avere un autore nominato.


# ─────────────────────────────────────────
# BLOCCO 9 — MODAL VERBS (giorni 34–36)
# ─────────────────────────────────────────

- slug: modals_obligation_deduction
  tags: [modals, modals_block, modal_must, modal_have_to, part4_transformation]
  title_en: "Modal Verbs — must / have to / should / ought to"
  title_it: "Verbi Modali — must / have to / should / ought to"
  display_order: 90
  rule_en: |
    **must** → strong obligation (speaker's own judgement) OR logical deduction
    → *You must wear a seatbelt.* (I'm telling you — personal obligation)
    → *She must be tired.* (I deduce this from evidence — NOT «she has to be»)

    **have to** → external obligation (rule, law, someone else's requirement)
    → *I have to submit the report by Friday.* (the boss said so)
    → *Do you have to work on Sundays?* (is it a rule?)

    **should / ought to** → advice, recommendation, moral obligation (weaker than must)
    → *You should see a doctor.* / *You ought to apologise.*
    ⚠️ «mustn't» = absolute prohibition (do NOT do it) — very different from «don't have to» (not necessary)
  rule_it: |
    **must** → obbligo forte (giudizio del parlante) OPPURE deduzione logica
    → *You must wear a seatbelt.* (te lo dico io — obbligo personale)
    → *She must be tired.* (lo deduco dalle prove — NON «she has to be»)

    **have to** → obbligo esterno (regola, legge, requisito di qualcun altro)
    → *I have to submit the report by Friday.* (il capo lo ha detto)
    → *Do you have to work on Sundays?* (è una regola?)

    **should / ought to** → consiglio, raccomandazione, obbligo morale (meno forte di must)
    → *You should see a doctor.* / *You ought to apologise.*
    ⚠️ «mustn't» = divieto assoluto (NON farlo) — diversissimo da «don't have to» (non necessario)
  example_basic:
    en: "You mustn't park here — it's a no-parking zone. You don't have to pay, but you must display your permit."
    it: "Non puoi parcheggiare qui — è una zona vietata. Non è necessario pagare, ma devi esporre il permesso."
  example_complex:
    en: "Given the candidate's impeccable track record, she must be the strongest applicant — the committee should have made the decision weeks ago."
    it: "Dato il curriculum impeccabile della candidata, deve essere la candidata più forte — il comitato avrebbe dovuto prendere la decisione settimane fa."
  vocabulary:
    - word: impeccable
      pos: adjective
      ipa: /ɪmˈpɛkəbəl/
      meaning_it: impeccabile, irreprensibile
    - word: track record
      pos: noun phrase
      ipa: /træk ˈrɛkɔːd/
      meaning_it: curriculum, storico di risultati
    - word: applicant
      pos: noun
      ipa: /ˈæplɪkənt/
      meaning_it: candidato, richiedente
    - word: display
      pos: verb
      ipa: /dɪˈspleɪ/
      meaning_it: esporre, mostrare, visualizzare
    - word: permit
      pos: noun
      ipa: /ˈpɜːmɪt/
      meaning_it: permesso, autorizzazione
  story_it: |
    Il professor Verne ha due cappelli nel laboratorio.
    Il cappello MUST (rosso, pesante, con fiamme dipinte) lo indossa lui stesso:
    «È la mia decisione personale — lo dico io.» Lo tira fuori per deduzioni
    («she MUST be tired» — lo vedo dalle sue occhiaie, decido io che è stanco).
    Il cappello HAVE TO (grigio, burocratico, con timbri) viene dall'esterno —
    Marco lo trova già sul tavolo con un bigliettino firmato dal capo,
    dal governo, dalla regola (freddo, cartoncino rigido al tatto).
    MUSTN'T è una catena rossa sul pavimento — non si passa.
    DON'T HAVE TO è una porta aperta — puoi passarci, ma non sei obbligato.
    Il Gigante indossa il cappello MUST grigio: il cappello rosso vola fuori
    dalla testa di Marco con uno WHOMP (vento improvviso) e li scambia.
    Prima capisci CHI impone l'obbligo (tu o una regola esterna), poi scegli il cappello.

- slug: modal_perfects
  tags: [modals, modals_block, modal_should_have, modal_must_have, modal_cant_have, part4_transformation]
  title_en: "Modal Perfects — should/must/can't have + past participle"
  title_it: "Modal Perfects — should/must/can't have + participio passato"
  display_order: 91
  rule_en: |
    Modal perfects refer to **past situations** — deduction or criticism about what happened.

    **must have + pp** → almost certain deduction (positive)
    → *She must have missed the train.* (I'm almost sure she did)

    **can't have + pp** → almost certain deduction (negative/impossible)
    → *He can't have finished already — it was a 2-hour task.* (impossible)

    **should have + pp** → past criticism or regret (you were expected to but didn't)
    → *You should have called me.* (you didn't, and that was wrong)

    **could have + pp** → past possibility that didn't happen
    → *She could have won, but she made too many errors.*

    ⚠️ «could have» ≠ «should have» — possibility vs obligation/regret
  rule_it: |
    I modal perfects si riferiscono a **situazioni passate** — deduzione o critica su ciò che è accaduto.

    **must have + pp** → deduzione quasi certa (positiva)
    → *She must have missed the train.* (sono quasi sicuro che sia successo)

    **can't have + pp** → deduzione quasi certa (negativa/impossibile)
    → *He can't have finished already — it was a 2-hour task.* (impossibile)

    **should have + pp** → critica o rimpianto passato (avresti dovuto ma non l'hai fatto)
    → *You should have called me.* (non l'hai fatto, ed era sbagliato)

    **could have + pp** → possibilità passata non realizzata
    → *She could have won, but she made too many errors.*

    ⚠️ «could have» ≠ «should have» — possibilità vs obbligo/rimpianto
  example_basic:
    en: "You should have left earlier — you must have known the traffic would be terrible on a Friday."
    it: "Avresti dovuto partire prima — dovevi sapere che il traffico sarebbe stato terribile di venerdì."
  example_complex:
    en: "The auditors can't have overlooked such a significant discrepancy; they must have deliberately chosen to omit it from the final report, which means they should have declared a conflict of interest."
    it: "I revisori non possono aver ignorato una discrepanza così significativa; devono aver deliberatamente scelto di ometterla dal rapporto finale, il che significa che avrebbero dovuto dichiarare un conflitto di interessi."
  vocabulary:
    - word: auditor
      pos: noun
      ipa: /ˈɔːdɪtə/
      meaning_it: revisore dei conti, revisore
    - word: overlook
      pos: verb
      ipa: /ˌəʊvəˈlʊk/
      meaning_it: trascurare, ignorare, non notare
    - word: discrepancy
      pos: noun
      ipa: /dɪˈskrɛpənsi/
      meaning_it: discrepanza, incongruenza
    - word: omit
      pos: verb
      ipa: /əˈmɪt/
      meaning_it: omettere, tralasciare
    - word: conflict of interest
      pos: noun phrase
      ipa: /ˈkɒnflɪkt əv ˈɪntrɪst/
      meaning_it: conflitto di interessi
  story_it: |
    Il professor Verne usa un telescopio per guardare nel PASSATO
    (al contrario: il futuro è davanti, il passato è dietro — il telescopio guarda all'indietro).
    Vede una scena: il Gigante è scomparso.
    MUST HAVE: «È quasi certo che sia caduto nel calderone —
    le impronte portano lì.» Il telescopio mostra le impronte (visivo).
    CAN'T HAVE: «Impossibile che abbia già finito il lavoro —
    era un lavoro da due ore e sono passati cinque minuti.»
    Il telescopio mostra il calendario (impossibilità logica, visivo + freddo logico).
    SHOULD HAVE: il professor Verne sospira, odore di rimpianto (come bruciato),
    scuote la testa: «Avresti dovuto avvisarmi. Non l'hai fatto. Sbagliato.»
    Prima guardi nel telescopio (capisci la situazione passata),
    poi scegli il modale giusto in base al livello di certezza.
    Non puoi usare il telescopio senza prima guardare le prove.


