<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrainEnglish — Practice Tests</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Info strip ── */
    .exam-strip {
      border-left: 2px solid var(--accent);
      padding: 10px 14px;
      margin-bottom: 24px;
      background: var(--surface2);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .exam-strip-title {
      font-size: 13px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .exam-strip-meta {
      font-size: 12px; color: var(--subtext); line-height: 1.6;
    }
    .exam-strip-meta strong { color: var(--text2); font-weight: 600; }

    /* ── Test cards ── */
    .tests-grid { display: flex; flex-direction: column; gap: 8px; }

    .test-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s;
    }
    .test-card:hover:not(.locked) { border-color: var(--border2); }
    [data-theme="dark"] .test-card:hover:not(.locked) { border-color: var(--subtext); }
    .test-card.locked { opacity: 0.4; pointer-events: none; }
    .test-card.completed { border-color: var(--success-border); }
    .test-card.in-progress { border-color: rgba(217,119,6,0.4); }

    /* Number badge */
    .test-num {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--font-mono);
      font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .test-card:not(.locked):hover .test-num {
      background: var(--accent-light);
      color: var(--accent);
      border-color: transparent;
    }
    .test-card.completed .test-num {
      background: var(--success-bg);
      color: var(--success);
      border-color: var(--success-border);
    }
    .test-card.locked .test-num { color: var(--muted); }

    /* Card body */
    .test-body { flex: 1; min-width: 0; }
    .test-title {
      font-size: 14px; font-weight: 600;
      color: var(--text); letter-spacing: -0.1px;
    }
    .test-meta  {
      font-size: 11px; color: var(--subtext);
      margin-top: 3px; display: flex; align-items: center; gap: 8px;
    }

    /* Status badge */
    .test-status {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 20px;
      border: 1px solid transparent;
    }
    .status-available { color: var(--accent); background: var(--accent-light); border-color: rgba(180,83,9,0.15); }
    .status-completed { color: var(--success); background: var(--success-bg); border-color: var(--success-border); }
    .status-progress  { color: var(--warning); background: rgba(217,119,6,0.08); border-color: rgba(217,119,6,0.2); }
    .status-locked    { color: var(--subtext); background: var(--surface2); border-color: var(--border); }

    /* Score */
    .test-score {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 600; margin-top: 3px;
    }
    .score-good { color: var(--success); }
    .score-mid  { color: var(--warning); }
    .score-bad  { color: var(--error); }

    /* Arrow */
    .test-arrow {
      font-size: 16px; color: var(--muted); flex-shrink: 0;
    }

    /* Topbar badge */
    .topbar .badge {
      font-family: var(--font-mono);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <span class="topbar-title">Practice Tests</span>
    <span id="completedCount" class="badge badge-neutral">0 / 10</span>
  </header>

  <main class="page-content">

    <div class="exam-strip">
      <div class="exam-strip-title">B2 First — Reading &amp; Use of English</div>
      <div class="exam-strip-meta">
        <strong>52 questions</strong> &middot; 7 parts &middot; 75 min &middot;
        Complete each test to unlock the next.
        You can pause and resume at any time.
      </div>
    </div>

    <div class="section-title">Tutti i test</div>
    <div class="tests-grid" id="testsGrid"></div>

  </main>

  <nav class="bottom-nav" aria-label="Navigazione principale">
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Home</span>
    </a>
    <a href="session.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M10 8.5l5 3.5-5 3.5V8.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Sessione</span>
    </a>
    <a href="test.html" class="nav-item active">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h8M8 12h5M8 16h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Test</span>
    </a>
    <a href="library.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>Libreria</span>
    </a>
    <a href="stats.html" class="nav-item">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Stats</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script src="js/tests-data.js"></script>
  <script>
  (function () {
    if (!Auth.requireAuth()) return;

    var completed = JSON.parse(localStorage.getItem('te_completed_tests') || '[]');
    document.getElementById('completedCount').textContent = completed.length + ' / 10';

    var grid = document.getElementById('testsGrid');

    DIAGNOSTIC_TESTS.forEach(function (test) {
      var tid     = test.id;
      var isLocked = tid > 1 && !completed.includes(tid - 1);
      var isDone   = completed.includes(tid);
      var session  = JSON.parse(localStorage.getItem('te_test_session_' + tid) || 'null');
      var inProg   = session && !session.submittedAt && session.partIdx > 0;
      var results  = JSON.parse(localStorage.getItem('te_test_results_' + tid) || 'null');

      var statusHtml, cardCls;
      if (isLocked) {
        statusHtml = '<span class="test-status status-locked">Locked</span>';
        cardCls    = 'locked';
      } else if (isDone) {
        statusHtml = '<span class="test-status status-completed">Completed</span>';
        cardCls    = 'completed';
      } else if (inProg) {
        statusHtml = '<span class="test-status status-progress">In progress</span>';
        cardCls    = 'in-progress';
      } else {
        statusHtml = '<span class="test-status status-available">Available</span>';
        cardCls    = '';
      }

      var scoreHtml = '';
      if (results) {
        var pct = Math.round(results.totalCorrect / results.totalQ * 100);
        var cls = pct >= 75 ? 'score-good' : pct >= 50 ? 'score-mid' : 'score-bad';
        scoreHtml = '<div class="test-score ' + cls + '">' + results.totalCorrect + '/' + results.totalQ + ' · ' + pct + '%</div>';
      }

      var arrow = isLocked
        ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      var href = isLocked ? '#' : 'diagnostic.html?test=' + tid;
      var card = document.createElement('a');
      card.href      = href;
      card.className = 'test-card ' + cardCls;
      card.setAttribute('aria-label', 'Practice Test ' + tid + (isLocked ? ' — locked' : isDone ? ' — completed' : ''));
      card.innerHTML =
        '<div class="test-num">' + tid + '</div>'
        + '<div class="test-body">'
        + '<div class="test-title">Practice Test ' + tid + '</div>'
        + '<div class="test-meta">' + statusHtml + '</div>'
        + scoreHtml
        + '</div>'
        + '<div class="test-arrow" aria-hidden="true">' + arrow + '</div>';
      grid.appendChild(card);
    });
  })();
  </script>
</body>
</html>
